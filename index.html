  sheet.appendChild(el('div',{cls:'modal-handle'}));
  overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  buildFn(sheet,closeModal);
  overlay.appendChild(sheet);root.appendChild(overlay);
}
function closeModal(){clr(document.getElementById('modal-root'));}
function mHeader(title){
  const h=el('div',{cls:'modal-header'});
  h.appendChild(el('div',{cls:'modal-title',txt:title}));
  h.appendChild(el('button',{cls:'modal-close',txt:'✕',onClick:closeModal}));
  return h;
}
function mBody(){return el('div',{cls:'modal-body'});}
function fGroup(label,input){
  const g=el('div',{cls:'form-group'});
  if(label)g.appendChild(el('label',{cls:'form-label',txt:label}));
  g.appendChild(input);return g;
}
function fIn(ph,type,val){const i=el('input',{type:type||'text',placeholder:ph||''});if(val!=null)i.value=val;return i;}
function fSel(opts,val){
  const s=el('select');
  opts.forEach(([v,l])=>{const o=el('option',{value:v,txt:l||v});if(String(v)===String(val))o.selected=true;s.appendChild(o);});
  return s;
}
function fTA(ph,val){const t=el('textarea',{placeholder:ph||'',rows:'3'});if(val)t.value=val;return t;}
function mActions(cancelTxt,saveTxt,onSave){
  const row=el('div',{cls:'modal-actions'});
  row.appendChild(el('button',{cls:'btn btn-ghost',txt:cancelTxt||'Cancel',onClick:closeModal}));
  row.appendChild(el('button',{cls:'btn btn-blue',txt:saveTxt||'Save',onClick:onSave}));
  return row;
}

      row.appendChild(chk);row.appendChild(right);c.appendChild(row);
    });

  // Top todos
  const top3=todos.filter(t=>!t.is_mit).slice(0,3);
  if(top3.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'⚡ Up Next'}));

      const row=el('div',{cls:'row-item'});
      const chk=el('div',{cls:'check-circle',onClick:async()=>{
        await sb.from('todos').update({completed:true,completed_at:new Date().toISOString()}).eq('id',t.id);
        celebrate('Task crushed! 💪');renderTab('home');
      }});
      row.appendChild(chk);row.appendChild(el('div',{cls:'row-item-title',txt:t.title}));
      c.appendChild(row);
    });
    p.appendChild(c);
  }

  // Projects
  if(projects.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'💼 Active Projects'}));
    const c=el('div',{cls:'card'});
    projects.slice(0,3).forEach(pr=>{
      const days=daysUntil(pr.deadline);
      const urgent=days!==null&&days<=1;
      const row=el('div',{cls:'card-row'});
      const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;'});
      top.appendChild(el('div',{cls:'row-item-title',txt:pr.title}));

        top.appendChild(el('div',{cls:'pill',style:'color:'+(urgent?'var(--red)':'var(--dim)')+';font-size:11px;',txt:lbl}));
      }
      row.appendChild(top);
      if(pr.clients)row.appendChild(el('div',{cls:'row-item-sub',txt:pr.clients.name+' · '+pr.payment_status}));
      c.appendChild(row);
    });
    p.appendChild(c);
    // Financials
    const earned={},owed={};
    projects.forEach(pr=>{
      if(!pr.price||!pr.clients)return;
      const cur=pr.clients.currency||'BDT';
      if(pr.payment_status==='paid')earned[cur]=(earned[cur]||0)+Number(pr.price);
      else owed[cur]=(owed[cur]||0)+Number(pr.price);
    });
    const curs=[...new Set([...Object.keys(earned),...Object.keys(owed)])];
    if(curs.length>0){
      p.appendChild(el('div',{cls:'section-label',txt:'💰 Financials'}));
      curs.forEach(cur=>{
        const row=el('div',{cls:'stat-row'});

        if(owed[cur]){const s=el('div',{cls:'stat-card'});s.appendChild(el('div',{cls:'stat-val',style:'color:var(--orange);',txt:fmtMoney(owed[cur],cur)}));s.appendChild(el('div',{cls:'stat-lbl',txt:'Owed to you'}));row.appendChild(s);}
        p.appendChild(row);
      });
    }
  }

  // Skills
  if(skills.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'🎯 Skills in Progress'}));
    const c=el('div',{cls:'card'});
    skills.slice(0,4).forEach(s=>{
      const row=el('div',{cls:'card-row'});
      const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;'});
      top.appendChild(el('div',{cls:'row-item-title',txt:s.name}));
      top.appendChild(el('div',{cls:'level-badge',txt:'⚡ '+s.overall_progress+'%'}));
      row.appendChild(top);
      const pb=el('div',{cls:'prog-wrap'});pb.appendChild(el('div',{cls:'prog-fill',style:'width:'+s.overall_progress+'%;'}));
      row.appendChild(pb);c.appendChild(row);
    });
    p.appendChild(c);
  }
  wrap.appendChild(p);
}

// ── TIMELINE ──────────────────────────────────────────────
async function renderTimeline(wrap){
  clr(wrap);
  const today=todayISO();
  const [rp,rb,rt,rh,rpr,rs]=await Promise.all([
    sb.from('prayer_times').select('*').order('sort_order'),
    sb.from('timeline_blocks').select('*').eq('block_date',today).order('start_time'),
    sb.from('todos').select('id,title').eq('completed',false),
    sb.from('habits').select('id,title').eq('active',true),
    sb.from('projects').select('id,title').eq('active',true),
    sb.from('skills').select('id,name').eq('is_active',true),
  ]);
  const prayers=rp.data||[],blocks=rb.data||[];
  const todos=rt.data||[],habits=rh.data||[],projects=rpr.data||[],skills=rs.data||[];

  const tl=el('div',{cls:'timeline'});
  tl.appendChild(el('div',{cls:'tl-line'}));

  // Build: for each prayer, show blocks anchored to it, then the prayer, then add-btn
  const usedBlocks=new Set();
  prayers.forEach(pr=>{
    const anchor=pr.name.toLowerCase();
    // blocks before this prayer (anchored to it, appear before)
    const anchoredBlocks=blocks.filter(b=>b.prayer_anchor===anchor&&!usedBlocks.has(b.id));
    anchoredBlocks.forEach(b=>{usedBlocks.add(b.id);tl.appendChild(makeTlBlock(b,today,wrap,todos,habits,projects,skills));});
    // prayer checkpoint
    tl.appendChild(makePrayerItem(pr));
    // add button after prayer
    tl.appendChild(makeAddBtn(today,pr.name,wrap,todos,habits,projects,skills));
  });
  // free blocks
  blocks.filter(b=>!b.prayer_anchor&&!usedBlocks.has(b.id)).forEach(b=>{
    usedBlocks.add(b.id);tl.appendChild(makeTlBlock(b,today,wrap,todos,habits,projects,skills));
  });
  // final free add
  const freeAdd=el('div',{cls:'tl-item',style:'margin-top:12px;'});
  freeAdd.appendChild(el('div',{cls:'tl-dot',style:'background:transparent;border:none;'}));
  freeAdd.appendChild(el('button',{cls:'tl-add-btn',txt:'+ Add free block',onClick:()=>openAddBlock(today,null,wrap,todos,habits,projects,skills)}));
  tl.appendChild(freeAdd);
  clr(wrap);wrap.appendChild(tl);
}
function makePrayerItem(pr){
  const item=el('div',{cls:'tl-item'});
  item.appendChild(el('div',{cls:'tl-time',txt:fmt12(pr.time)}));
  item.appendChild(el('div',{cls:'tl-dot prayer-dot'}));
  const block=el('div',{cls:'tl-block prayer-block'});
  block.appendChild(el('div',{cls:'tl-block-title',txt:(PRAYER_EMOJIS[pr.name]||'🕌')+' '+pr.name}));
  return item;item.appendChild(block);return item;
}
function makeTlBlock(b,today,wrap,todos,habits,projects,skills){
  const item=el('div',{cls:'tl-item animate-in'});
  item.appendChild(el('div',{cls:'tl-time',txt:fmt12(b.start_time)}));
  item.appendChild(el('div',{cls:'tl-dot'+(b.completed?' done-dot':'')}));
  const block=el('div',{cls:'tl-block task-block',style:'border-left:3px solid '+(b.color||'var(--blue)')+';'});
  const brow=el('div',{style:'display:flex;align-items:center;justify-content:space-between;gap:8px;'});
  brow.appendChild(el('div',{cls:'tl-block-title',txt:b.label||b.block_type}));
  const chk=el('div',{cls:'check-circle'+(b.completed?' done':''),style:'width:24px;height:24px;',onClick:async e=>{
    e.stopPropagation();
    await sb.from('timeline_blocks').update({completed:!b.completed}).eq('id',b.id);
    if(!b.completed)celebrate('Block done! ⚡');
    renderTimeline(wrap);
  }});
  if(b.completed)chk.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#111" stroke-width="3.5" stroke-linecap="round"/></svg>';
  brow.appendChild(chk);block.appendChild(brow);
  if(b.duration_mins)block.appendChild(el('div',{cls:'tl-block-sub',txt:'⏱ '+b.duration_mins+' min · '+b.block_type}));
  block.onclick=()=>openBlockActions(b,wrap,todos,habits,projects,skills);
  item.appendChild(block);return item;
}
function makeAddBtn(today,prayerName,wrap,todos,habits,projects,skills){
  const item=el('div',{cls:'tl-item'});
  item.appendChild(el('div',{cls:'tl-dot',style:'background:transparent;border:2px dashed #2a2a4a;'}));
  item.appendChild(el('button',{cls:'tl-add-btn',txt:'+ Add after '+prayerName,onClick:()=>openAddBlock(today,prayerName,wrap,todos,habits,projects,skills)}));
  return item;
}
function openAddBlock(date,prayerAnchor,wrap,todos,habits,projects,skills){
  openModal((sheet,close)=>{
    sheet.appendChild(mHeader('Add Timeline Block ⚡'));
    const body=mBody();
    const typeSelect=fSel([['todo','✅ Todo'],['habit','🔥 Habit'],['project','💼 Project'],['skill','🎯 Skill'],['note','📝 Note']]);
    const refSelect=fSel([['','— pick one —']]);
    const labelIn=fIn('Custom label (optional)');
    const timeIn=fIn('','time','09:00');
    const durIn=fIn('Minutes','number','30');
    const colorIn=el('input',{type:'color',value:'#4CC9F0'});colorIn.style.cssText='height:44px;padding:4px;border-radius:10px;width:100%;';
    function updRefs(){
      clr(refSelect);
      const type=typeSelect.value;
      let opts=[['','— pick one —']];
      if(type==='todo')todos.forEach(t=>opts.push([t.id,t.title]));
      else if(type==='habit')habits.forEach(h=>opts.push([h.id,h.title]));
      else if(type==='project')projects.forEach(p=>opts.push([p.id,p.title]));
      else if(type==='skill')skills.forEach(s=>opts.push([s.id,s.name]));
      opts.forEach(([v,l])=>{const o=el('option',{value:v,txt:l});refSelect.appendChild(o);});
      refSelect.style.display=type==='note'?'none':'block';
    }
    typeSelect.addEventListener('change',updRefs);updRefs();
    body.appendChild(fGroup('Type',typeSelect));
    body.appendChild(fGroup('Link to',refSelect));
    body.appendChild(fGroup('Label (optional)',labelIn));
    const r=el('div',{cls:'form-row'});r.appendChild(fGroup('Start time',timeIn));r.appendChild(fGroup('Duration (min)',durIn));body.appendChild(r);
    body.appendChild(fGroup('Color',colorIn));
    if(prayerAnchor)body.appendChild(el('div',{style:'font-size:12px;color:var(--blue);font-weight:700;margin-top:4px;',txt:'📌 After '+prayerAnchor}));
    body.appendChild(mActions('Cancel','Add block ⚡',async()=>{
      const type=typeSelect.value,refId=refSelect.value||null;
      let label=labelIn.value.trim();
      if(!label&&refId){
        const map={todo:todos,habit:habits,project:projects,skill:skills};
        const found=(map[type]||[]).find(x=>x.id===refId);
        if(found)label=found.title||found.name||'';
      }
      await sb.from('timeline_blocks').insert({user_id:USER.id,block_date:date,start_time:timeIn.value,duration_mins:Number(durIn.value)||30,block_type:type,ref_id:refId||null,prayer_anchor:prayerAnchor?prayerAnchor.toLowerCase():null,label:label||type,color:colorIn.value,completed:false});
      close();renderTimeline(wrap);
    }));
    sheet.appendChild(body);
  });
}
function openBlockActions(block,wrap,todos,habits,projects,skills){
  openModal((sheet,close)=>{
    sheet.appendChild(mHeader(block.label||'Block'));
    const body=mBody();
    body.appendChild(el('div',{style:'font-size:13px;color:var(--dim);margin-bottom:16px;',txt:'⏱ '+block.duration_mins+' min · 🕐 '+fmt12(block.start_time)}));
    body.appendChild(el('button',{cls:'btn btn-red btn-fill',style:'margin-bottom:10px;',txt:'🗑 Delete block',onClick:async()=>{
      await sb.from('timeline_blocks').delete().eq('id',block.id);close();renderTimeline(wrap);
    }}));
    body.appendChild(el('button',{cls:'btn btn-ghost btn-fill',txt:'Cancel',onClick:close}));
    sheet.appendChild(body);
  });
}

// ── TODO ──────────────────────────────────────────────────
async function renderTodo(wrap){
  clr(wrap);
  const [{data:todos},{data:cats}]=await Promise.all([
    sb.from('todos').select('*,categories(name,color)').eq('completed',false).order('is_mit',{ascending:false}).order('created_at'),
    sb.from('categories').select('*').order('name'),
  ]);
  wrap.appendChild(el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:16px;',txt:'+ New Todo ✅',onClick:()=>openTodoModal(null,cats,wrap)}));
  if(!todos||!todos.length){wrap.appendChild(buildEmpty('📝','No todos yet!','Clear head, focused mind. Add tasks here.'));return;}
  const mit=todos.filter(t=>t.is_mit),rest=todos.filter(t=>!t.is_mit);
  if(mit.length){
    wrap.appendChild(el('div',{cls:'section-label',txt:'⭐ Most Important Task'}));
    const c=el('div',{cls:'card'});mit.forEach(t=>c.appendChild(todoRow(t,cats,wrap)));wrap.appendChild(c);
  }
  if(rest.length){
    wrap.appendChild(el('div',{cls:'section-label',txt:'📋 Tasks'}));
    const c=el('div',{cls:'card'});rest.forEach(t=>c.appendChild(todoRow(t,cats,wrap)));wrap.appendChild(c);

function todoRow(t,cats,wrap){
  const row=el('div',{cls:'row-item'});
  const chk=el('div',{cls:'check-circle',onClick:async()=>{
    await sb.from('todos').update({completed:true,completed_at:new Date().toISOString()}).eq('id',t.id);
    celebrate('Task crushed! 💪 You\'re on fire!');loadSub(wrap,'todo');
  }});
  const main=el('div',{cls:'row-item-main',onClick:()=>openTodoModal(t,cats,wrap)});
  main.appendChild(el('div',{cls:'row-item-title',txt:(t.is_mit?'⭐ ':'')+t.title}));
  const sub=[];
  if(t.due_date){const d=daysUntil(t.due_date);sub.push((d<=1?'🔴 ':'📅 ')+'Due '+t.due_date);}
  if(t.categories)sub.push('🏷 '+t.categories.name);
  if(sub.length)main.appendChild(el('div',{cls:'row-item-sub',txt:sub.join(' · ')}));
  row.appendChild(chk);row.appendChild(main);return row;

function openTodoModal(todo,cats,wrap){
  openModal((sheet,close)=>{
    sheet.appendChild(mHeader(todo?'Edit Todo ✅':'New Todo ✅'));
    const body=mBody();
    const titleIn=fIn('What needs to be done?','text',todo?.title);
    const mitChk=el('input',{type:'checkbox'});if(todo?.is_mit)mitChk.checked=true;
    const dueIn=fIn('','date',todo?.due_date);
    const catSel=fSel([['',' No category'],...(cats||[]).map(c=>[c.id,c.name])],todo?.category_id);
    body.appendChild(fGroup('Task',titleIn));
    const mitRow=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px;background:#1e1e3a;border-radius:12px;'});
    mitRow.appendChild(mitChk);mitRow.appendChild(el('label',{style:'font-size:14px;font-weight:700;',txt:'⭐ Mark as Most Important Task'}));
    body.appendChild(mitRow);
    body.appendChild(fGroup('Due date',dueIn));body.appendChild(fGroup('Category',catSel));
    const actions=el('div',{cls:'modal-actions'});
    if(todo){actions.appendChild(el('button',{cls:'btn btn-red',txt:'🗑 Delete',onClick:async()=>{await sb.from('todos').delete().eq('id',todo.id);close();loadSub(wrap,'todo');}}));}
    else{actions.appendChild(el('button',{cls:'btn btn-ghost',txt:'Cancel',onClick:close}));}
    actions.appendChild(el('button',{cls:'btn btn-blue',txt:todo?'Save 💾':'Add ✅',onClick:async()=>{
      const title=titleIn.value.trim();if(!title)return;
      const payload={title,is_mit:mitChk.checked,due_date:dueIn.value||null,category_id:catSel.value||null};
      if(todo)await sb.from('todos').update(payload).eq('id',todo.id);

async function renderHabits(wrap){
  clr(wrap);
  const today=todayISO(),dow=todayDow();
  const [{data:habits},{data:logs}]=await Promise.all([
    sb.from('habits').select('*').eq('active',true).order('created_at'),
    sb.from('habit_logs').select('*').eq('log_date',today),
  ]);
  wrap.appendChild(el('button',{cls:'btn btn-purple btn-fill',style:'margin-bottom:16px;',txt:'+ New Habit 🔥',onClick:()=>openHabitModal(null,wrap)}));
  if(!habits||!habits.length){wrap.appendChild(buildEmpty('🔥','No habits yet!','Build the streak. Add your first habit.'));return;}
  const todayH=habits.filter(h=>!h.days_of_week?.length||h.days_of_week.includes(dow));
  const otherH=habits.filter(h=>!todayH.includes(h));
  if(todayH.length){
    wrap.appendChild(el('div',{cls:'section-label',txt:'🔥 Today'}));
    const c=el('div',{cls:'card'});
    todayH.forEach(h=>{for(let occ=1;occ<=h.times_per_day;occ++)c.appendChild(habitRow(h,logs,occ,today,wrap));});
    wrap.appendChild(c);
  }
  if(otherH.length){
    wrap.appendChild(el('div',{cls:'section-label',txt:'💤 Not today'}));
    const c=el('div',{cls:'card'});
    otherH.forEach(h=>{
      const row=el('div',{cls:'row-item',onClick:()=>openHabitModal(h,wrap)});
      row.appendChild(el('div',{cls:'row-item-main'},[el('div',{cls:'row-item-title',style:'color:var(--dim);',txt:h.title})]));
      c.appendChild(row);
    });
    wrap.appendChild(c);
  }
}
function habitRow(h,logs,occ,today,wrap){
  const log=logs?.find(l=>l.habit_id===h.id&&l.occurrence===occ);
  const done=log?.completed||false;
  const row=el('div',{cls:'row-item'});
  const chk=el('div',{cls:'check-circle'+(done?' done done-green':''),onClick:async()=>{
    await sb.from('habit_logs').upsert({user_id:USER.id,habit_id:h.id,log_date:today,occurrence:occ,completed:!done,completed_at:!done?new Date().toISOString():null},{onConflict:'habit_id,log_date,occurrence'});
    if(!done){miniPop(chk);celebrate('Habit done! 🔥 Streak growing!');}
    loadSub(wrap,'habits');
  }});
  if(done)chk.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#111" stroke-width="3.5" stroke-linecap="round"/></svg>';
  const main=el('div',{cls:'row-item-main',onClick:()=>openHabitModal(h,wrap)});
  main.appendChild(el('div',{cls:'row-item-title',txt:h.title+(h.times_per_day>1?' ('+occ+'/'+h.times_per_day+')':'')}));
  const daysLbl=(h.days_of_week||[]).map(d=>d.charAt(0).toUpperCase()+d.slice(1)).join(', ')||'Every day';
  main.appendChild(el('div',{cls:'row-item-sub',txt:'📅 '+daysLbl}));
  row.appendChild(chk);row.appendChild(main);return row;
}
function openHabitModal(habit,wrap){
  openModal((sheet,close)=>{
    sheet.appendChild(mHeader(habit?'Edit Habit 🔥':'New Habit 🔥'));
    const body=mBody();
    const titleIn=fIn('Habit name','text',habit?.title);
    const timesIn=fIn('e.g. 1','number',habit?.times_per_day||1);
    const selectedDays=new Set(habit?.days_of_week||[]);
    const chipsWrap=el('div',{cls:'day-chips'});
    DAYS.forEach((d,i)=>{
      const chip=el('button',{cls:'day-chip'+(selectedDays.has(d)?' on':''),txt:DAY_LABELS[i],onClick:()=>{
        if(selectedDays.has(d)){selectedDays.delete(d);chip.classList.remove('on');}
        else{selectedDays.add(d);chip.classList.add('on');}
      }});
      chipsWrap.appendChild(chip);
    });
    body.appendChild(fGroup('Name',titleIn));
    body.appendChild(fGroup('Times per day',timesIn));
    const dg=el('div',{cls:'form-group'});

      const title=titleIn.value.trim();if(!title)return;
      if(cp)await sb.from('checkpoints').update({title}).eq('id',cp.id);
      else{const mo=allCps.reduce((m,x)=>Math.max(m,x.sort_order||0),0);await sb.from('checkpoints').insert({user_id:USER.id,skill_id:skill.id,title,sort_order:mo+1});}
      close();skillView={mode:'detail',skillId:skill.id};renderTab('skills');
    }}));
    body.appendChild(actions);sheet.appendChild(body);setTimeout(()=>titleIn.focus(),50);
  });
}

// ═══════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════
async function renderSettings(wrap){
  const p=el('div',{cls:'page'});wrap.appendChild(p);
  p.appendChild(el('div',{style:'font-size:24px;font-weight:900;margin-bottom:20px;',txt:'⚙️ Settings'}));

  // Prayer times — editable inline, no duplicates
  p.appendChild(el('div',{cls:'section-label',txt:'🕌 Prayer Times'}));
  const {data:prayers}=await sb.from('prayer_times').select('*').order('sort_order');
  const pCard=el('div',{cls:'card'});
  (prayers||[]).forEach(pr=>{
    const row=el('div',{cls:'card-row',style:'display:flex;align-items:center;justify-content:space-between;gap:12px;'});
    const left=el('div',{style:'display:flex;align-items:center;gap:8px;flex:1;'});
    left.appendChild(el('div',{style:'font-size:18px;',txt:PRAYER_EMOJIS[pr.name]||'🕌'}));
    left.appendChild(el('div',{style:'font-size:14px;font-weight:800;',txt:pr.name}));
    const timeIn=el('input',{type:'time',value:pr.time});
    timeIn.style.cssText='width:120px;font-size:14px;font-weight:700;background:#1e1e3a;border:1.5px solid var(--sep);color:var(--blue);padding:8px 10px;border-radius:10px;';
    timeIn.onchange=async()=>{await sb.from('prayer_times').update({time:timeIn.value}).eq('id',pr.id);};
    row.appendChild(left);row.appendChild(timeIn);
    pCard.appendChild(row);
  });
  p.appendChild(pCard);

  // Categories
  p.appendChild(el('div',{cls:'section-label',txt:'🏷 Categories'}));
  const {data:cats}=await sb.from('categories').select('*').order('name');
  const catCard=el('div',{cls:'card'});
  (cats||[]).forEach(cat=>{
    const row=el('div',{cls:'card-row',style:'display:flex;align-items:center;justify-content:space-between;'});
    const left=el('div',{style:'display:flex;align-items:center;gap:10px;'});
    left.appendChild(el('div',{style:'width:14px;height:14px;border-radius:50%;background:'+(cat.color||'var(--blue)')+';flex-shrink:0;box-shadow:0 0 6px '+(cat.color||'var(--blue)')+';'}));
    left.appendChild(el('div',{style:'font-size:14px;font-weight:700;',txt:cat.name}));
    row.appendChild(left);
    row.appendChild(el('button',{cls:'btn btn-red btn-sm',txt:'✕',onClick:async()=>{await sb.from('categories').delete().eq('id',cat.id);renderTab('settings');}}));
    catCard.appendChild(row);
  });
  const addRow=el('div',{cls:'card-row',style:'display:flex;gap:8px;align-items:center;'});
  const newCatIn=fIn('New category...');newCatIn.style.fontSize='14px';
  const addCatBtn=el('button',{cls:'btn btn-blue btn-sm',txt:'Add',onClick:async()=>{
    const name=newCatIn.value.trim();if(!name)return;
    await sb.from('categories').insert({user_id:USER.id,name,color:'#4CC9F0'});
    newCatIn.value='';renderTab('settings');
  }});
  addRow.appendChild(newCatIn);addRow.appendChild(addCatBtn);
  catCard.appendChild(addRow);
  p.appendChild(catCard);

  // Account
  p.appendChild(el('div',{cls:'section-label',txt:'👤 Account'}));
  p.appendChild(el('button',{cls:'btn btn-red btn-fill',txt:'Sign Out',onClick:async()=>{await sb.auth.signOut();}}));
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function buildEmpty(emoji,title,sub){
  const d=el('div',{cls:'empty'});
  d.appendChild(el('div',{cls:'empty-emoji',txt:emoji}));
  d.appendChild(el('div',{cls:'empty-title',txt:title}));
  if(sub)d.appendChild(el('div',{cls:'empty-sub',txt:sub}));
  return d;
}
</script>
