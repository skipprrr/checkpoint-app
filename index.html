// ---------- QUOTES (static rotation, one per day deterministically) ----------
const QUOTES = [
  "Discipline is choosing between what you want now and what you want most.",
  "Chaos is a ladder, but the checkpoint is the floor.",
  "You don't rise to the level of your goals, you fall to the level of your systems.",
  "Small steps, repeated, become the whole staircase.",
  "The work doesn't care how you feel about it today.",
  "Consistency is the only flex that compounds.",
  "Show up. Even the version of you that doesn't feel like it.",
  "Progress is invisible day to day, undeniable month to month.",
  "Anchor first, then move.",
  "What gets logged gets built.",
  "Your routine is the proof, not the plan.",
  "Today is just one more brick. Lay it straight.",
];
function quoteForDate(d){
  const day = Math.floor(d.getTime()/86400000);
  return QUOTES[day % QUOTES.length];
}

// ---------- HELPERS ----------
function todayISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtDateLong(d){
  return d.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
}
function uid(){ return Math.random().toString(36).slice(2,10); }

// ---------- ANCHOR RING (signature element) ----------
function AnchorRing({ steps, size=120 }){
  const total = steps.length || 1;
  const completed = steps.filter(s=>s.completed).length;
  const r = size/2 - 10;
  const circ = 2*Math.PI*r;
  const gap = total > 1 ? 4 : 0;
  const segLen = (circ - gap*total)/total;
  let cursor = -Math.PI/2; // start at top

  return (
    <div style={{position:'relative', width:size, height:size}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {steps.length === 0 && (
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--divider)" strokeWidth="8" />
        )}
        {steps.map((s, i) => {
          const angle = (segLen+gap)/r;
          const x1 = size/2 + r*Math.cos(cursor);
          const y1 = size/2 + r*Math.sin(cursor);
          const path = describeArc(size/2, size/2, r, cursor, cursor+angle - (gap/r));
          cursor += angle;
          return (
            <path key={s.id} d={path} fill="none"
              stroke={s.completed ? "var(--sage)" : "var(--divider)"}
              strokeWidth="8" strokeLinecap="round"
              style={{transition:'stroke 0.4s ease'}} />
          );
        })}
      </svg>
      <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
        <div className="display" style={{fontSize:24, lineHeight:1}}>{completed}/{total}</div>
        <div style={{fontSize:10, color:'var(--text-dim)', marginTop:2, letterSpacing:'0.05em', textTransform:'uppercase'}}>today</div>
      </div>
    </div>
  );
}
function describeArc(cx, cy, r, startAngle, endAngle){
  const x1 = cx + r*Math.cos(startAngle), y1 = cy + r*Math.sin(startAngle);
  const x2 = cx + r*Math.cos(endAngle), y2 = cy + r*Math.sin(endAngle);
  const largeArc = (endAngle-startAngle) > Math.PI ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
}

// ---------- AUTH SCREEN ----------
function AuthScreen({ onAuthed }){
  const [mode, setMode] = useState('signin');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function submit(e){
    e.preventDefault();
    setErr(''); setLoading(true);
    try{
      if(mode==='signin'){
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) throw error;
      } else {
        const { error } = await supabase.auth.signUp({ email, password });
        if(error) throw error;
        setErr("Account created. Check your email if confirmation is required, then sign in.");
        setMode('signin');
        setLoading(false);
        return;
      }
    } catch(e){
      setErr(e.message || "Something went wrong.");
    }
    setLoading(false);
  }

  return (
    <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:24}}>
      <div style={{width:'100%', maxWidth:360, animation:'fadeUp 0.5s ease'}}>
        <div style={{textAlign:'center', marginBottom:36}}>
          <div className="display" style={{fontSize:32, marginBottom:6}}>Checkpoint</div>
          <div style={{fontSize:13, color:'var(--text-dim)'}}>Your anchor when things get chaotic.</div>
        </div>
        <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:12}}>
          <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required />
          <input type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6} />
          {err && <div style={{fontSize:12.5, color:'var(--terracotta)', lineHeight:1.5}}>{err}</div>}
          <button type="submit" disabled={loading} style={{
            background:'var(--sage)', color:'#0E1310', border:'none', borderRadius:8,
            padding:'12px 16px', fontWeight:600, fontSize:14, marginTop:4, opacity:loading?0.6:1
          }}>
            {loading ? '...' : (mode==='signin' ? 'Sign in' : 'Create account')}
          </button>
        </form>
        <div style={{textAlign:'center', marginTop:18, fontSize:13, color:'var(--text-dim)'}}>
          {mode==='signin' ? (
            <span>No account yet? <a onClick={()=>{setMode('signup'); setErr('');}} style={{color:'var(--sage)', cursor:'pointer'}}>Create one</a></span>
          ) : (
            <span>Already have an account? <a onClick={()=>{setMode('signin'); setErr('');}} style={{color:'var(--sage)', cursor:'pointer'}}>Sign in</a></span>
          )}
        </div>
      </div>
    </div>
  );
}

// =========================================================
// AGENDA TAB
// =========================================================
function AgendaTab({ userId }){
  const [steps, setSteps] = useState([]);
  const [logs, setLogs] = useState({}); // step_id -> log row for today
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [showWeekly, setShowWeekly] = useState(false);
  const [editingStep, setEditingStep] = useState(null);
  const today = todayISO();

  const load = useCallback(async ()=>{
    setLoading(true);
    const { data: stepsData } = await supabase.from('agenda_steps')
      .select('*').eq('active', true).order('sort_order', {ascending:true});
    const { data: logsData } = await supabase.from('agenda_logs')
      .select('*').eq('log_date', today);
    const logMap = {};
    (logsData||[]).forEach(l => logMap[l.step_id] = l);
    setSteps(stepsData || []);
    setLogs(logMap);
    setLoading(false);
  }, [today]);

  useEffect(()=>{ load(); }, [load]);

  const stepsWithStatus = useMemo(()=>steps.map(s=>({
    ...s, completed: !!(logs[s.id] && logs[s.id].completed)
  })), [steps, logs]);

  async function toggleStep(step){
    const existing = logs[step.id];
    const newCompleted = !(existing && existing.completed);
    const { data, error } = await supabase.from('agenda_logs')
      .upsert({
        user_id: userId, step_id: step.id, log_date: today,
        completed: newCompleted, completed_at: newCompleted ? new Date().toISOString() : null
      }, { onConflict: 'step_id,log_date' })
      .select().single();
    if(!error && data){
      setLogs(prev => ({...prev, [step.id]: data}));
    }
  }

  async function addStep(stepData){
    const maxOrder = steps.reduce((m,s)=>Math.max(m, s.sort_order||0), 0);
    const { data, error } = await supabase.from('agenda_steps')
      .insert({ user_id: userId, ...stepData, sort_order: maxOrder+1 })
      .select().single();
    if(!error && data){ setSteps(prev=>[...prev, data]); }
    setShowAdd(false);
  }

  async function updateStep(id, stepData){
    const { data, error } = await supabase.from('agenda_steps')
      .update(stepData).eq('id', id).select().single();
    if(!error && data){ setSteps(prev=>prev.map(s=>s.id===id?data:s)); }
    setEditingStep(null);
  }

  async function removeStep(id){
    await supabase.from('agenda_steps').update({active:false}).eq('id', id);
    setSteps(prev=>prev.filter(s=>s.id!==id));
  }

  // group by category for the "timeline" feel
  const grouped = useMemo(()=>{
    const groups = {};
    stepsWithStatus.forEach(s=>{
      const cat = s.category || 'General';
      if(!groups[cat]) groups[cat] = [];
      groups[cat].push(s);
    });
    return groups;
  }, [stepsWithStatus]);

  const quote = quoteForDate(new Date());

  if(showWeekly) return <WeeklySummary userId={userId} onClose={()=>setShowWeekly(false)} />;

  return (
    <div style={{padding:'24px 20px 100px', animation:'fadeUp 0.4s ease'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:28, gap:16}}>
        <div>
          <div style={{fontSize:13, color:'var(--text-dim)', marginBottom:4}}>{fmtDateLong(new Date())}</div>
          <div className="display" style={{fontSize:22, lineHeight:1.3, maxWidth:220}}>Stay on course.</div>
        </div>
        <AnchorRing steps={stepsWithStatus} />
      </div>

      <div style={{
        background:'var(--surface)', borderRadius:'var(--radius)', padding:'14px 16px',
        marginBottom:24, fontSize:13, color:'var(--text-dim)', fontStyle:'italic', lineHeight:1.5,
        borderLeft:'2px solid var(--sage)'
      }}>
        "{quote}"
      </div>

      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
        <button onClick={()=>setShowWeekly(true)} style={{
          background:'none', border:'1px solid var(--divider)', color:'var(--text-dim)',
          fontSize:12.5, padding:'6px 12px', borderRadius:20
        }}>Weekly summary →</button>
        <button onClick={()=>setShowAdd(true)} style={{
          background:'var(--sage)', color:'#0E1310', border:'none', fontSize:12.5,
          fontWeight:600, padding:'7px 14px', borderRadius:20
        }}>+ Add step</button>
      </div>

      {loading ? (
        <div style={{color:'var(--text-dim)', fontSize:13, padding:'40px 0', textAlign:'center'}}>Loading your agenda...</div>
      ) : stepsWithStatus.length === 0 ? (
        <EmptyState
          title="No agenda yet"
          body="Build your day from scratch — add your first step: prayer, a walk, a work block, whatever anchors you."
          actionLabel="+ Add your first step"
          onAction={()=>setShowAdd(true)}
        />
      ) : (
        Object.entries(grouped).map(([cat, items])=>(
          <div key={cat} style={{marginBottom:20}}>
            <div style={{fontSize:11.5, textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--text-dim)', marginBottom:10, paddingLeft:2}}>{cat}</div>
            <div style={{display:'flex', flexDirection:'column', gap:8}}>
              {items.map(step=>(
                <StepCard key={step.id} step={step} onToggle={()=>toggleStep(step)} onEdit={()=>setEditingStep(step)} onDelete={()=>removeStep(step.id)} />
              ))}
            </div>
          </div>
        ))
      )}

      {showAdd && <StepModal onClose={()=>setShowAdd(false)} onSave={addStep} />}
      {editingStep && <StepModal step={editingStep} onClose={()=>setEditingStep(null)} onSave={(d)=>updateStep(editingStep.id, d)} />}
    </div>
  );
}

function StepCard({ step, onToggle, onEdit, onDelete }){
  const [showActions, setShowActions] = useState(false);
  return (
    <div style={{
      background:'var(--surface)', borderRadius:12, padding:'14px 14px',
      display:'flex', alignItems:'center', gap:12,
      border: step.completed ? '1px solid var(--sage)' : '1px solid transparent',
      transition:'border-color 0.3s ease'
    }}>
      <button onClick={onToggle} style={{
        width:26, height:26, borderRadius:'50%', flexShrink:0,
        border: step.completed ? 'none' : '2px solid var(--divider)',
        background: step.completed ? 'var(--sage)' : 'transparent',
        display:'flex', alignItems:'center', justifyContent:'center',
        transition:'all 0.25s ease'
      }}>
        {step.completed && <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0E1310" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </button>
      <div style={{flex:1, minWidth:0}} onClick={()=>setShowActions(s=>!s)}>
        <div style={{
          fontSize:14.5, fontWeight:500,
          textDecoration: step.completed ? 'line-through' : 'none',
          color: step.completed ? 'var(--text-dim)' : 'var(--text)',
          transition:'color 0.25s ease'
        }}>{step.title}</div>
      </div>
      {showActions && (
        <div style={{display:'flex', gap:6}}>
          <button onClick={onEdit} style={{background:'var(--surface-2)', border:'none', color:'var(--text-dim)', fontSize:11.5, padding:'5px 9px', borderRadius:6}}>Edit</button>
          <button onClick={onDelete} style={{background:'var(--surface-2)', border:'none', color:'var(--terracotta)', fontSize:11.5, padding:'5px 9px', borderRadius:6}}>Remove</button>
        </div>
      )}
    </div>
  );
}

function StepModal({ step, onClose, onSave }){
  const [title, setTitle] = useState(step?.title || '');
  const [category, setCategory] = useState(step?.category || '');

  function submit(e){
    e.preventDefault();
    if(!title.trim()) return;
    onSave({ title: title.trim(), category: category.trim() || 'General' });
  }
  return (
    <Modal onClose={onClose} title={step ? "Edit step" : "Add a step"}>
      <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:12}}>
        <Field label="What is it?">
          <input autoFocus placeholder="e.g. Morning prayer, Walk, Edit client video" value={title} onChange={e=>setTitle(e.target.value)} required />
        </Field>
        <Field label="Category (optional)">
          <input placeholder="e.g. Prayer, Health, Work, Habit" value={category} onChange={e=>setCategory(e.target.value)} />
        </Field>
        <ModalActions onClose={onClose} saveLabel={step ? "Save changes" : "Add step"} />
      </form>
    </Modal>
  );
}

function WeeklySummary({ userId, onClose }){
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    async function load(){
      const dates = [];
      for(let i=6;i>=0;i--){
        const d = new Date(); d.setDate(d.getDate()-i);
        dates.push(d);
      }
      const isoStart = dates[0].toISOString().slice(0,10);
      const { data: stepsData } = await supabase.from('agenda_steps').select('id').eq('active', true);
      const totalSteps = (stepsData||[]).length;
      const { data: logsData } = await supabase.from('agenda_logs')
        .select('log_date, completed').gte('log_date', isoStart).eq('completed', true);
      const counts = {};
      (logsData||[]).forEach(l=>{ counts[l.log_date] = (counts[l.log_date]||0)+1; });
      setData(dates.map(d=>{
        const iso = d.toISOString().slice(0,10);
        const pct = totalSteps>0 ? Math.round(((counts[iso]||0)/totalSteps)*100) : 0;
        return { label: d.toLocaleDateString(undefined,{weekday:'short'}), pct, date: iso };
      }));
      setLoading(false);
    }
    load();
  }, [userId]);

  return (
    <div style={{padding:'24px 20px 100px', animation:'fadeUp 0.4s ease'}}>
      <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text-dim)', fontSize:13, marginBottom:20, padding:0}}>← Back to today</button>
      <div className="display" style={{fontSize:22, marginBottom:24}}>This week</div>
      {loading ? (
        <div style={{color:'var(--text-dim)', fontSize:13}}>Loading...</div>
      ) : (
        <div style={{display:'flex', gap:8, alignItems:'flex-end', height:180, marginBottom:8}}>
          {data.map(d=>(
            <div key={d.date} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8, height:'100%', justifyContent:'flex-end'}}>
              <div style={{fontSize:11, color:'var(--text-dim)'}}>{d.pct}%</div>
              <div style={{
                width:'100%', borderRadius:6, background:'var(--sage)',
                height: `${Math.max(d.pct,3)}%`, opacity: d.pct>0?1:0.25,
                transition:'height 0.5s ease'
              }}/>
              <div style={{fontSize:11.5, color:'var(--text-dim)'}}>{d.label}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// =========================================================
// CLIENTS TAB
// =========================================================
function ClientsTab({ userId }){
  const [clients, setClients] = useState([]);
  const [projects, setProjects] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeClient, setActiveClient] = useState(null);
  const [showAddClient, setShowAddClient] = useState(false);
  const [showAddProject, setShowAddProject] = useState(false);
  const [editingProject, setEditingProject] = useState(null);

  const load = useCallback(async ()=>{
    setLoading(true);
    const { data: c } = await supabase.from('clients').select('*').order('created_at', {ascending:false});
    const { data: p } = await supabase.from('projects').select('*').order('created_at', {ascending:false});
    setClients(c||[]); setProjects(p||[]); setLoading(false);
  }, []);
  useEffect(()=>{ load(); }, [load]);

  async function addClient(d){
    const { data, error } = await supabase.from('clients').insert({user_id:userId, ...d}).select().single();
    if(!error && data) setClients(prev=>[data, ...prev]);
    setShowAddClient(false);
  }
  async function removeClient(id){
    await supabase.from('clients').delete().eq('id', id);
    setClients(prev=>prev.filter(c=>c.id!==id));
    if(activeClient?.id===id) setActiveClient(null);
  }
  async function addProject(d){
    const { data, error } = await supabase.from('projects').insert({user_id:userId, client_id: activeClient.id, ...d}).select().single();
    if(!error && data) setProjects(prev=>[data, ...prev]);
    setShowAddProject(false);
  }
  async function updateProject(id, d){
    const { data, error } = await supabase.from('projects').update(d).eq('id', id).select().single();
    if(!error && data) setProjects(prev=>prev.map(p=>p.id===id?data:p));
    setEditingProject(null);
  }
  async function removeProject(id){
    await supabase.from('projects').delete().eq('id', id);
    setProjects(prev=>prev.filter(p=>p.id!==id));
  }

  if(loading) return <div style={{padding:'40px 20px', color:'var(--text-dim)', fontSize:13, textAlign:'center'}}>Loading clients...</div>;

  if(activeClient){
    const clientProjects = projects.filter(p=>p.client_id===activeClient.id);
    return (
      <div style={{padding:'24px 20px 100px', animation:'fadeUp 0.4s ease'}}>
        <button onClick={()=>setActiveClient(null)} style={{background:'none', border:'none', color:'var(--text-dim)', fontSize:13, marginBottom:20, padding:0}}>← All clients</button>
        <div className="display" style={{fontSize:22, marginBottom:4}}>{activeClient.name}</div>
        {activeClient.contact_info && <div style={{fontSize:13, color:'var(--text-dim)', marginBottom:20}}>{activeClient.contact_info}</div>}
        <button onClick={()=>setShowAddProject(true)} style={{
          background:'var(--sage)', color:'#0E1310', border:'none', fontSize:12.5,
          fontWeight:600, padding:'7px 14px', borderRadius:20, marginBottom:18
        }}>+ Add project</button>
        {clientProjects.length === 0 ? (
          <EmptyState title="No projects yet" body="Add a project for this client to start tracking status and payment." actionLabel="+ Add project" onAction={()=>setShowAddProject(true)} />
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            {clientProjects.map(p=>(
              <ProjectCard key={p.id} project={p} onEdit={()=>setEditingProject(p)} onDelete={()=>removeProject(p.id)} />
            ))}
          </div>
        )}
        {showAddProject && <ProjectModal onClose={()=>setShowAddProject(false)} onSave={addProject} />}
        {editingProject && <ProjectModal project={editingProject} onClose={()=>setEditingProject(null)} onSave={(d)=>updateProject(editingProject.id, d)} />}
      </div>
    );
  }

  return (
    <div style={{padding:'24px 20px 100px', animation:'fadeUp 0.4s ease'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
        <div className="display" style={{fontSize:22}}>Clients</div>
        <button onClick={()=>setShowAddClient(true)} style={{
          background:'var(--sage)', color:'#0E1310', border:'none', fontSize:12.5,
          fontWeight:600, padding:'7px 14px', borderRadius:20
        }}>+ Add client</button>
      </div>
      {clients.length === 0 ? (
        <EmptyState title="No clients yet" body="Add your first client to start tracking projects, payments, and progress." actionLabel="+ Add client" onAction={()=>setShowAddClient(true)} />
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {clients.map(c=>{
            const cp = projects.filter(p=>p.client_id===c.id);
            const unpaid = cp.filter(p=>p.payment_status!=='paid').length;
            return (
              <div key={c.id} onClick={()=>setActiveClient(c)} style={{
                background:'var(--surface)', borderRadius:12, padding:'16px', cursor:'pointer',
                display:'flex', justifyContent:'space-between', alignItems:'center'
              }}>
                <div>
                  <div style={{fontSize:15, fontWeight:600}}>{c.name}</div>
                  <div style={{fontSize:12.5, color:'var(--text-dim)', marginTop:3}}>{cp.length} project{cp.length!==1?'s':''}{unpaid>0 ? ` · ${unpaid} unpaid` : ''}</div>
                </div>
                <button onClick={(e)=>{e.stopPropagation(); removeClient(c.id);}} style={{background:'none', border:'none', color:'var(--text-dim)', fontSize:12}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      {showAddClient && <ClientModal onClose={()=>setShowAddClient(false)} onSave={addClient} />}
    </div>
  );
}

function ProjectCard({ project, onEdit, onDelete }){
  const payColor = project.payment_status === 'paid' ? 'var(--sage)' : project.payment_status === 'partial' ? '#D9B45A' : 'var(--terracotta)';
  return (
    <div style={{background:'var(--surface)', borderRadius:12, padding:'14px 16px'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10}}>
        <div style={{flex:1, minWidth:0}}>
          <div style={{fontSize:14.5, fontWeight:600, marginBottom:6}}>{project.title}</div>
          <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
            <Badge text={project.status?.replace('_',' ') || 'in progress'} color="var(--text-dim)" bg="var(--surface-2)" />
            <Badge text={project.payment_status || 'unpaid'} color={payColor} bg="var(--surface-2)" />
            {project.price != null && <Badge text={`৳${project.price}`} color="var(--text-dim)" bg="var(--surface-2)" />}
          </div>
          {project.deadline && <div style={{fontSize:11.5, color:'var(--text-dim)', marginTop:8}}>Due {project.deadline}</div>}
        </div>
        <div style={{display:'flex', gap:6, flexShrink:0}}>
          <button onClick={onEdit} style={{background:'var(--surface-2)', border:'none', color:'var(--text-dim)', fontSize:11.5, padding:'5px 9px', borderRadius:6}}>Edit</button>
          <button onClick={onDelete} style={{background:'var(--surface-2)', border:'none', color:'var(--terracotta)', fontSize:11.5, padding:'5px 9px', borderRadius:6}}>✕</button>
        </div>
      </div>
    </div>
  );
}

function Badge({ text, color, bg }){
  return <span style={{fontSize:11, color, background:bg, padding:'3px 9px', borderRadius:20, textTransform:'capitalize'}}>{text}</span>;
}

function ClientModal({ onClose, onSave }){
  const [name, setName] = useState('');
  const [contact, setContact] = useState('');
  const [notes, setNotes] = useState('');
  function submit(e){
    e.preventDefault();
    if(!name.trim()) return;
    onSave({ name: name.trim(), contact_info: contact.trim(), notes: notes.trim() });
  }
  return (
    <Modal onClose={onClose} title="Add client">
      <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:12}}>
        <Field label="Name"><input autoFocus placeholder="Client or business name" value={name} onChange={e=>setName(e.target.value)} required /></Field>
        <Field label="Contact (optional)"><input placeholder="Phone, email, etc." value={contact} onChange={e=>setContact(e.target.value)} /></Field>
        <Field label="Notes (optional)"><textarea rows={2} placeholder="Anything to remember" value={notes} onChange={e=>setNotes(e.target.value)} /></Field>
        <ModalActions onClose={onClose} saveLabel="Add client" />
      </form>
    </Modal>
  );
}

function ProjectModal({ project, onClose, onSave }){
  const [title, setTitle] = useState(project?.title || '');
  const [status, setStatus] = useState(project?.status || 'in_progress');
  const [paymentStatus, setPaymentStatus] = useState(project?.payment_status || 'unpaid');
  const [price, setPrice] = useState(project?.price ?? '');
  const [deadline, setDeadline] = useState(project?.deadline || '');
  const [notes, setNotes] = useState(project?.notes || '');

  function submit(e){
    e.preventDefault();
    if(!title.trim()) return;
    onSave({
      title: title.trim(), status, payment_status: paymentStatus,
      price: price === '' ? null : Number(price),
      deadline: deadline || null, notes: notes.trim()
    });
  }
  return (
    <Modal onClose={onClose} title={project ? "Edit project" : "Add project"}>
      <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:12}}>
        <Field label="Project title"><input autoFocus placeholder="e.g. Wedding highlight reel" value={title} onChange={e=>setTitle(e.target.value)} required /></Field>
        <Field label="Status">
          <input placeholder="e.g. in_progress, review, delivered" value={status} onChange={e=>setStatus(e.target.value)} />
        </Field>
        <Field label="Payment status">
          <select value={paymentStatus} onChange={e=>setPaymentStatus(e.target.value)}>
            <option value="unpaid">Unpaid</option>
            <option value="partial">Partial</option>
            <option value="paid">Paid</option>
          </select>
        </Field>
        <Field label="Price (optional)"><input type="number" placeholder="0" value={price} onChange={e=>setPrice(e.target.value)} /></Field>
        <Field label="Deadline (optional)"><input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} /></Field>
        <Field label="Notes (optional)"><textarea rows={2} value={notes} onChange={e=>setNotes(e.target.value)} /></Field>
        <ModalActions onClose={onClose} saveLabel={project ? "Save changes" : "Add project"} />
      </form>
    </Modal>
  );
}

// =========================================================
// SKILLS TAB
// =========================================================
function SkillsTab({ userId }){
  const [skills, setSkills] = useState([]);
  const [milestones, setMilestones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeSkill, setActiveSkill] = useState(null);
  const [showAddSkill, setShowAddSkill] = useState(false);
  const [showAddMilestone, setShowAddMilestone] = useState(false);

  const load = useCallback(async ()=>{
    setLoading(true);
    const { data: s } = await supabase.from('skills').select('*').order('created_at', {ascending:false});
    const { data: m } = await supabase.from('skill_milestones').select('*').order('sort_order', {ascending:true});
    setSkills(s||[]); setMilestones(m||[]); setLoading(false);
  }, []);
  useEffect(()=>{ load(); }, [load]);

  async function addSkill(d){
    const { data, error } = await supabase.from('skills').insert({user_id:userId, ...d}).select().single();
    if(!error && data) setSkills(prev=>[data, ...prev]);
    setShowAddSkill(false);
  }
  async function removeSkill(id){
    await supabase.from('skills').delete().eq('id', id);
    setSkills(prev=>prev.filter(s=>s.id!==id));
    if(activeSkill?.id===id) setActiveSkill(null);
  }
  async function addMilestone(d){
    const skillMs = milestones.filter(m=>m.skill_id===activeSkill.id);
    const maxOrder = skillMs.reduce((mx,m)=>Math.max(mx, m.sort_order||0), 0);
    const { data, error } = await supabase.from('skill_milestones')
      .insert({ user_id:userId, skill_id: activeSkill.id, sort_order: maxOrder+1, ...d }).select().single();
    if(!error && data) setMilestones(prev=>[...prev, data]);
    setShowAddMilestone(false);
  }
  async function toggleMilestone(m){
    const { data, error } = await supabase.from('skill_milestones')
      .update({ completed: !m.completed }).eq('id', m.id).select().single();
    if(!error && data){
      setMilestones(prev=>prev.map(x=>x.id===m.id?data:x));
      await maybeAutoUpdateProgress(activeSkill.id);
    }
  }
  async function removeMilestone(id){
    await supabase.from('skill_milestones').delete().eq('id', id);
    setMilestones(prev=>prev.filter(m=>m.id!==id));
    if(activeSkill) await maybeAutoUpdateProgress(activeSkill.id);
  }
  async function maybeAutoUpdateProgress(skillId){
    const { data: ms } = await supabase.from('skill_milestones').select('*').eq('skill_id', skillId);
    if(!ms || ms.length===0) return;
    const pct = Math.round((ms.filter(m=>m.completed).length / ms.length) * 100);
    const { data } = await supabase.from('skills').update({overall_progress: pct}).eq('id', skillId).select().single();
    if(data) setSkills(prev=>prev.map(s=>s.id===skillId?data:s));
  }
  async function setManualProgress(skillId, pct){
    const { data, error } = await supabase.from('skills').update({overall_progress: pct}).eq('id', skillId).select().single();
    if(!error && data) setSkills(prev=>prev.map(s=>s.id===skillId?data:s));
  }

  if(loading) return <div style={{padding:'40px 20px', color:'var(--text-dim)', fontSize:13, textAlign:'center'}}>Loading skills...</div>;

  if(activeSkill){
    const skillMs = milestones.filter(m=>m.skill_id===activeSkill.id);
    const liveSkill = skills.find(s=>s.id===activeSkill.id) || activeSkill;
    return (
      <div style={{padding:'24px 20px 100px', animation:'fadeUp 0.4s ease'}}>
        <button onClick={()=>setActiveSkill(null)} style={{background:'none', border:'none', color:'var(--text-dim)', fontSize:13, marginBottom:20, padding:0}}>← All skills</button>
        <div className="display" style={{fontSize:22, marginBottom:4}}>{liveSkill.name}</div>
        {liveSkill.description && <div style={{fontSize:13, color:'var(--text-dim)', marginBottom:16}}>{liveSkill.description}</div>}

        <div style={{marginBottom:22}}>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:12.5, color:'var(--text-dim)', marginBottom:6}}>
            <span>Overall progress</span><span>{liveSkill.overall_progress}%</span>
          </div>
          <div style={{height:8, background:'var(--surface-2)', borderRadius:6, overflow:'hidden'}}>
            <div style={{height:'100%', width:`${liveSkill.overall_progress}%`, background:'var(--sage)', transition:'width 0.5s ease', borderRadius:6}}/>
          </div>
          {skillMs.length===0 && (
            <input type="range" min="0" max="100" value={liveSkill.overall_progress}
              onChange={e=>setManualProgress(liveSkill.id, Number(e.target.value))}
              style={{width:'100%', marginTop:10, accentColor:'#7C9473'}} />
          )}
          {skillMs.length===0 && <div style={{fontSize:11, color:'var(--text-dim)', marginTop:2}}>Drag to set manually, or add milestones below to auto-track.</div>}
        </div>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
          <div style={{fontSize:11.5, textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--text-dim)'}}>Milestones</div>
          <button onClick={()=>setShowAddMilestone(true)} style={{background:'var(--sage)', color:'#0E1310', border:'none', fontSize:11.5, fontWeight:600, padding:'5px 11px', borderRadius:20}}>+ Add</button>
        </div>
        {skillMs.length === 0 ? (
          <div style={{fontSize:12.5, color:'var(--text-dim)', padding:'12px 0'}}>No milestones yet. Add steps like "Finish basics course" or "Complete 5 sparring sessions."</div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {skillMs.map(m=>(
              <div key={m.id} style={{background:'var(--surface)', borderRadius:10, padding:'11px 14px', display:'flex', alignItems:'center', gap:10}}>
                <button onClick={()=>toggleMilestone(m)} style={{
                  width:20, height:20, borderRadius:6, flexShrink:0,
                  border: m.completed ? 'none' : '2px solid var(--divider)',
                  background: m.completed ? 'var(--sage)' : 'transparent',
                  display:'flex', alignItems:'center', justifyContent:'center'
                }}>
                  {m.completed && <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0E1310" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </button>
                <div style={{flex:1, fontSize:13.5, textDecoration: m.completed?'line-through':'none', color: m.completed ? 'var(--text-dim)':'var(--text)'}}>{m.title}</div>
                <button onClick={()=>removeMilestone(m.id)} style={{background:'none', border:'none', color:'var(--text-dim)', fontSize:12}}>✕</button>
              </div>
            ))}
          </div>
        )}
        {showAddMilestone && <MilestoneModal onClose={()=>setShowAddMilestone(false)} onSave={addMilestone} />}
      </div>
    );
  }

  return (
    <div style={{padding:'24px 20px 100px', animation:'fadeUp 0.4s ease'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
        <div className="display" style={{fontSize:22}}>Skills</div>
        <button onClick={()=>setShowAddSkill(true)} style={{
          background:'var(--sage)', color:'#0E1310', border:'none', fontSize:12.5,
          fontWeight:600, padding:'7px 14px', borderRadius:20
        }}>+ Add skill</button>
      </div>
      {skills.length === 0 ? (
        <EmptyState title="No skills tracked yet" body="Add a skill — Premiere Pro, After Effects, a martial art, anything — and set milestones to chart your climb." actionLabel="+ Add skill" onAction={()=>setShowAddSkill(true)} />
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {skills.map(s=>{
            const count = milestones.filter(m=>m.skill_id===s.id).length;
            const done = milestones.filter(m=>m.skill_id===s.id && m.completed).length;
            return (
              <div key={s.id} onClick={()=>setActiveSkill(s)} style={{background:'var(--surface)', borderRadius:12, padding:'16px', cursor:'pointer'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                  <div style={{fontSize:15, fontWeight:600}}>{s.name}</div>
                  <button onClick={(e)=>{e.stopPropagation(); removeSkill(s.id);}} style={{background:'none', border:'none', color:'var(--text-dim)', fontSize:12}}>✕</button>
                </div>
                <div style={{height:6, background:'var(--surface-2)', borderRadius:6, overflow:'hidden', marginBottom:6}}>
                  <div style={{height:'100%', width:`${s.overall_progress}%`, background:'var(--sage)', borderRadius:6, transition:'width 0.5s ease'}}/>
                </div>
                <div style={{fontSize:11.5, color:'var(--text-dim)'}}>{s.overall_progress}%{count>0 ? ` · ${done}/${count} milestones` : ''}</div>
              </div>
            );
          })}
        </div>
      )}
      {showAddSkill && <SkillModal onClose={()=>setShowAddSkill(false)} onSave={addSkill} />}
    </div>
  );
}

function SkillModal({ onClose, onSave }){
  const [name, setName] = useState('');
  const [description, setDescription] = useState('');
  function submit(e){
    e.preventDefault();
    if(!name.trim()) return;
    onSave({ name: name.trim(), description: description.trim(), overall_progress: 0 });
  }
  return (
    <Modal onClose={onClose} title="Add skill">
      <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:12}}>
        <Field label="Skill name"><input autoFocus placeholder="e.g. After Effects, Muay Thai, Bangla copywriting" value={name} onChange={e=>setName(e.target.value)} required /></Field>
        <Field label="Description (optional)"><textarea rows={2} placeholder="What does mastering this look like?" value={description} onChange={e=>setDescription(e.target.value)} /></Field>
        <ModalActions onClose={onClose} saveLabel="Add skill" />
      </form>
    </Modal>
  );
}

function MilestoneModal({ onClose, onSave }){
  const [title, setTitle] = useState('');
  function submit(e){
    e.preventDefault();
    if(!title.trim()) return;
    onSave({ title: title.trim() });
  }
  return (
    <Modal onClose={onClose} title="Add milestone">
      <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:12}}>
        <Field label="Milestone"><input autoFocus placeholder="e.g. Finish basics course" value={title} onChange={e=>setTitle(e.target.value)} required /></Field>
        <ModalActions onClose={onClose} saveLabel="Add milestone" />
      </form>
    </Modal>
  );
}

// =========================================================
// SHARED UI PRIMITIVES
// =========================================================
function Modal({ title, children, onClose }){
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:50,
      display:'flex', alignItems:'flex-end', justifyContent:'center'
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'var(--surface)', width:'100%', maxWidth:480, borderRadius:'20px 20px 0 0',
        padding:'22px 20px 28px', animation:'fadeUp 0.3s ease', maxHeight:'85vh', overflowY:'auto'
      }} className="scrollbar-hide">
        <div className="display" style={{fontSize:18, marginBottom:16}}>{title}</div>
        {children}
      </div>
    </div>
  );
}
function Field({ label, children }){
  return (
    <label style={{display:'flex', flexDirection:'column', gap:6, fontSize:12.5, color:'var(--text-dim)'}}>
      {label}
      {children}
    </label>
  );
}
function ModalActions({ onClose, saveLabel }){
  return (
    <div style={{display:'flex', gap:10, marginTop:6}}>
      <button type="button" onClick={onClose} style={{
        flex:1, background:'var(--surface-2)', border:'none', color:'var(--text-dim)',
        padding:'12px', borderRadius:8, fontSize:14, fontWeight:500
      }}>Cancel</button>
      <button type="submit" style={{
        flex:1, background:'var(--sage)', border:'none', color:'#0E1310',
        padding:'12px', borderRadius:8, fontSize:14, fontWeight:600
      }}>{saveLabel}</button>
    </div>
  );
}
function EmptyState({ title, body, actionLabel, onAction }){
  return (
    <div style={{textAlign:'center', padding:'50px 20px', color:'var(--text-dim)'}}>
      <div className="display" style={{fontSize:17, color:'var(--text)', marginBottom:8}}>{title}</div>
      <div style={{fontSize:13, lineHeight:1.6, marginBottom:20, maxWidth:280, marginLeft:'auto', marginRight:'auto'}}>{body}</div>
      <button onClick={onAction} style={{
        background:'var(--sage)', color:'#0E1310', border:'none', fontSize:13,
        fontWeight:600, padding:'9px 18px', borderRadius:20
      }}>{actionLabel}</button>
    </div>
  );
}

// =========================================================
// ROOT APP
// =========================================================
function App(){
  const [session, setSession] = useState(undefined); // undefined = checking, null = signed out
  const [tab, setTab] = useState('agenda');

  useEffect(()=>{
    supabase.auth.getSession().then(({data})=>setSession(data.session));
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess)=>{
      setSession(sess);
    });
    return ()=>listener.subscription.unsubscribe();
  }, []);

  async function signOut(){
    await supabase.auth.signOut();
  }

  if(session === undefined){
    return <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-dim)', fontSize:13}}>Loading...</div>;
  }
  if(!session){
    return <AuthScreen />;
  }

  return (
    <React.Fragment>
      <TopBar tab={tab} setTab={setTab} onSignOut={signOut} />
      {tab === 'agenda' && <AgendaTab userId={session.user.id} />}
      {tab === 'clients' && <ClientsTab userId={session.user.id} />}
      {tab === 'skills' && <SkillsTab userId={session.user.id} />}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
