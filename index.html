<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkpoint</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0E1310;--surface:#1B221D;--surface2:#242E25;
  --text:#D9CDB8;--dim:#7A8877;--sage:#7C9473;
  --terra:#C97B4A;--div:#2C352E;--r:14px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
h1,h2,.serif{font-family:'Fraunces',serif;font-weight:500;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;background:var(--surface2);border:1px solid var(--div);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--sage);}
::placeholder{color:var(--dim);}
.page{padding:24px 20px 100px;max-width:540px;margin:0 auto;}
.card{background:var(--surface);border-radius:var(--r);padding:16px;}
.btn-primary{background:var(--sage);color:#0E1310;border:none;font-weight:700;padding:10px 18px;border-radius:20px;font-size:13px;}
.btn-ghost{background:none;border:1px solid var(--div);color:var(--dim);padding:7px 13px;border-radius:20px;font-size:12.5px;}
.btn-sm{background:var(--surface2);border:none;color:var(--dim);padding:5px 9px;border-radius:6px;font-size:11.5px;}
.btn-danger{color:var(--terra);}
.tab-bar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--div);padding:14px 20px 0;max-width:540px;margin:0 auto;}
.tabs{display:flex;gap:24px;}
.tab-btn{background:none;border:none;color:var(--dim);font-size:14px;font-weight:500;padding:0 0 12px;position:relative;}
.tab-btn.active{color:var(--text);font-weight:600;}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--sage);border-radius:2px;}
.toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.empty{text-align:center;padding:50px 20px;color:var(--dim);}
.empty h3{font-family:'Fraunces',serif;color:var(--text);margin-bottom:8px;font-size:18px;}
.empty p{font-size:13px;line-height:1.6;margin-bottom:20px;}
.field{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--dim);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--surface);width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:22px 20px 32px;max-height:85vh;overflow-y:auto;}
.modal-box h2{margin-bottom:16px;font-size:18px;}
.form-stack{display:flex;flex-direction:column;gap:12px;}
.modal-actions{display:flex;gap:10px;margin-top:8px;}
.modal-actions button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;border:none;}
.modal-actions .cancel{background:var(--surface2);color:var(--dim);font-weight:500;}
.modal-actions .save{background:var(--sage);color:#0E1310;}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface2);text-transform:capitalize;}
.progress-bar{height:7px;background:var(--surface2);border-radius:6px;overflow:hidden;margin:6px 0;}
.progress-fill{height:100%;background:var(--sage);border-radius:6px;transition:width 0.5s ease;}
input[type=range]{-webkit-appearance:none;height:6px;background:var(--div);border-radius:6px;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--sage);cursor:pointer;}
.quote-block{background:var(--surface);border-radius:var(--r);padding:14px 16px;margin-bottom:22px;font-size:13px;color:var(--dim);font-style:italic;line-height:1.6;border-left:2px solid var(--sage);}
.step-card{background:var(--surface);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;border:1px solid transparent;transition:border-color 0.3s;}
.step-card.done{border-color:var(--sage);}
.check-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--div);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s;}
.check-btn.done{background:var(--sage);border-color:var(--sage);}
.step-title{font-size:14.5px;font-weight:500;flex:1;transition:all 0.25s;}
.step-title.done{text-decoration:line-through;color:var(--dim);}
.cat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);margin:18px 0 8px 2px;}
.anchor-wrap{position:relative;width:110px;height:110px;flex-shrink:0;}
.anchor-count{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.anchor-num{font-family:'Fraunces',serif;font-size:22px;line-height:1;}
.anchor-lbl{font-size:9px;color:var(--dim);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;}
.bar-chart{display:flex;gap:8px;align-items:flex-end;height:160px;margin:20px 0;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.bar-pct{font-size:10.5px;color:var(--dim);}
.bar-fill{width:100%;border-radius:5px;background:var(--sage);transition:height 0.5s ease;}
.bar-day{font-size:11px;color:var(--dim);}
.client-row{display:flex;justify-content:space-between;align-items:center;}
.project-card{background:var(--surface);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.project-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.milestone-row{background:var(--surface);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;}
.ms-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--div);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.ms-check.done{background:var(--sage);border-color:var(--sage);}
.ms-title{flex:1;font-size:13.5px;transition:all 0.2s;}
.ms-title.done{text-decoration:line-through;color:var(--dim);}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-box{width:100%;max-width:360px;}
.auth-box h1{font-size:30px;text-align:center;margin-bottom:6px;}
.auth-sub{text-align:center;font-size:13px;color:var(--dim);margin-bottom:32px;}
.auth-err{font-size:12.5px;color:var(--terra);line-height:1.5;}
.link-btn{background:none;border:none;color:var(--sage);font-size:13px;padding:0;}
.sign-out-btn{background:none;border:none;color:var(--dim);font-size:12.5px;}
</style>
<link rel="icon" type="image/png" href="checkpoint.png"> 
</head>
<body>

<div id="auth-screen" style="display:none;">
  <div class="auth-box">
    <h1 class="serif">Checkpoint</h1>
    <p class="auth-sub">Your anchor when things get chaotic.</p>
    <div class="form-stack">
      <input type="email" id="auth-email" placeholder="Email" />
      <input type="password" id="auth-password" placeholder="Password (min 6 chars)" />
      <p class="auth-err" id="auth-err" style="display:none;"></p>
      <button class="btn-primary" id="auth-submit" style="width:100%;border-radius:8px;padding:12px;">Sign in</button>
      <p style="text-align:center;font-size:13px;color:var(--dim);" id="auth-switch-text">
        No account? <button class="link-btn" id="auth-switch-btn">Create one</button>
      </p>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="tab-bar">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="serif" style="font-size:17px;">Checkpoint</span>
      <button class="sign-out-btn" id="sign-out-btn">Sign out</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="agenda">Agenda</button>
      <button class="tab-btn" data-tab="clients">Clients</button>
      <button class="tab-btn" data-tab="skills">Skills</button>
    </div>
  </div>
  <div id="tab-agenda" class="page"></div>
  <div id="tab-clients" class="page" style="display:none;"></div>
  <div id="tab-skills" class="page" style="display:none;"></div>
</div>

<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const SUPA_URL = "https://aahfamkxawhknagbechd.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaGZhbWt4YXdoa25hZ2JlY2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzUwNDIsImV4cCI6MjA5ODQxMTA0Mn0.j9tQVT2Qsw_WZo9EzKL6pHGyAx0Hlrzn-85IxkSP6i8";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── QUOTES ──────────────────────────────────────────────────────────
const QUOTES = [
  "Discipline is choosing between what you want now and what you want most.",
  "You don't rise to the level of your goals, you fall to the level of your systems.",
  "Consistency is the only flex that compounds.",
  "Small steps, repeated, become the whole staircase.",
  "The work doesn't care how you feel about it today.",
  "Show up. Even the version of you that doesn't feel like it.",
  "Progress is invisible day to day, undeniable month to month.",
  "Anchor first, then move.",
  "What gets logged gets built.",
  "Your routine is the proof, not the plan.",
  "Chaos is a ladder, but the checkpoint is the floor.",
  "Today is just one more brick. Lay it straight.",
];
function todayQuote(){ const d=Math.floor(Date.now()/86400000); return QUOTES[d%QUOTES.length]; }
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtLong(d){ return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{ if(c==null) return; e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}
function clearEl(e){ while(e.firstChild) e.removeChild(e.firstChild); }

// ── APP STATE ────────────────────────────────────────────────────────
let USER = null;
let activeTab = 'agenda';

// ── AUTH ─────────────────────────────────────────────────────────────
let authMode = 'signin';
function showAuth(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';

}
document.getElementById('auth-submit').onclick = async function(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-password').value;

      authMode='signin'; updateAuthUI();
    }
  } catch(e){
    errEl.textContent=e.message||'Something went wrong.'; errEl.style.display='block';
  }
  this.textContent=authMode==='signin'?'Sign in':'Create account'; this.disabled=false;
};
document.getElementById('auth-switch-btn').onclick=function(){
  authMode=authMode==='signin'?'signup':'signin'; updateAuthUI();
};
function updateAuthUI(){
  document.getElementById('auth-submit').textContent=authMode==='signin'?'Sign in':'Create account';
  document.getElementById('auth-switch-text').innerHTML=authMode==='signin'
    ?'No account? <button class="link-btn" id="auth-switch-btn">Create one</button>'
    :'Have an account? <button class="link-btn" id="auth-switch-btn">Sign in</button>';
  document.getElementById('auth-switch-btn').onclick=function(){
    authMode=authMode==='signin'?'signup':'signin'; updateAuthUI();
  };
}
document.getElementById('sign-out-btn').onclick=async function(){ await sb.auth.signOut(); };
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    activeTab=this.dataset.tab;
    ['agenda','clients','skills'].forEach(t=>{
      document.getElementById('tab-'+t).style.display=t===activeTab?'block':'none';
    });
    renderTab(activeTab);
  };
});
sb.auth.onAuthStateChange((_,sess)=>{
  USER=sess?.user||null;
  if(USER) showApp(); else showAuth();
});
sb.auth.getSession().then(({data})=>{
  USER=data.session?.user||null;
  if(USER) showApp(); else showAuth();
});

// ── MODAL HELPERS ────────────────────────────────────────────────────
function openModal(contentFn){
  const root=document.getElementById('modal-root');
  clearEl(root);
  const overlay=el('div',{class:'modal-overlay'});
  const box=el('div',{class:'modal-box'});
  overlay.appendChild(box);
  overlay.onclick=e=>{ if(e.target===overlay) closeModal(); };
  contentFn(box,()=>closeModal());
  root.appendChild(overlay);
}
function closeModal(){ clearEl(document.getElementById('modal-root')); }

// ── RENDER DISPATCH ──────────────────────────────────────────────────
function renderTab(t){
  if(t==='agenda') renderAgenda();
  if(t==='clients') renderClients();
  if(t==='skills') renderSkills();
}

// ════════════════════════════════════════════════════════════════════
// AGENDA
// ════════════════════════════════════════════════════════════════════
let agState={steps:[],logs:{},view:'today'};

async function renderAgenda(){
  const wrap=document.getElementById('tab-agenda');
  clearEl(wrap); wrap.innerHTML='<p style="color:var(--dim);font-size:13px;padding:40px 0;text-align:center">Loading agenda...</p>';
  const today=todayISO();
  const [{data:steps},{data:logsArr}]=await Promise.all([
    sb.from('agenda_steps').select('*').eq('active',true).order('sort_order',{ascending:true}),
    sb.from('agenda_logs').select('*').eq('log_date',today)
  ]);
  const logs={};
  (logsArr||[]).forEach(l=>logs[l.step_id]=l);
  agState={steps:steps||[],logs,view:agState.view};
  paintAgenda();
}

function paintAgenda(){
  const wrap=document.getElementById('tab-agenda');
  clearEl(wrap);
  if(agState.view==='weekly'){ paintWeekly(wrap); return; }
  const today=todayISO();
  const stepsWithStatus=agState.steps.map(s=>({...s,done:!!(agState.logs[s.id]?.completed)}));
  const completed=stepsWithStatus.filter(s=>s.done).length;
  const total=stepsWithStatus.length;

  // header row
  const hrow=el('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;gap:16px;'});
  const htext=el('div',{});
  htext.appendChild(el('div',{style:'font-size:13px;color:var(--dim);margin-bottom:4px;'},[fmtLong(new Date())]));
  htext.appendChild(el('h2',{class:'serif',style:'font-size:20px;line-height:1.3;max-width:200px;'},[completed===total&&total>0?'All done. 🔥':'Stay on course.']));
  hrow.appendChild(htext);
  hrow.appendChild(buildRing(stepsWithStatus,110));
  wrap.appendChild(hrow);

  // quote
  wrap.appendChild(el('div',{class:'quote-block'},['"'+todayQuote()+'"']));

  // row controls
  const crow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;'});
  const wkBtn=el('button',{class:'btn-ghost',onClick:()=>{ agState.view='weekly'; paintAgenda(); }},['Weekly summary →']);
  const addBtn=el('button',{class:'btn-primary',onClick:()=>openStepModal()},['+ Add step']);
  crow.appendChild(wkBtn); crow.appendChild(addBtn);
  wrap.appendChild(crow);

  if(total===0){
    wrap.appendChild(buildEmpty('No agenda yet','Build your day from scratch — prayer, work blocks, a walk, whatever anchors you.','+ Add first step',()=>openStepModal()));
    return;
  }
  // group by category
  const groups={};
  stepsWithStatus.forEach(s=>{ const c=s.category||'General'; if(!groups[c]) groups[c]=[]; groups[c].push(s); });
  Object.entries(groups).forEach(([cat,items])=>{
    wrap.appendChild(el('div',{class:'cat-label'},[cat]));
    const col=el('div',{style:'display:flex;flex-direction:column;gap:8px;'});
    items.forEach(step=>{ col.appendChild(buildStepCard(step,today)); });
    wrap.appendChild(col);
  });
}

function buildRing(steps,size){
  const total=steps.length||1;
  const completed=steps.filter(s=>s.done).length;
  const cx=size/2, cy=size/2, r=size/2-10;
  const circ=2*Math.PI*r;
  const gap=steps.length>1?4:0;
  const segLen=(circ-gap*total)/total;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',size); svg.setAttribute('height',size);
  svg.setAttribute('viewBox',`0 0 ${size} ${size}`);
  if(steps.length===0){
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
    c.setAttribute('fill','none'); c.setAttribute('stroke','var(--div)'); c.setAttribute('stroke-width','8');
    svg.appendChild(c);
  }
  let cursor=-Math.PI/2;
  steps.forEach(step=>{
    const angle=(segLen+gap)/r;
    const pathD=svgArc(cx,cy,r,cursor,cursor+angle-(gap/r));
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',pathD); path.setAttribute('fill','none');
    path.setAttribute('stroke',step.done?'var(--sage)':'var(--div)');
    path.setAttribute('stroke-width','8'); path.setAttribute('stroke-linecap','round');
    path.style.transition='stroke 0.4s ease';
    svg.appendChild(path);
    cursor+=angle;
  });
  const wrap=el('div',{class:'anchor-wrap'});
  wrap.appendChild(svg);
  const inner=el('div',{class:'anchor-count'});
  const num=el('div',{class:'anchor-num serif'},[completed+'/'+steps.length]);
  const lbl=el('div',{class:'anchor-lbl'},['today']);
  inner.appendChild(num); inner.appendChild(lbl);
  wrap.appendChild(inner);
  return wrap;
}
function svgArc(cx,cy,r,a1,a2){
  const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
  const large=(a2-a1)>Math.PI?1:0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function buildStepCard(step,today){
  const card=el('div',{class:'step-card'+(step.done?' done':'')});
  const checkBtn=el('button',{class:'check-btn'+(step.done?' done':'')});
  if(step.done){
    checkBtn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0E1310" stroke-width="3" stroke-linecap="round"/></svg>';
  }
  checkBtn.onclick=async()=>{
    const newDone=!step.done;
    await sb.from('agenda_logs').upsert({
      user_id:USER.id,step_id:step.id,log_date:today,
      completed:newDone,completed_at:newDone?new Date().toISOString():null
    },{onConflict:'step_id,log_date'});
    agState.logs[step.id]=agState.logs[step.id]||{};
    agState.logs[step.id].completed=newDone;
    agState.steps=agState.steps.map(s=>s.id===step.id?{...s}:s);
    paintAgenda();
  };
  const title=el('div',{class:'step-title'+(step.done?' done':'')},[step.title]);
  const actions=el('div',{style:'display:flex;gap:6px;'});
  let actionsVisible=false;
  title.onclick=()=>{
    actionsVisible=!actionsVisible;
    actions.style.display=actionsVisible?'flex':'none';
  };
  const editBtn=el('button',{class:'btn-sm',onClick:()=>openStepModal(step)},['Edit']);
  const delBtn=el('button',{class:'btn-sm btn-danger',onClick:async()=>{
    await sb.from('agenda_steps').update({active:false}).eq('id',step.id);
    agState.steps=agState.steps.filter(s=>s.id!==step.id);
    paintAgenda();
  }},['Remove']);
  actions.appendChild(editBtn); actions.appendChild(delBtn);
  actions.style.display='none';
  card.appendChild(checkBtn); card.appendChild(title); card.appendChild(actions);
  return card;
}

function openStepModal(step){
  openModal((box,close)=>{
    box.appendChild(el('h2',{class:'serif'},[step?'Edit step':'Add a step']));
    const form=el('div',{class:'form-stack'});
    const titleIn=el('input',{type:'text',placeholder:'e.g. Morning prayer, Walk, Edit client video'},[]);
    const catIn=el('input',{type:'text',placeholder:'e.g. Prayer, Health, Work, Habit'},[]);
    if(step){ titleIn.value=step.title||''; catIn.value=step.category||''; }
    form.appendChild(buildField('What is it?',titleIn));
    form.appendChild(buildField('Category (optional)',catIn));
    const actions=el('div',{class:'modal-actions'});
    const cancel=el('button',{class:'cancel',onClick:close},['Cancel']);
    const save=el('button',{class:'save',onClick:async()=>{
      const t=titleIn.value.trim(); if(!t) return;
      if(step){
        const {data}=await sb.from('agenda_steps').update({title:t,category:catIn.value.trim()||'General'}).eq('id',step.id).select().single();
        if(data){ agState.steps=agState.steps.map(s=>s.id===step.id?data:s); }
      } else {
        const maxO=agState.steps.reduce((m,s)=>Math.max(m,s.sort_order||0),0);
        const {data}=await sb.from('agenda_steps').insert({user_id:USER.id,title:t,category:catIn.value.trim()||'General',sort_order:maxO+1}).select().single();
        if(data){ agState.steps=[...agState.steps,data]; }
      }
      close(); paintAgenda();
    }},[step?'Save changes':'Add step']);
    actions.appendChild(cancel); actions.appendChild(save);
    form.appendChild(actions);
    box.appendChild(form);
    setTimeout(()=>titleIn.focus(),50);
  });
}

async function paintWeekly(wrap){
  const back=el('button',{class:'btn-ghost',style:'margin-bottom:20px;',onClick:()=>{ agState.view='today'; paintAgenda(); }},['← Back to today']);
  wrap.appendChild(back);
  wrap.appendChild(el('h2',{class:'serif',style:'font-size:22px;margin-bottom:22px;'},['This week']));
  const dates=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); dates.push(d); }
  const isoStart=dates[0].toISOString().slice(0,10);
  const [{data:stepsD},{data:logsD}]=await Promise.all([
    sb.from('agenda_steps').select('id').eq('active',true),
    sb.from('agenda_logs').select('log_date,completed').gte('log_date',isoStart).eq('completed',true)
  ]);
  const totalSteps=(stepsD||[]).length;
  const counts={};
  (logsD||[]).forEach(l=>{ counts[l.log_date]=(counts[l.log_date]||0)+1; });
  const chartData=dates.map(d=>{
    const iso=d.toISOString().slice(0,10);
    return {label:d.toLocaleDateString(undefined,{weekday:'short'}),pct:totalSteps>0?Math.round(((counts[iso]||0)/totalSteps)*100):0};
  });
  const chart=el('div',{class:'bar-chart'});
  chartData.forEach(({label,pct})=>{
    const col=el('div',{class:'bar-col'});
    col.appendChild(el('div',{class:'bar-pct'},[pct+'%']));
    const bar=el('div',{class:'bar-fill',style:`height:${Math.max(pct,3)}%;opacity:${pct>0?1:0.2};`},[]);
    col.appendChild(bar);
    col.appendChild(el('div',{class:'bar-day'},[label]));
    chart.appendChild(col);
  });
  wrap.appendChild(chart);
}

// ════════════════════════════════════════════════════════════════════
// CLIENTS
// ════════════════════════════════════════════════════════════════════
let clState={clients:[],projects:[],activeClientId:null};

async function renderClients(){
  const wrap=document.getElementById('tab-clients');
  clearEl(wrap); wrap.innerHTML='<p style="color:var(--dim);font-size:13px;padding:40px 0;text-align:center">Loading clients...</p>';
  const [{data:clients},{data:projects}]=await Promise.all([
    sb.from('clients').select('*').order('created_at',{ascending:false}),
    sb.from('projects').select('*').order('created_at',{ascending:false})
  ]);
  clState={clients:clients||[],projects:projects||[],activeClientId:clState.activeClientId};
  paintClients();
}

function paintClients(){
  const wrap=document.getElementById('tab-clients');
  clearEl(wrap);
  const ac=clState.clients.find(c=>c.id===clState.activeClientId);
  if(ac){ paintClientDetail(wrap,ac); return; }
  const toprow=el('div',{class:'toprow'});
  toprow.appendChild(el('h2',{class:'serif',style:'font-size:22px;'},['Clients']));
  toprow.appendChild(el('button',{class:'btn-primary',onClick:()=>openClientModal()},['+ Add client']));
  wrap.appendChild(toprow);
  if(clState.clients.length===0){
    wrap.appendChild(buildEmpty('No clients yet','Add your first client to start tracking projects and payments.','+ Add client',()=>openClientModal()));
    return;
  }
  const list=el('div',{style:'display:flex;flex-direction:column;gap:10px;'});
  clState.clients.forEach(c=>{
    const cp=clState.projects.filter(p=>p.client_id===c.id);
    const unpaid=cp.filter(p=>p.payment_status!=='paid').length;
    const row=el('div',{class:'card',style:'cursor:pointer;'});
    row.onclick=()=>{ clState.activeClientId=c.id; paintClients(); };
    const inner=el('div',{class:'client-row'});
    const info=el('div',{});
    info.appendChild(el('div',{style:'font-size:15px;font-weight:600;margin-bottom:3px;'},[c.name]));
    info.appendChild(el('div',{style:'font-size:12.5px;color:var(--dim);'},[cp.length+' project'+(cp.length!==1?'s':'')+( unpaid>0?' · '+unpaid+' unpaid':'' )]));
    const del=el('button',{class:'btn-sm btn-danger',style:'margin-left:auto;',onClick:async(e)=>{
      e.stopPropagation();
      if(!confirm('Delete '+c.name+'?')) return;
      await sb.from('clients').delete().eq('id',c.id);
      clState.clients=clState.clients.filter(x=>x.id!==c.id);
      paintClients();
    }},['Delete']);
    inner.appendChild(info); inner.appendChild(del);
    row.appendChild(inner);
    list.appendChild(row);
  });
  wrap.appendChild(list);
}

function paintClientDetail(wrap,client){
  const cp=clState.projects.filter(p=>p.client_id===client.id);
  wrap.appendChild(el('button',{class:'btn-ghost',style:'margin-bottom:18px;',onClick:()=>{ clState.activeClientId=null; paintClients(); }},['← All clients']));
  wrap.appendChild(el('h2',{class:'serif',style:'font-size:22px;margin-bottom:4px;'},[client.name]));
  if(client.contact_info) wrap.appendChild(el('div',{style:'font-size:13px;color:var(--dim);margin-bottom:18px;'},[client.contact_info]));
  wrap.appendChild(el('button',{class:'btn-primary',style:'margin-bottom:18px;',onClick:()=>openProjectModal(client.id)},['+ Add project']));
  if(cp.length===0){
    wrap.appendChild(buildEmpty('No projects yet','Add a project for this client to track status and payment.',null,null));
    return;
  }
  cp.forEach(p=>{
    const card=el('div',{class:'project-card'});
    const toprow=el('div',{style:'display:flex;justify-content:space-between;align-items:flex-start;'});
    const title=el('div',{style:'font-size:14.5px;font-weight:600;'},[p.title]);
    const btns=el('div',{style:'display:flex;gap:6px;flex-shrink:0;margin-left:10px;'});
    const editB=el('button',{class:'btn-sm',onClick:()=>openProjectModal(client.id,p)},['Edit']);
    const delB=el('button',{class:'btn-sm btn-danger',onClick:async()=>{
      if(!confirm('Delete "'+p.title+'"?')) return;
      await sb.from('projects').delete().eq('id',p.id);
      clState.projects=clState.projects.filter(x=>x.id!==p.id);
      paintClients();
    }},['✕']);
    btns.appendChild(editB); btns.appendChild(delB);
    toprow.appendChild(title); toprow.appendChild(btns);
    card.appendChild(toprow);
    const meta=el('div',{class:'project-meta'});
    const payColor=p.payment_status==='paid'?'var(--sage)':p.payment_status==='partial'?'#D9B45A':'var(--terra)';
    meta.appendChild(el('span',{class:'badge',style:'color:var(--dim);'},[p.status?.replace('_',' ')||'in progress']));
    meta.appendChild(el('span',{class:'badge',style:'color:'+payColor+';'},[p.payment_status||'unpaid']));
    if(p.price!=null) meta.appendChild(el('span',{class:'badge',style:'color:var(--dim);'},['৳'+p.price]));
    if(p.deadline) meta.appendChild(el('span',{class:'badge',style:'color:var(--dim);'},['Due '+p.deadline]));
    card.appendChild(meta);
    if(p.notes) card.appendChild(el('div',{style:'font-size:12.5px;color:var(--dim);margin-top:8px;line-height:1.5;'},[p.notes]));
    wrap.appendChild(card);
  });
}

function openClientModal(){
  openModal((box,close)=>{
    box.appendChild(el('h2',{class:'serif'},['Add client']));
    const form=el('div',{class:'form-stack'});
    const nameIn=el('input',{type:'text',placeholder:'Name or business'},[]);
    const contactIn=el('input',{type:'text',placeholder:'Phone, email, WhatsApp...'},[]);
    const notesIn=el('textarea',{rows:'2',placeholder:'Anything to remember'},[]);
    form.appendChild(buildField('Name',nameIn));
    form.appendChild(buildField('Contact (optional)',contactIn));
    form.appendChild(buildField('Notes (optional)',notesIn));
    const acts=el('div',{class:'modal-actions'});
    acts.appendChild(el('button',{class:'cancel',onClick:close},['Cancel']));
    acts.appendChild(el('button',{class:'save',onClick:async()=>{
      const n=nameIn.value.trim(); if(!n) return;
      const {data}=await sb.from('clients').insert({user_id:USER.id,name:n,contact_info:contactIn.value.trim(),notes:notesIn.value.trim()}).select().single();
      if(data){ clState.clients=[data,...clState.clients]; }
      close(); paintClients();
    }},['Add client']));
    form.appendChild(acts);
    box.appendChild(form);
    setTimeout(()=>nameIn.focus(),50);
  });
}

function openProjectModal(clientId,project){
  openModal((box,close)=>{
    box.appendChild(el('h2',{class:'serif'},[project?'Edit project':'Add project']));
    const form=el('div',{class:'form-stack'});
    const titleIn=el('input',{type:'text',placeholder:'e.g. Wedding highlight reel'},[]);
    const statusIn=el('input',{type:'text',placeholder:'e.g. in_progress, review, delivered'},[]);
    const paySelect=el('select',{},[]);
    ['unpaid','partial','paid'].forEach(v=>{ const o=el('option',{value:v},[v]); paySelect.appendChild(o); });
    const priceIn=el('input',{type:'number',placeholder:'Amount (৳)'},[]);
    const deadlineIn=el('input',{type:'date'},[]);
    const notesIn=el('textarea',{rows:'2',placeholder:'Notes'},[]);
    if(project){
      titleIn.value=project.title||''; statusIn.value=project.status||'in_progress';
      paySelect.value=project.payment_status||'unpaid';
      if(project.price!=null) priceIn.value=project.price;
      if(project.deadline) deadlineIn.value=project.deadline;
      notesIn.value=project.notes||'';
    }
    form.appendChild(buildField('Title',titleIn));
    form.appendChild(buildField('Status',statusIn));
    form.appendChild(buildField('Payment status',paySelect));
    form.appendChild(buildField('Price (optional)',priceIn));
    form.appendChild(buildField('Deadline (optional)',deadlineIn));
    form.appendChild(buildField('Notes (optional)',notesIn));
    const acts=el('div',{class:'modal-actions'});
    acts.appendChild(el('button',{class:'cancel',onClick:close},['Cancel']));
    acts.appendChild(el('button',{class:'save',onClick:async()=>{
      const t=titleIn.value.trim(); if(!t) return;
      const payload={title:t,status:statusIn.value.trim()||'in_progress',payment_status:paySelect.value,price:priceIn.value===''?null:Number(priceIn.value),deadline:deadlineIn.value||null,notes:notesIn.value.trim()};
      if(project){
        const {data}=await sb.from('projects').update(payload).eq('id',project.id).select().single();
        if(data){ clState.projects=clState.projects.map(p=>p.id===project.id?data:p); }
      } else {
        const {data}=await sb.from('projects').insert({user_id:USER.id,client_id:clientId,...payload}).select().single();
        if(data){ clState.projects=[data,...clState.projects]; }
      }
      close(); paintClients();
    }},[project?'Save changes':'Add project']));
    form.appendChild(acts);
    box.appendChild(form);
    setTimeout(()=>titleIn.focus(),50);
  });
}

// ════════════════════════════════════════════════════════════════════
// SKILLS
// ════════════════════════════════════════════════════════════════════
let skState={skills:[],milestones:[],activeSkillId:null};

async function renderSkills(){
  const wrap=document.getElementById('tab-skills');
  clearEl(wrap); wrap.innerHTML='<p style="color:var(--dim);font-size:13px;padding:40px 0;text-align:center">Loading skills...</p>';
  const [{data:skills},{data:ms}]=await Promise.all([
    sb.from('skills').select('*').order('created_at',{ascending:false}),
    sb.from('skill_milestones').select('*').order('sort_order',{ascending:true})
  ]);
  skState={skills:skills||[],milestones:ms||[],activeSkillId:skState.activeSkillId};
  paintSkills();
}

function paintSkills(){
  const wrap=document.getElementById('tab-skills');
  clearEl(wrap);
  const as=skState.skills.find(s=>s.id===skState.activeSkillId);
  if(as){ paintSkillDetail(wrap,as); return; }
  const toprow=el('div',{class:'toprow'});
  toprow.appendChild(el('h2',{class:'serif',style:'font-size:22px;'},['Skills']));
  toprow.appendChild(el('button',{class:'btn-primary',onClick:()=>openSkillModal()},['+ Add skill']));
  wrap.appendChild(toprow);
  if(skState.skills.length===0){
    wrap.appendChild(buildEmpty('No skills tracked','Add a skill — Premiere Pro, After Effects, Muay Thai — and set milestones to chart your climb.','+ Add skill',()=>openSkillModal()));
    return;
  }
  const list=el('div',{style:'display:flex;flex-direction:column;gap:10px;'});
  skState.skills.forEach(s=>{
    const ms=skState.milestones.filter(m=>m.skill_id===s.id);
    const done=ms.filter(m=>m.completed).length;
    const card=el('div',{class:'card',style:'cursor:pointer;',onClick:()=>{ skState.activeSkillId=s.id; paintSkills(); }});
    const toprow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;'});
    toprow.appendChild(el('div',{style:'font-size:15px;font-weight:600;'},[s.name]));
    const del=el('button',{class:'btn-sm btn-danger',onClick:async(e)=>{
      e.stopPropagation();
      if(!confirm('Delete "'+s.name+'"?')) return;
      await sb.from('skills').delete().eq('id',s.id);
      skState.skills=skState.skills.filter(x=>x.id!==s.id);
      paintSkills();
    }},['Delete']);
    toprow.appendChild(del);
    card.appendChild(toprow);
    const pb=el('div',{class:'progress-bar'});
    pb.appendChild(el('div',{class:'progress-fill',style:'width:'+s.overall_progress+'%;'}));
    card.appendChild(pb);
    card.appendChild(el('div',{style:'font-size:11.5px;color:var(--dim);'},[s.overall_progress+'%'+(ms.length>0?' · '+done+'/'+ms.length+' milestones':'')]));
    list.appendChild(card);
  });
  wrap.appendChild(list);
}

function paintSkillDetail(wrap,skill){
  const liveSkill=skState.skills.find(s=>s.id===skill.id)||skill;
  const ms=skState.milestones.filter(m=>m.skill_id===liveSkill.id);
  wrap.appendChild(el('button',{class:'btn-ghost',style:'margin-bottom:18px;',onClick:()=>{ skState.activeSkillId=null; paintSkills(); }},['← All skills']));
  wrap.appendChild(el('h2',{class:'serif',style:'font-size:22px;margin-bottom:4px;'},[liveSkill.name]));
  if(liveSkill.description) wrap.appendChild(el('div',{style:'font-size:13px;color:var(--dim);margin-bottom:14px;'},[liveSkill.description]));

  // progress section
  const progWrap=el('div',{style:'margin-bottom:22px;'});
  const progLabel=el('div',{style:'display:flex;justify-content:space-between;font-size:12.5px;color:var(--dim);margin-bottom:6px;'});
  progLabel.appendChild(el('span',{},'Overall progress'));
  const pctSpan=el('span',{},[liveSkill.overall_progress+'%']);
  progLabel.appendChild(pctSpan);
  progWrap.appendChild(progLabel);
  const pb=el('div',{class:'progress-bar',style:'height:9px;'});
  const fill=el('div',{class:'progress-fill',style:'width:'+liveSkill.overall_progress+'%;'});
  pb.appendChild(fill); progWrap.appendChild(pb);
  if(ms.length===0){
    const slider=el('input',{type:'range',min:'0',max:'100',value:liveSkill.overall_progress,style:'margin-top:10px;'});
    slider.oninput=function(){
      const v=Number(this.value);
      fill.style.width=v+'%'; pctSpan.textContent=v+'%';
    };
    slider.onchange=async function(){
      const v=Number(this.value);
      const {data}=await sb.from('skills').update({overall_progress:v}).eq('id',liveSkill.id).select().single();
      if(data) skState.skills=skState.skills.map(s=>s.id===liveSkill.id?data:s);
    };
    progWrap.appendChild(slider);
    progWrap.appendChild(el('div',{style:'font-size:11px;color:var(--dim);margin-top:4px;'},['Drag to set manually, or add milestones to auto-track.']));
  }
  wrap.appendChild(progWrap);

  // milestones
  const msRow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;'});
  msRow.appendChild(el('div',{style:'font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);'},['Milestones']));
  msRow.appendChild(el('button',{class:'btn-primary',style:'font-size:11.5px;padding:5px 11px;',onClick:()=>openMilestoneModal(liveSkill)},['+ Add']));
  wrap.appendChild(msRow);

  if(ms.length===0){
    wrap.appendChild(el('div',{style:'font-size:12.5px;color:var(--dim);padding:10px 0;'},['No milestones yet. Add steps like "Finish basics course" or "Complete 5 sparring sessions."']));
    return;
  }
  const msList=el('div',{style:'display:flex;flex-direction:column;gap:8px;'});
  ms.forEach(m=>{
    const row=el('div',{class:'milestone-row'});
    const chk=el('button',{class:'ms-check'+(m.completed?' done':'')});
    if(m.completed) chk.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#0E1310" stroke-width="3" stroke-linecap="round"/></svg>';
    chk.onclick=async()=>{
      await sb.from('skill_milestones').update({completed:!m.completed}).eq('id',m.id);
      skState.milestones=skState.milestones.map(x=>x.id===m.id?{...x,completed:!m.completed}:x);
      // recalculate progress
      const fresh=skState.milestones.filter(x=>x.skill_id===liveSkill.id);
      const pct=Math.round((fresh.filter(x=>x.completed).length/fresh.length)*100);
      const {data}=await sb.from('skills').update({overall_progress:pct}).eq('id',liveSkill.id).select().single();
      if(data) skState.skills=skState.skills.map(s=>s.id===liveSkill.id?data:s);
      paintSkillDetail(wrap,liveSkill);
    };
    const title=el('div',{class:'ms-title'+(m.completed?' done':'')},[m.title]);
    const del=el('button',{class:'btn-sm btn-danger',onClick:async()=>{
      await sb.from('skill_milestones').delete().eq('id',m.id);
      skState.milestones=skState.milestones.filter(x=>x.id!==m.id);
      const fresh=skState.milestones.filter(x=>x.skill_id===liveSkill.id);
      if(fresh.length>0){
        const pct=Math.round((fresh.filter(x=>x.completed).length/fresh.length)*100);
        const {data}=await sb.from('skills').update({overall_progress:pct}).eq('id',liveSkill.id).select().single();
        if(data) skState.skills=skState.skills.map(s=>s.id===liveSkill.id?data:s);
      }
      paintSkillDetail(wrap,liveSkill);
    }},['✕']);
    row.appendChild(chk); row.appendChild(title); row.appendChild(del);
    msList.appendChild(row);
  });
  wrap.appendChild(msList);
}

function openSkillModal(){
  openModal((box,close)=>{
    box.appendChild(el('h2',{class:'serif'},['Add skill']));
    const form=el('div',{class:'form-stack'});
    const nameIn=el('input',{type:'text',placeholder:'e.g. After Effects, Muay Thai, Bangla copywriting'},[]);
    const descIn=el('textarea',{rows:'2',placeholder:'What does mastering this look like?'},[]);
    form.appendChild(buildField('Skill',nameIn));
    form.appendChild(buildField('Description (optional)',descIn));
    const acts=el('div',{class:'modal-actions'});
    acts.appendChild(el('button',{class:'cancel',onClick:close},['Cancel']));
    acts.appendChild(el('button',{class:'save',onClick:async()=>{
      const n=nameIn.value.trim(); if(!n) return;
      const {data}=await sb.from('skills').insert({user_id:USER.id,name:n,description:descIn.value.trim(),overall_progress:0}).select().single();
      if(data){ skState.skills=[data,...skState.skills]; }
      close(); paintSkills();
    }},['Add skill']));
    form.appendChild(acts);
    box.appendChild(form);
    setTimeout(()=>nameIn.focus(),50);
  });
}

function openMilestoneModal(skill){
  openModal((box,close)=>{
    box.appendChild(el('h2',{class:'serif'},['Add milestone']));
    const form=el('div',{class:'form-stack'});
    const titleIn=el('input',{type:'text',placeholder:'e.g. Finish basics course, Spar 5 times'},[]);
    form.appendChild(buildField('Milestone',titleIn));
    const acts=el('div',{class:'modal-actions'});
    acts.appendChild(el('button',{class:'cancel',onClick:close},['Cancel']));
    acts.appendChild(el('button',{class:'save',onClick:async()=>{
      const t=titleIn.value.trim(); if(!t) return;
      const ms=skState.milestones.filter(m=>m.skill_id===skill.id);
      const maxO=ms.reduce((m,x)=>Math.max(m,x.sort_order||0),0);
      const {data}=await sb.from('skill_milestones').insert({user_id:USER.id,skill_id:skill.id,title:t,sort_order:maxO+1}).select().single();
      if(data){ skState.milestones=[...skState.milestones,data]; }
      close();
      const wrap=document.getElementById('tab-skills');
      clearEl(wrap);
      paintSkillDetail(wrap,skill);
    }},['Add milestone']));
    form.appendChild(acts);
    box.appendChild(form);
    setTimeout(()=>titleIn.focus(),50);
  });
}

// ── SHARED UTILS ─────────────────────────────────────────────────────
function buildField(label,input){
  const f=el('label',{class:'field'});
  f.appendChild(document.createTextNode(label));
  f.appendChild(input);
  return f;
}
function buildEmpty(title,body,btnLabel,btnAction){
  const d=el('div',{class:'empty'});
  d.appendChild(el('h3',{},[title]));
  d.appendChild(el('p',{},[body]));
  if(btnLabel) d.appendChild(el('button',{class:'btn-primary',onClick:btnAction},[btnLabel]));
  return d;
}
