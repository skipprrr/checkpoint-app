<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Skippieverse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000000;
  --bg2:#0A0A0A;
  --card:#1C1C1E;
  --card2:#2C2C2E;
  --card3:#3A3A3C;
  --text:#FFFFFF;
  --text2:#EBEBF5CC;
  --text3:#EBEBF599;
  --sep:#38383A;
  --blue:#0A84FF;
  --green:#30D158;
  --red:#FF453A;
  --yellow:#FFD60A;
  --orange:#FF9F0A;
  --r:12px;
  --r2:16px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:16px;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;border:none;outline:none;}
input,select,textarea{
  font-family:inherit;font-size:16px;background:var(--card2);border:none;
  color:var(--text);border-radius:10px;padding:12px 14px;width:100%;outline:none;
  -webkit-appearance:none;appearance:none;
}
input::placeholder,textarea::placeholder{color:var(--text3);}
select option{background:var(--card);}
textarea{resize:none;}
input[type=time]{color-scheme:dark;}
input[type=date]{color-scheme:dark;}
input[type=range]{-webkit-appearance:none;height:4px;background:var(--card3);border-radius:4px;width:100%;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--blue);cursor:pointer;}

/* Layout */
#root{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;}
#auth-screen{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px;}
#app{display:flex;flex-direction:column;flex:1;}
.content{flex:1;overflow-y:auto;padding-bottom:90px;}
.page{padding:20px 16px;}

/* Bottom Nav */
#bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--sep);padding:8px 0 24px;
  display:flex;justify-content:space-around;z-index:100;
}
.nav-btn{background:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 16px;color:var(--text3);font-size:10px;font-weight:500;}
.nav-btn.active{color:var(--blue);}
.nav-btn svg{width:24px;height:24px;}
.nav-icon{font-size:22px;line-height:1;}

/* Cards */
.card{background:var(--card);border-radius:var(--r2);overflow:hidden;margin-bottom:12px;}
.card-row{padding:14px 16px;border-bottom:1px solid var(--sep);}
.card-row:last-child{border-bottom:none;}
.section-label{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin:24px 0 8px 4px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:600;border:none;cursor:pointer;border-radius:12px;padding:13px 20px;font-size:15px;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-fill{width:100%;}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px;}
.btn-ghost{background:var(--card2);color:var(--text2);}
.btn-red{background:rgba(255,69,58,0.15);color:var(--red);}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card2);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--card);width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:0 0 40px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--card3);border-radius:2px;margin:10px auto 0;}
.modal-header{padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{background:var(--card2);color:var(--text3);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.modal-body{padding:0 16px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:6px;display:block;}
.form-row{display:flex;gap:10px;}
.form-row>*{flex:1;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn{flex:1;padding:14px;}

/* Check circle */
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--sep);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;cursor:pointer;}
.check-circle.done{background:var(--blue);border-color:var(--blue);}
.check-circle.green.done{background:var(--green);border-color:var(--green);}

/* Timeline */
.timeline{position:relative;padding-left:60px;}
.timeline-line{position:absolute;left:44px;top:0;bottom:0;width:2px;background:var(--sep);}
.tl-item{position:relative;margin-bottom:4px;}
.tl-time{position:absolute;left:-60px;width:52px;text-align:right;font-size:11px;color:var(--text3);padding-top:14px;font-weight:500;}
.tl-dot{position:absolute;left:-14px;width:14px;height:14px;border-radius:50%;background:var(--card3);border:2px solid var(--sep);top:14px;transform:translateX(-50%);z-index:1;}
.tl-dot.prayer{background:var(--yellow);border-color:var(--yellow);width:18px;height:18px;top:12px;}
.tl-dot.done{background:var(--blue);border-color:var(--blue);}
.tl-block{background:var(--card);border-radius:10px;padding:12px 14px;margin-left:6px;cursor:pointer;}
.tl-block.prayer-block{background:rgba(255,214,10,0.08);border:1px solid rgba(255,214,10,0.2);}
.tl-block-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.tl-block-sub{font-size:12px;color:var(--text3);}
.tl-add-btn{margin-left:6px;border:1px dashed var(--sep);border-radius:10px;padding:10px 14px;background:transparent;color:var(--text3);font-size:13px;width:calc(100% - 6px);text-align:left;cursor:pointer;}

/* Habit streak */
.streak-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--orange);background:rgba(255,159,10,0.12);padding:2px 7px;border-radius:20px;}

/* Progress bar */
.prog-wrap{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:6px;transition:width 0.4s ease;}

/* Empty state */
.empty{text-align:center;padding:50px 20px;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.5;margin-bottom:20px;}

/* Checkbox row */
.row-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--sep);}
.row-item:last-child{border-bottom:none;}
.row-item-main{flex:1;min-width:0;}
.row-item-title{font-size:15px;font-weight:500;}
.row-item-sub{font-size:12px;color:var(--text3);margin-top:2px;}

/* Tag chips for days */
.day-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.day-chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card2);color:var(--text3);border:none;cursor:pointer;}
.day-chip.on{background:var(--blue);color:#fff;}

/* Auth */
.auth-logo{font-size:32px;font-weight:700;text-align:center;margin-bottom:4px;}
.auth-sub{font-size:14px;color:var(--text3);text-align:center;margin-bottom:36px;}
.auth-err{font-size:13px;color:var(--red);margin:4px 0;}

/* Dashboard widgets */
.dash-hero{background:var(--card);border-radius:var(--r2);padding:20px;margin-bottom:12px;}
.dash-mit{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.dash-date{font-size:13px;color:var(--text3);margin-bottom:16px;}
.stats-row{display:flex;gap:10px;margin-bottom:12px;}
.stat-card{flex:1;background:var(--card);border-radius:var(--r);padding:14px;}
.stat-val{font-size:22px;font-weight:700;margin-bottom:2px;}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:500;}

/* Sub-tabs */
.sub-tabs{display:flex;background:var(--card2);border-radius:10px;padding:2px;margin-bottom:16px;}
.sub-tab{flex:1;padding:7px;border-radius:8px;background:transparent;color:var(--text3);font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;}
.sub-tab.active{background:var(--card3);color:var(--text);}

/* Swipe actions hint */
.hint{font-size:11px;color:var(--text3);text-align:right;margin-bottom:4px;}
</style>
</head>
<body>
<div id="root">
  <div id="auth-screen" style="display:none;">
    <div style="width:100%;max-width:360px;">
      <div class="auth-logo">Skippieverse</div>
      <div class="auth-sub">Clarity in chaos.</div>
      <div class="form-group"><input type="email" id="a-email" placeholder="Email"/></div>
      <div class="form-group"><input type="password" id="a-pw" placeholder="Password"/></div>
      <div class="auth-err" id="a-err" style="display:none;"></div>
      <button class="btn btn-blue btn-fill" id="a-btn" style="margin-top:8px;">Sign in</button>
    </div>
  </div>
  <div id="app" style="display:none;flex-direction:column;flex:1;">
    <div class="content" id="content"></div>
    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="home">
        <span class="nav-icon">⌂</span><span>Home</span>
      </button>
      <button class="nav-btn" data-tab="agenda">
        <span class="nav-icon">◷</span><span>Agenda</span>
      </button>
      <button class="nav-btn" data-tab="clients">
        <span class="nav-icon">◈</span><span>Clients</span>
      </button>
      <button class="nav-btn" data-tab="skills">
        <span class="nav-icon">◎</span><span>Skills</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon">⚙</span><span>Settings</span>
      </button>
    </nav>
  </div>
</div>
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const SB_URL="https://aahfamkxawhknagbechd.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaGZhbWt4YXdoa25hZ2JlY2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzUwNDIsImV4cCI6MjA5ODQxMTA0Mn0.j9tQVT2Qsw_WZo9EzKL6pHGyAx0Hlrzn-85IxkSP6i8";
const sb=supabase.createClient(SB_URL,SB_KEY);

const QUOTES=[
  "Discipline is choosing between what you want now and what you want most.",
  "You don't rise to the level of your goals, you fall to the level of your systems.",
  "Consistency is the only flex that compounds.",
  "Show up. Even the version of you that doesn't feel like it.",
  "Anchor first, then move.",
  "What gets logged, gets built.",
  "Your routine is the proof, not the plan.",
  "Small steps repeated become the whole staircase.",
  "Chaos is just clarity you haven't built yet.",
  "Today is one more brick. Lay it straight.",
];

const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
const DAY_LABELS=['S','M','T','W','T','F','S'];
const PRAYERS=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
const CURRENCIES=['BDT','USD','EUR','GBP','CAD','AUD','SGD','AED','INR'];

let USER=null;
let activeTab='home';
let agendaSubTab='timeline';

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function todayISO(){const d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function fmtDate(d){return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});}
function todayQuote(){return QUOTES[Math.floor(Date.now()/86400000)%QUOTES.length];}
function todayDow(){return DAYS[new Date().getDay()];}
function daysUntil(iso){if(!iso)return null;const d=new Date(iso);const t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='cls')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='txt')e.textContent=v;
    else if(k==='style')e.style.cssText=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(children)children.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function clr(e){while(e.firstChild)e.removeChild(e.firstChild);}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
sb.auth.onAuthStateChange((_,sess)=>{USER=sess?.user||null;USER?launchApp():launchAuth();});
sb.auth.getSession().then(({data})=>{USER=data.session?.user||null;USER?launchApp():launchAuth();});

function launchAuth(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function launchApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  seedPrayerTimes();
  renderTab('home');
}

document.getElementById('a-btn').onclick=async function(){
  const email=document.getElementById('a-email').value.trim();
  const pw=document.getElementById('a-pw').value;
  const err=document.getElementById('a-err');
  err.style.display='none';this.textContent='...';this.disabled=true;
  const {error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;err.style.display='block';}
  this.textContent='Sign in';this.disabled=false;
};

// ═══════════════════════════════════════════════════════════
// SEED PRAYER TIMES
// ═══════════════════════════════════════════════════════════
async function seedPrayerTimes(){
  const {data}=await sb.from('prayer_times').select('id');
  if(data&&data.length>0)return;
  const defaults=[['Fajr','05:15',1],['Dhuhr','12:30',2],['Asr','15:45',3],['Maghrib','18:10',4],['Isha','19:30',5]];
  await sb.from('prayer_times').insert(defaults.map(([name,time,sort_order])=>({user_id:USER.id,name,time,sort_order})));
}

// ═══════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    activeTab=this.dataset.tab;
    renderTab(activeTab);
  };
});
function renderTab(t){
  const c=document.getElementById('content');
  clr(c);
  if(t==='home')renderHome(c);
  else if(t==='agenda')renderAgenda(c);
  else if(t==='clients')renderClients(c);
  else if(t==='skills')renderSkills(c);
  else if(t==='settings')renderSettings(c);
}

// ═══════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════
function openModal(buildFn){
  const root=document.getElementById('modal-root');clr(root);
  const overlay=el('div',{cls:'modal-overlay'});
  const sheet=el('div',{cls:'modal-sheet'});
  sheet.appendChild(el('div',{cls:'modal-handle'}));
  overlay.onclick=e=>{if(e.target===overlay)closeModal();};
  buildFn(sheet,closeModal);
  overlay.appendChild(sheet);root.appendChild(overlay);
}
function closeModal(){clr(document.getElementById('modal-root'));}
function modalHeader(title){
  const h=el('div',{cls:'modal-header'});
  h.appendChild(el('div',{cls:'modal-title',txt:title}));
  h.appendChild(el('button',{cls:'modal-close',txt:'✕',onClick:closeModal}));
  return h;
}
function modalBody(){return el('div',{cls:'modal-body'});}
function fGroup(label,input){
  const g=el('div',{cls:'form-group'});
  if(label)g.appendChild(el('label',{cls:'form-label',txt:label}));
  g.appendChild(input);return g;
}
function fInput(placeholder,type,value){
  const i=el('input',{type:type||'text',placeholder:placeholder||''});
  if(value!=null)i.value=value;return i;
}
function fSelect(options,val){
  const s=el('select');
  options.forEach(([v,l])=>{const o=el('option',{value:v,txt:l||v});if(v==val)o.selected=true;s.appendChild(o);});
  return s;
}
function fTextarea(placeholder,value){
  const t=el('textarea',{placeholder:placeholder||'',rows:'2'});
  if(value)t.value=value;return t;
}
function modalActions(cancelLabel,saveLabel,onSave){
  const row=el('div',{cls:'modal-actions'});
  row.appendChild(el('button',{cls:'btn btn-ghost',txt:cancelLabel||'Cancel',onClick:closeModal}));
  row.appendChild(el('button',{cls:'btn btn-blue',txt:saveLabel||'Save',onClick:onSave}));
  return row;
}

// ═══════════════════════════════════════════════════════════
// HOME / DASHBOARD
// ═══════════════════════════════════════════════════════════
async function renderHome(wrap){
  wrap.appendChild(el('div',{cls:'page',html:'<div style="color:var(--text3);font-size:13px;padding:40px 0;text-align:center;">Loading...</div>'}));
  const today=todayISO();
  const dow=todayDow();

  const [{data:todos},{data:habits},{data:habitLogs},{data:projects},{data:skills},{data:clients}]=await Promise.all([
    sb.from('todos').select('*').eq('completed',false).order('is_mit',{ascending:false}),
    sb.from('habits').select('*').eq('active',true),
    sb.from('habit_logs').select('*').eq('log_date',today),
    sb.from('projects').select('*,clients(name,currency)').eq('active',true).neq('status','delivered'),
    sb.from('skills').select('*').eq('is_active',true),
    sb.from('clients').select('*'),
  ]);

  clr(wrap);
  const p=el('div',{cls:'page'});

  // Hero
  const hero=el('div',{cls:'dash-hero'});
  hero.appendChild(el('div',{cls:'dash-date',txt:fmtDate(new Date())}));
  const mit=(todos||[]).find(t=>t.is_mit);
  if(mit){
    hero.appendChild(el('div',{style:'font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;',txt:'Most Important Task'}));
    hero.appendChild(el('div',{cls:'dash-mit',txt:mit.title}));
  } else {
    hero.appendChild(el('div',{cls:'dash-mit',style:'color:var(--text3);font-size:16px;font-style:italic;',txt:'"'+todayQuote()+'"'}));
  }
  p.appendChild(hero);

  // Top 3 todos
  const top3=(todos||[]).filter(t=>!t.is_mit).slice(0,3);
  if(top3.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'Up Next'}));
    const c=el('div',{cls:'card'});
    top3.forEach(t=>{
      const row=el('div',{cls:'card-row',style:'display:flex;align-items:center;gap:10px;'});
      const chk=el('div',{cls:'check-circle',onClick:async()=>{
        await sb.from('todos').update({completed:true,completed_at:new Date().toISOString()}).eq('id',t.id);
        renderTab('home');
      }});
      row.appendChild(chk);
      row.appendChild(el('div',{style:'font-size:14px;font-weight:500;',txt:t.title}));
      c.appendChild(row);
    });
    p.appendChild(c);
  }

  // Habits today
  const todayHabits=(habits||[]).filter(h=>{
    if(!h.days_of_week||h.days_of_week.length===0)return true;
    return h.days_of_week.includes(dow);
  });
  if(todayHabits.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:"Today's Habits"}));
    const c=el('div',{cls:'card'});
    todayHabits.slice(0,5).forEach(h=>{
      const log=(habitLogs||[]).find(l=>l.habit_id===h.id&&l.occurrence===1);
      const done=log?.completed||false;
      const row=el('div',{cls:'card-row',style:'display:flex;align-items:center;gap:10px;'});
      const chk=el('div',{cls:'check-circle green'+(done?' done':''),onClick:async()=>{
        await sb.from('habit_logs').upsert({user_id:USER.id,habit_id:h.id,log_date:today,occurrence:1,completed:!done,completed_at:!done?new Date().toISOString():null},{onConflict:'habit_id,log_date,occurrence'});
        renderTab('home');
      }});
      if(done)chk.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>';
      const right=el('div',{style:'flex:1;display:flex;align-items:center;justify-content:space-between;'});
      right.appendChild(el('div',{style:'font-size:14px;font-weight:500;',txt:h.title}));
      if(h.streak&&h.streak>0)right.appendChild(el('div',{cls:'streak-badge',txt:'🔥 '+h.streak}));
      row.appendChild(chk);row.appendChild(right);
      c.appendChild(row);
    });
    p.appendChild(c);
  }

  // Active projects
  const urgentProjects=(projects||[]).filter(p2=>{const d=daysUntil(p2.deadline);return d!==null&&d<=1;});
  const activeProjects=(projects||[]).slice(0,4);
  if(activeProjects.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'Active Projects'}));
    const c=el('div',{cls:'card'});
    activeProjects.forEach(pr=>{
      const days=daysUntil(pr.deadline);
      const urgent=days!==null&&days<=1;
      const row=el('div',{cls:'card-row'});
      const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;'});
      top.appendChild(el('div',{style:'font-size:14px;font-weight:600;',txt:pr.title}));
      if(pr.deadline){
        const lbl=days===0?'Due today':days<0?'Overdue':days===1?'Due tomorrow':'Due in '+days+'d';
        top.appendChild(el('div',{cls:'pill',style:'font-size:11px;color:'+(urgent?'var(--red)':'var(--text3)')+';',txt:lbl}));
      }
      row.appendChild(top);
      if(pr.clients)row.appendChild(el('div',{style:'font-size:12px;color:var(--text3);margin-top:3px;',txt:pr.clients.name+' · '+capitalizePayStatus(pr.payment_status)}));
      c.appendChild(row);
    });
    p.appendChild(c);
  }

  // Earnings summary — group by currency
  if((projects||[]).length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'Financials'}));
    const earned={},owed={};
    (projects||[]).forEach(pr=>{
      if(!pr.price||!pr.clients)return;
      const cur=pr.clients.currency||'BDT';
      if(pr.payment_status==='paid'){earned[cur]=(earned[cur]||0)+Number(pr.price);}
      else if(pr.payment_status==='unpaid'||pr.payment_status==='partial'){owed[cur]=(owed[cur]||0)+Number(pr.price);}
    });
    const allCurs=[...new Set([...Object.keys(earned),...Object.keys(owed)])];
    if(allCurs.length>0){
      const statsWrap=el('div',{style:'display:flex;flex-direction:column;gap:8px;'});
      allCurs.forEach(cur=>{
        const row=el('div',{cls:'card',style:'padding:14px 16px;'});
        const top=el('div',{style:'font-size:12px;font-weight:600;color:var(--text3);margin-bottom:8px;',txt:cur});
        row.appendChild(top);
        const cols=el('div',{style:'display:flex;gap:16px;'});
        if(earned[cur]!=null){
          const c2=el('div');
          c2.appendChild(el('div',{style:'font-size:18px;font-weight:700;color:var(--green);',txt:fmtMoney(earned[cur],cur)}));
          c2.appendChild(el('div',{style:'font-size:11px;color:var(--text3);',txt:'Earned'}));
          cols.appendChild(c2);
        }
        if(owed[cur]!=null){
          const c2=el('div');
          c2.appendChild(el('div',{style:'font-size:18px;font-weight:700;color:var(--orange);',txt:fmtMoney(owed[cur],cur)}));
          c2.appendChild(el('div',{style:'font-size:11px;color:var(--text3);',txt:'Owed'}));
          cols.appendChild(c2);
        }
        row.appendChild(cols);
        statsWrap.appendChild(row);
      });
      p.appendChild(statsWrap);
    }
  }

  // Active skills
  if((skills||[]).length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'Skills in Progress'}));
    const c=el('div',{cls:'card'});
    (skills||[]).slice(0,4).forEach(s=>{
      const row=el('div',{cls:'card-row'});
      row.appendChild(el('div',{style:'display:flex;justify-content:space-between;margin-bottom:6px;'},[
        el('div',{style:'font-size:14px;font-weight:600;',txt:s.name}),
        el('div',{style:'font-size:12px;color:var(--text3);',txt:s.overall_progress+'%'}),
      ]));
      const pb=el('div',{cls:'prog-wrap'});
      pb.appendChild(el('div',{cls:'prog-fill',style:'width:'+s.overall_progress+'%;'}));
      row.appendChild(pb);
      c.appendChild(row);
    });
    p.appendChild(c);
  }

  wrap.appendChild(p);
}

function fmtMoney(n,cur){
  const sym={BDT:'৳',USD:'$',EUR:'€',GBP:'£',CAD:'CA$',AUD:'A$',SGD:'S$',AED:'د.إ',INR:'₹'};
  return (sym[cur]||cur)+n.toLocaleString();
}
function capitalizePayStatus(s){return s?s.charAt(0).toUpperCase()+s.slice(1).replace('_',' '):'';}

async function loadSubTab(wrap,tab){
  clr(wrap);

// ── TIMELINE ──────────────────────────────────────────────
async function renderTimeline(wrap){
  clr(wrap);
  const today=todayISO();
  const [{data:prayers},{data:blocks},{data:todos},{data:habits},{data:projects},{data:skills}]=await Promise.all([
    sb.from('prayer_times').select('*').order('sort_order'),
    sb.from('timeline_blocks').select('*').eq('block_date',today).order('start_time'),
    sb.from('todos').select('id,title').eq('completed',false),
    sb.from('habits').select('id,title').eq('active',true),
    sb.from('projects').select('id,title').eq('active',true),
    sb.from('skills').select('id,name').eq('is_active',true),
  ]);

  const prayerMap={};
  (prayers||[]).forEach(pr=>prayerMap[pr.name.toLowerCase()]=pr.time);

  // Build 24h segments split by prayers
  const segments=buildTimelineSegments(prayers||[],blocks||[]);

  const tl=el('div',{cls:'timeline'});
  tl.appendChild(el('div',{cls:'timeline-line'}));

  segments.forEach(seg=>{
    if(seg.type==='prayer'){
      const item=el('div',{cls:'tl-item'});
      item.appendChild(el('div',{cls:'tl-time',txt:seg.time}));
      item.appendChild(el('div',{cls:'tl-dot prayer'}));
      const block=el('div',{cls:'tl-block prayer-block'});
      block.appendChild(el('div',{cls:'tl-block-title',txt:'🕌 '+seg.name}));
      item.appendChild(block);
      tl.appendChild(item);
    } else if(seg.type==='block'){
      const b=seg.block;
      const item=el('div',{cls:'tl-item'});
      item.appendChild(el('div',{cls:'tl-time',txt:b.start_time}));
      item.appendChild(el('div',{cls:'tl-dot'+(b.completed?' done':'')}));
      const block=el('div',{cls:'tl-block',style:'border-left:3px solid '+(b.color||'var(--blue)')+';'});
      const brow=el('div',{style:'display:flex;align-items:center;justify-content:space-between;'});
      const titleEl=el('div',{cls:'tl-block-title',txt:b.label||b.block_type});
      const chk=el('div',{cls:'check-circle'+(b.completed?' done':''),style:'width:22px;height:22px;',onClick:async e=>{
        e.stopPropagation();
        await sb.from('timeline_blocks').update({completed:!b.completed}).eq('id',b.id);
        renderTimeline(wrap);
      }});
      if(b.completed)chk.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>';
      brow.appendChild(titleEl);brow.appendChild(chk);
      block.appendChild(brow);
      if(b.duration_mins)block.appendChild(el('div',{cls:'tl-block-sub',txt:b.duration_mins+' min · '+b.block_type}));
      // delete
      block.addEventListener('click',()=>openBlockActions(b,wrap,todos,habits,projects,skills));
      item.appendChild(block);
      tl.appendChild(item);
    } else if(seg.type==='add'){
      const item=el('div',{cls:'tl-item'});
      item.appendChild(el('div',{cls:'tl-time',txt:''}));
      item.appendChild(el('div',{cls:'tl-dot',style:'background:transparent;border:none;'}));
      const addBtn=el('button',{cls:'tl-add-btn',txt:'+ Add block after '+seg.afterPrayer,onClick:()=>{
        openAddBlockModal(today,seg.afterPrayer,wrap,todos,habits,projects,skills);
      }});
      item.appendChild(addBtn);
      tl.appendChild(item);
    }
  });

  // Add free block at end
  const addFree=el('div',{cls:'tl-item',style:'margin-top:10px;'});
  addFree.appendChild(el('div',{cls:'tl-dot',style:'background:transparent;border:none;position:absolute;left:-14px;'}));
  addFree.appendChild(el('button',{cls:'tl-add-btn',txt:'+ Add free block (no prayer anchor)',onClick:()=>{
    openAddBlockModal(today,null,wrap,todos,habits,projects,skills);
  }}));
  tl.appendChild(addFree);

  clr(wrap);wrap.appendChild(tl);
}

function buildTimelineSegments(prayers,blocks){
  const segs=[];
  const usedBlocks=new Set();

  prayers.forEach(pr=>{
    const pKey=pr.name.toLowerCase();
    // blocks anchored before this prayer
    const anchored=blocks.filter(b=>b.prayer_anchor===pKey&&!usedBlocks.has(b.id));
    anchored.forEach(b=>{segs.push({type:'block',block:b});usedBlocks.add(b.id);});
    segs.push({type:'prayer',name:pr.name,time:pr.time});
    // add slot after prayer
    segs.push({type:'add',afterPrayer:pr.name});
  });

  // free blocks (no anchor)
  blocks.filter(b=>!b.prayer_anchor&&!usedBlocks.has(b.id)).forEach(b=>{
    segs.push({type:'block',block:b});
    usedBlocks.add(b.id);
  });

  return segs;
}

function openAddBlockModal(date,prayerAnchor,wrap,todos,habits,projects,skills){
  openModal((sheet,close)=>{
    sheet.appendChild(modalHeader('Add Timeline Block'));
    const body=modalBody();
    const typeSelect=fSelect([['todo','Todo'],['habit','Habit'],['project','Project'],['skill','Skill'],['note','Note']]);
    const refSelect=fSelect([['','— select —']]);
    const labelIn=fInput('Custom label (optional)');
    const timeIn=fInput('','time','09:00');
    const durIn=fInput('Duration (minutes)','number','30');
    const colorIn=fInput('Color','color','#0A84FF');colorIn.style.height='40px';colorIn.style.padding='4px';

    function updateRefs(){
      clr(refSelect);
      const type=typeSelect.value;
      let opts=[['','— select —']];
      if(type==='todo')(todos||[]).forEach(t=>opts.push([t.id,t.title]));
      else if(type==='habit')(habits||[]).forEach(h=>opts.push([h.id,h.title]));
      else if(type==='project')(projects||[]).forEach(p=>opts.push([p.id,p.title]));
      else if(type==='skill')(skills||[]).forEach(s=>opts.push([s.id,s.name]));
      opts.forEach(([v,l])=>{const o=el('option',{value:v,txt:l});refSelect.appendChild(o);});
      refSelect.style.display=type==='note'?'none':'block';
    }
    typeSelect.addEventListener('change',updateRefs);
    updateRefs();

    body.appendChild(fGroup('Block type',typeSelect));
    body.appendChild(fGroup('Link to',refSelect));
    body.appendChild(fGroup('Label (optional)',labelIn));
    body.appendChild(el('div',{cls:'form-row'}),[fGroup('Start time',timeIn),fGroup('Duration (min)',durIn)]);
    body.appendChild(fGroup('Color',colorIn));
    if(prayerAnchor)body.appendChild(el('div',{style:'font-size:12px;color:var(--text3);margin-top:4px;',txt:'Will appear after '+prayerAnchor}));

    body.appendChild(modalActions('Cancel','Add block',async()=>{
      const type=typeSelect.value;
      const refId=refSelect.value||null;
      let label=labelIn.value.trim();
      if(!label&&refId){
        const map={todo:todos,habit:habits,project:projects,skill:skills};
        const list=map[type]||[];
        const found=list.find(x=>x.id===refId);
        if(found)label=found.title||found.name||'';
      }
      await sb.from('timeline_blocks').insert({
        user_id:USER.id,block_date:date,start_time:timeIn.value,
        duration_mins:Number(durIn.value)||30,block_type:type,
        ref_id:refId||null,prayer_anchor:prayerAnchor?prayerAnchor.toLowerCase():null,
        label:label||type,color:colorIn.value,completed:false
      });
      close();renderTimeline(wrap);
    }));
    sheet.appendChild(body);
  });
}

function openBlockActions(block,wrap,todos,habits,projects,skills){
  openModal((sheet,close)=>{
    sheet.appendChild(modalHeader(block.label||block.block_type));
    const body=modalBody();
    body.appendChild(el('button',{cls:'btn btn-red btn-fill',style:'margin-bottom:10px;',txt:'Delete this block',onClick:async()=>{
      await sb.from('timeline_blocks').delete().eq('id',block.id);
      close();renderTimeline(wrap);
    }}));
    body.appendChild(el('button',{cls:'btn btn-ghost btn-fill',txt:'Cancel',onClick:close}));
    sheet.appendChild(body);
  });
}

    const mitRow=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:14px;'});
    mitRow.appendChild(mitChk);
    mitRow.appendChild(el('label',{style:'font-size:14px;font-weight:500;',txt:'Mark as Most Important Task (MIT)'}));
    body.appendChild(mitRow);

// ── HABITS ────────────────────────────────────────────────
async function renderHabits(wrap){
  clr(wrap);
  const today=todayISO();
  const dow=todayDow();
  const [{data:habits},{data:logs}]=await Promise.all([
    sb.from('habits').select('*,categories(name,color)').eq('active',true).order('created_at'),
    sb.from('habit_logs').select('*').eq('log_date',today)
  ]);

  const addBtn=el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:16px;',txt:'+ New Habit',onClick:()=>openHabitModal(null,wrap)});
  wrap.appendChild(addBtn);

  if(!habits||habits.length===0){
    wrap.appendChild(buildEmpty('No habits','Add recurring things — walk, read, cold shower, workout.'));
    return;
  }

  // Compute streaks (simplified — count recent consecutive days)
  const todayHabits=habits.filter(h=>{
    if(!h.days_of_week||h.days_of_week.length===0)return true;
    return h.days_of_week.includes(dow);
  });
  const otherHabits=habits.filter(h=>!todayHabits.includes(h));

  if(todayHabits.length>0){
    wrap.appendChild(el('div',{cls:'section-label',txt:"Today"}));
    const c=el('div',{cls:'card'});
    todayHabits.forEach(h=>{
      for(let occ=1;occ<=h.times_per_day;occ++){
        const log=logs?.find(l=>l.habit_id===h.id&&l.occurrence===occ);
        c.appendChild(habitRow(h,log,occ,today,wrap));
      }
    });
    wrap.appendChild(c);
  }
  if(otherHabits.length>0){
    wrap.appendChild(el('div',{cls:'section-label',txt:"Not today"}));
    const c=el('div',{cls:'card'});
    otherHabits.forEach(h=>{
      const row=el('div',{cls:'row-item'});
      const main=el('div',{cls:'row-item-main',onClick:()=>openHabitModal(h,wrap)});
      main.appendChild(el('div',{cls:'row-item-title',style:'color:var(--text3);',txt:h.title}));
      main.appendChild(el('div',{cls:'row-item-sub',txt:(h.days_of_week||[]).join(', ')||'every day'}));
      row.appendChild(main);
      c.appendChild(row);
    });
    wrap.appendChild(c);
  }
}

function habitRow(h,log,occ,today,wrap){
  const done=log?.completed||false;
  const row=el('div',{cls:'row-item'});
  const chk=el('div',{cls:'check-circle green'+(done?' done':''),onClick:async()=>{
    await sb.from('habit_logs').upsert({user_id:USER.id,habit_id:h.id,log_date:today,occurrence:occ,completed:!done,completed_at:!done?new Date().toISOString():null},{onConflict:'habit_id,log_date,occurrence'});
    loadSubTab(wrap,'habits');
  }});
  if(done)chk.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>';
  const main=el('div',{cls:'row-item-main',onClick:()=>openHabitModal(h,wrap)});
  const titleRow=el('div',{style:'display:flex;align-items:center;gap:8px;'});
  titleRow.appendChild(el('div',{cls:'row-item-title',txt:h.title+(h.times_per_day>1?' ('+occ+'/'+h.times_per_day+')':'')}));
  main.appendChild(titleRow);
  if(h.categories)main.appendChild(el('div',{cls:'row-item-sub'},[el('span',{cls:'pill',style:'color:'+(h.categories.color||'var(--blue)')+';font-size:11px;',txt:h.categories.name})]));
  row.appendChild(chk);row.appendChild(main);
  return row;
}

      if(habit)await sb.from('habits').update(payload).eq('id',habit.id);
      else await sb.from('habits').insert({user_id:USER.id,...payload});
      close();loadSubTab(wrap,'habits');
    }}));
    body.appendChild(actions);
    sheet.appendChild(body);
    setTimeout(()=>titleIn.focus(),50);
  });
}

// ═══════════════════════════════════════════════════════════
// CLIENTS
// ═══════════════════════════════════════════════════════════
let clientView={mode:'list',clientId:null};

async function renderClients(wrap){
  const p=el('div',{cls:'page'});wrap.appendChild(p);
  if(clientView.mode==='detail')await renderClientDetail(p);
  else await renderClientList(p);
}

async function renderClientList(p){
  const [{data:clients},{data:projects}]=await Promise.all([
    sb.from('clients').select('*').order('created_at',{ascending:false}),
    sb.from('projects').select('*'),
  ]);

  const toprow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;'});
  toprow.appendChild(el('div',{style:'font-size:22px;font-weight:700;',txt:'Clients'}));
  toprow.appendChild(el('button',{cls:'btn btn-blue btn-sm',txt:'+ Client',onClick:()=>openClientModal(null)}));
  p.appendChild(toprow);

  if(!clients||clients.length===0){p.appendChild(buildEmpty('No clients yet','Add your first client.'));return;}

  const c=el('div',{cls:'card'});
  clients.forEach(client=>{
    const cp=(projects||[]).filter(pr=>pr.client_id===client.id);
    const unpaid=cp.filter(pr=>pr.payment_status!=='paid').length;
    const row=el('div',{cls:'card-row',style:'cursor:pointer;',onClick:()=>{clientView={mode:'detail',clientId:client.id};renderTab('clients');}});
    const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;'});
    top.appendChild(el('div',{style:'font-size:15px;font-weight:600;',txt:client.name}));
    top.appendChild(el('div',{cls:'pill',txt:client.currency}));
    row.appendChild(top);
    row.appendChild(el('div',{style:'font-size:12px;color:var(--text3);margin-top:3px;',txt:cp.length+' project'+(cp.length!==1?'s':'')+(unpaid>0?' · '+unpaid+' unpaid':'')}));
    c.appendChild(row);
  });
  p.appendChild(c);
}

async function renderClientDetail(p){
  const {data:client}=await sb.from('clients').select('*').eq('id',clientView.clientId).single();
  const {data:projects}=await sb.from('projects').select('*').eq('client_id',clientView.clientId).order('created_at',{ascending:false});

  const back=el('button',{cls:'btn btn-ghost btn-sm',style:'margin-bottom:16px;',txt:'← Clients',onClick:()=>{clientView={mode:'list',clientId:null};renderTab('clients');}});
  p.appendChild(back);

  const toprow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;'});
  toprow.appendChild(el('div',{style:'font-size:22px;font-weight:700;',txt:client.name}));
  const editBtn=el('button',{cls:'btn btn-ghost btn-sm',txt:'Edit',onClick:()=>openClientModal(client)});
  toprow.appendChild(editBtn);
  p.appendChild(toprow);
  if(client.contact_info)p.appendChild(el('div',{style:'font-size:13px;color:var(--text3);margin-bottom:16px;',txt:client.contact_info}));

  // Earnings for this client
  const earned=(projects||[]).filter(pr=>pr.payment_status==='paid').reduce((s,pr)=>s+(Number(pr.price)||0),0);
  const owed=(projects||[]).filter(pr=>pr.payment_status!=='paid').reduce((s,pr)=>s+(Number(pr.price)||0),0);
  if(earned>0||owed>0){
    const statsRow=el('div',{style:'display:flex;gap:10px;margin-bottom:14px;'});
    if(earned>0){const s=el('div',{cls:'stat-card'});s.appendChild(el('div',{cls:'stat-val',style:'color:var(--green);',txt:fmtMoney(earned,client.currency)}));s.appendChild(el('div',{cls:'stat-lbl',txt:'Earned'}));statsRow.appendChild(s);}
    if(owed>0){const s=el('div',{cls:'stat-card'});s.appendChild(el('div',{cls:'stat-val',style:'color:var(--orange);',txt:fmtMoney(owed,client.currency)}));s.appendChild(el('div',{cls:'stat-lbl',txt:'Owed'}));statsRow.appendChild(s);}
    p.appendChild(statsRow);
  }

  p.appendChild(el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:14px;',txt:'+ New Project',onClick:()=>openProjectModal(null,client)}));

  if(!projects||projects.length===0){p.appendChild(buildEmpty('No projects','Add a project for '+client.name+'.'));return;}

  projects.forEach(pr=>{
    const days=daysUntil(pr.deadline);
    const urgent=days!==null&&days<=1;
    const card=el('div',{cls:'card',style:'margin-bottom:10px;cursor:pointer;',onClick:()=>openProjectModal(pr,client)});
    const inner=el('div',{cls:'card-row'});
    const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;'});
    top.appendChild(el('div',{style:'font-size:15px;font-weight:600;',txt:pr.title}));
    const payColor=pr.payment_status==='paid'?'var(--green)':pr.payment_status==='partial'?'var(--orange)':'var(--red)';
    top.appendChild(el('span',{cls:'pill',style:'color:'+payColor+';',txt:pr.payment_status||'unpaid'}));
    inner.appendChild(top);
    const meta=el('div',{style:'display:flex;gap:8px;flex-wrap:wrap;align-items:center;'});
    meta.appendChild(el('span',{cls:'pill',txt:pr.status?.replace('_',' ')||'in progress'}));
    if(pr.price)meta.appendChild(el('span',{cls:'pill',txt:fmtMoney(pr.price,client.currency)}));
    if(pr.deadline)meta.appendChild(el('span',{cls:'pill',style:'color:'+(urgent?'var(--red)':'var(--text3)')+';',txt:(urgent?'🔴 ':'')+pr.deadline}));
    inner.appendChild(meta);
    if(pr.notes)inner.appendChild(el('div',{style:'font-size:12px;color:var(--text3);margin-top:6px;line-height:1.4;',txt:pr.notes}));
    card.appendChild(inner);
    p.appendChild(card);
  });
}

function openClientModal(client){
  openModal((sheet,close)=>{
    sheet.appendChild(modalHeader(client?'Edit Client':'New Client'));
    const body=modalBody();
    const nameIn=fInput('Name','text',client?.name);
    const contactIn=fInput('Phone, email, WhatsApp...','text',client?.contact_info);
    const curSelect=fSelect(CURRENCIES.map(c=>[c,c]),client?.currency||'BDT');
    const notesIn=fTextarea('Notes',client?.notes);
    body.appendChild(fGroup('Name',nameIn));
    body.appendChild(fGroup('Contact',contactIn));
    body.appendChild(fGroup('Currency',curSelect));
    body.appendChild(fGroup('Notes',notesIn));
    const actions=el('div',{cls:'modal-actions'});
    if(client){
      actions.appendChild(el('button',{cls:'btn btn-red',txt:'Delete',onClick:async()=>{
        if(!confirm('Delete '+client.name+'?'))return;
        await sb.from('clients').delete().eq('id',client.id);
        clientView={mode:'list',clientId:null};close();renderTab('clients');
      }}));
    } else {actions.appendChild(el('button',{cls:'btn btn-ghost',txt:'Cancel',onClick:close}));}
    actions.appendChild(el('button',{cls:'btn btn-blue',txt:client?'Save':'Add client',onClick:async()=>{
      const name=nameIn.value.trim();if(!name)return;
      const payload={name,contact_info:contactIn.value.trim(),currency:curSelect.value,notes:notesIn.value.trim()};
      if(client)await sb.from('clients').update(payload).eq('id',client.id);
      else await sb.from('clients').insert({user_id:USER.id,...payload});
      close();renderTab('clients');
    }}));
    body.appendChild(actions);sheet.appendChild(body);
    setTimeout(()=>nameIn.focus(),50);
  });
}

function openProjectModal(project,client){
  openModal((sheet,close)=>{
    sheet.appendChild(modalHeader(project?'Edit Project':'New Project'));
    const body=modalBody();
    const titleIn=fInput('Project title','text',project?.title);
    const statusIn=fInput('e.g. in progress, review, delivered','text',project?.status||'in_progress');
    const paySelect=fSelect([['unpaid','Unpaid'],['partial','Partial'],['paid','Paid']],project?.payment_status||'unpaid');
    const priceIn=fInput('Amount','number',project?.price!=null?project.price:'');
    const deadlineIn=fInput('','date',project?.deadline);
    const notesIn=fTextarea('Notes',project?.notes);
    body.appendChild(fGroup('Title',titleIn));
    body.appendChild(el('div',{cls:'form-row'}),[fGroup('Status',statusIn),fGroup('Payment',paySelect)]);
    body.appendChild(el('div',{cls:'form-row'}),[fGroup('Price ('+client.currency+')',priceIn),fGroup('Deadline',deadlineIn)]);
    body.appendChild(fGroup('Notes',notesIn));
    const actions=el('div',{cls:'modal-actions'});
    if(project){
      actions.appendChild(el('button',{cls:'btn btn-red',txt:'Delete',onClick:async()=>{
        await sb.from('projects').delete().eq('id',project.id);close();renderClientDetail(document.querySelector('.page'));
        renderTab('clients');
      }}));
    } else {actions.appendChild(el('button',{cls:'btn btn-ghost',txt:'Cancel',onClick:close}));}
    actions.appendChild(el('button',{cls:'btn btn-blue',txt:project?'Save':'Add',onClick:async()=>{
      const title=titleIn.value.trim();if(!title)return;
      const payload={title,status:statusIn.value.trim()||'in_progress',payment_status:paySelect.value,price:priceIn.value===''?null:Number(priceIn.value),deadline:deadlineIn.value||null,notes:notesIn.value.trim(),active:true};
      if(project)await sb.from('projects').update(payload).eq('id',project.id);
      else await sb.from('projects').insert({user_id:USER.id,client_id:client.id,...payload});
      close();renderTab('clients');
    }}));
    body.appendChild(actions);sheet.appendChild(body);
    setTimeout(()=>titleIn.focus(),50);
  });
}

// ═══════════════════════════════════════════════════════════
// SKILLS
// ═══════════════════════════════════════════════════════════
let skillView={mode:'list',skillId:null};

async function renderSkills(wrap){
  const p=el('div',{cls:'page'});wrap.appendChild(p);
  if(skillView.mode==='detail')await renderSkillDetail(p);
  else await renderSkillList(p);
}

async function renderSkillList(p){
  const {data:skills}=await sb.from('skills').select('*').order('created_at',{ascending:false});

  const toprow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;'});
  toprow.appendChild(el('div',{style:'font-size:22px;font-weight:700;',txt:'Skills'}));
  toprow.appendChild(el('button',{cls:'btn btn-blue btn-sm',txt:'+ Skill',onClick:()=>openSkillModal(null)}));
  p.appendChild(toprow);

  if(!skills||skills.length===0){p.appendChild(buildEmpty('No skills yet','Add a skill and build it checkpoint by checkpoint.'));return;}

  const active=skills.filter(s=>s.is_active);
  const paused=skills.filter(s=>!s.is_active);

  if(active.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'Active'}));
    const c=el('div',{cls:'card'});
    active.forEach(s=>c.appendChild(skillListRow(s)));
    p.appendChild(c);
  }
  if(paused.length>0){
    p.appendChild(el('div',{cls:'section-label',txt:'Paused'}));
    const c=el('div',{cls:'card'});
    paused.forEach(s=>c.appendChild(skillListRow(s)));
    p.appendChild(c);
  }
}

function skillListRow(s){
  const row=el('div',{cls:'card-row',style:'cursor:pointer;',onClick:()=>{skillView={mode:'detail',skillId:s.id};renderTab('skills');}});
  const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;'});
  top.appendChild(el('div',{style:'font-size:15px;font-weight:600;',txt:s.name}));
  top.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:var(--blue);',txt:s.overall_progress+'%'}));
  row.appendChild(top);
  const pb=el('div',{cls:'prog-wrap'});
  pb.appendChild(el('div',{cls:'prog-fill',style:'width:'+s.overall_progress+'%;'}));
  row.appendChild(pb);
  if(s.description)row.appendChild(el('div',{style:'font-size:12px;color:var(--text3);margin-top:4px;',txt:s.description}));
  return row;
}

async function renderSkillDetail(p){
  const {data:skill}=await sb.from('skills').select('*').eq('id',skillView.skillId).single();
  const {data:cps}=await sb.from('checkpoints').select('*').eq('skill_id',skillView.skillId).order('sort_order');

  p.appendChild(el('button',{cls:'btn btn-ghost btn-sm',style:'margin-bottom:16px;',txt:'← Skills',onClick:()=>{skillView={mode:'list',skillId:null};renderTab('skills');}}));

  const toprow=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;'});
  toprow.appendChild(el('div',{style:'font-size:22px;font-weight:700;',txt:skill.name}));
  const editBtn=el('button',{cls:'btn btn-ghost btn-sm',txt:'Edit',onClick:()=>openSkillModal(skill)});
  toprow.appendChild(editBtn);
  p.appendChild(toprow);

  if(skill.description)p.appendChild(el('div',{style:'font-size:13px;color:var(--text3);margin-bottom:14px;',txt:skill.description}));

  // Progress
  const done=(cps||[]).filter(c=>c.completed).length;
  const total=(cps||[]).length;
  const pct=total>0?Math.round((done/total)*100):skill.overall_progress;
  const progWrap=el('div',{style:'margin-bottom:20px;'});
  const progTop=el('div',{style:'display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;'});
  progTop.appendChild(el('span',{style:'color:var(--text3);',txt:'Progress'}));
  progTop.appendChild(el('span',{style:'font-weight:700;color:var(--blue);',txt:pct+'%  ('+done+'/'+total+')'}));
  progWrap.appendChild(progTop);
  const pb=el('div',{cls:'prog-wrap',style:'height:8px;'});
  pb.appendChild(el('div',{cls:'prog-fill',style:'width:'+pct+'%;'}));
  progWrap.appendChild(pb);
  p.appendChild(progWrap);

  const active=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:16px;'});
  const toggle=el('input',{type:'checkbox'});toggle.checked=skill.is_active;
  toggle.onchange=async()=>{await sb.from('skills').update({is_active:toggle.checked}).eq('id',skill.id);};
  active.appendChild(toggle);
  active.appendChild(el('label',{style:'font-size:14px;',txt:'Actively studying (shows on dashboard)'}));
  p.appendChild(active);

  p.appendChild(el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:14px;',txt:'+ Add Checkpoint',onClick:()=>openCheckpointModal(null,skill,cps,p)}));

  if(!cps||cps.length===0){p.appendChild(buildEmpty('No checkpoints','Break this skill into steps — add your first checkpoint.'));return;}

  const c=el('div',{cls:'card'});
  cps.forEach((cp,idx)=>{
    const row=el('div',{cls:'row-item'});
    const chk=el('div',{cls:'check-circle'+(cp.completed?' done':''),onClick:async()=>{
      await sb.from('checkpoints').update({completed:!cp.completed}).eq('id',cp.id);
      // recalc progress
      const newDone=cps.filter(x=>x.id===cp.id?!cp.completed:x.completed).length;
      const newPct=total>0?Math.round((newDone/total)*100):0;
      await sb.from('skills').update({overall_progress:newPct}).eq('id',skill.id);
      skillView={mode:'detail',skillId:skill.id};renderTab('skills');
    }});
    if(cp.completed)chk.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>';
    const main=el('div',{cls:'row-item-main',onClick:()=>openCheckpointModal(cp,skill,cps,p)});
    main.appendChild(el('div',{cls:'row-item-title',style:cp.completed?'text-decoration:line-through;color:var(--text3);':'',txt:(idx+1)+'. '+cp.title}));
    row.appendChild(chk);row.appendChild(main);
    c.appendChild(row);
  });
  p.appendChild(c);
}

function openSkillModal(skill){
  openModal((sheet,close)=>{
    sheet.appendChild(modalHeader(skill?'Edit Skill':'New Skill'));
    const body=modalBody();
    const nameIn=fInput('Skill name','text',skill?.name);
    const descIn=fTextarea('What does mastering this look like?',skill?.description);
    body.appendChild(fGroup('Name',nameIn));
    body.appendChild(fGroup('Description (optional)',descIn));
    const actions=el('div',{cls:'modal-actions'});
    if(skill){
      actions.appendChild(el('button',{cls:'btn btn-red',txt:'Delete',onClick:async()=>{
        if(!confirm('Delete '+skill.name+'?'))return;
        await sb.from('skills').delete().eq('id',skill.id);
        skillView={mode:'list',skillId:null};close();renderTab('skills');
      }}));
    } else {actions.appendChild(el('button',{cls:'btn btn-ghost',txt:'Cancel',onClick:close}));}
    actions.appendChild(el('button',{cls:'btn btn-blue',txt:skill?'Save':'Add skill',onClick:async()=>{
      const name=nameIn.value.trim();if(!name)return;
      const payload={name,description:descIn.value.trim(),is_active:true};
      if(skill)await sb.from('skills').update(payload).eq('id',skill.id);
      else await sb.from('skills').insert({user_id:USER.id,...payload,overall_progress:0});
      close();renderTab('skills');
    }}));
    body.appendChild(actions);sheet.appendChild(body);
    setTimeout(()=>nameIn.focus(),50);
  });
}

function openCheckpointModal(cp,skill,allCps,p){
  openModal((sheet,close)=>{
    sheet.appendChild(modalHeader(cp?'Edit Checkpoint':'New Checkpoint'));
    const body=modalBody();
    const titleIn=fInput('e.g. Finish basics course','text',cp?.title);
    body.appendChild(fGroup('Checkpoint',titleIn));
    const actions=el('div',{cls:'modal-actions'});
    if(cp){
      actions.appendChild(el('button',{cls:'btn btn-red',txt:'Delete',onClick:async()=>{
        await sb.from('checkpoints').delete().eq('id',cp.id);
        const remaining=allCps.filter(x=>x.id!==cp.id);
        const newPct=remaining.length>0?Math.round((remaining.filter(x=>x.completed).length/remaining.length)*100):0;
        await sb.from('skills').update({overall_progress:newPct}).eq('id',skill.id);
        close();skillView={mode:'detail',skillId:skill.id};renderTab('skills');
      }}));
    } else {actions.appendChild(el('button',{cls:'btn btn-ghost',txt:'Cancel',onClick:close}));}
    actions.appendChild(el('button',{cls:'btn btn-blue',txt:cp?'Save':'Add',onClick:async()=>{
      const title=titleIn.value.trim();if(!title)return;
      if(cp){
        await sb.from('checkpoints').update({title}).eq('id',cp.id);
      } else {
        const maxO=allCps.reduce((m,x)=>Math.max(m,x.sort_order||0),0);
        await sb.from('checkpoints').insert({user_id:USER.id,skill_id:skill.id,title,sort_order:maxO+1});
      }
      close();skillView={mode:'detail',skillId:skill.id};renderTab('skills');
    }}));
    body.appendChild(actions);sheet.appendChild(body);
    setTimeout(()=>titleIn.focus(),50);
  });
}

// ═══════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════
async function renderSettings(wrap){
  const p=el('div',{cls:'page'});
  wrap.appendChild(p);
  p.appendChild(el('div',{style:'font-size:22px;font-weight:700;margin-bottom:20px;',txt:'Settings'}));

  // Prayer times
  p.appendChild(el('div',{cls:'section-label',txt:'Prayer Times'}));
  const {data:prayers}=await sb.from('prayer_times').select('*').order('sort_order');
  const pCard=el('div',{cls:'card'});
  (prayers||[]).forEach(pr=>{
    const row=el('div',{cls:'card-row',style:'display:flex;align-items:center;justify-content:space-between;'});
    row.appendChild(el('div',{style:'font-size:14px;font-weight:600;',txt:pr.name}));
    const timeIn=el('input',{type:'time',value:pr.time,style:'width:110px;background:var(--card2);border:none;color:var(--text);font-size:14px;padding:6px 10px;border-radius:8px;'});
    timeIn.addEventListener('change',async()=>{
      await sb.from('prayer_times').update({time:timeIn.value}).eq('id',pr.id);
    });
    row.appendChild(timeIn);
    pCard.appendChild(row);
  });
  p.appendChild(pCard);

  // Categories
  p.appendChild(el('div',{cls:'section-label',txt:'Categories'}));
  const {data:cats}=await sb.from('categories').select('*').order('name');
  const catCard=el('div',{cls:'card'});
  (cats||[]).forEach(cat=>{
    const row=el('div',{cls:'card-row',style:'display:flex;align-items:center;justify-content:space-between;'});
    const left=el('div',{style:'display:flex;align-items:center;gap:10px;'});
    left.appendChild(el('div',{style:'width:12px;height:12px;border-radius:50%;background:'+(cat.color||'var(--blue)')+';flex-shrink:0;'}));
    left.appendChild(el('div',{style:'font-size:14px;',txt:cat.name}));
    row.appendChild(left);
    row.appendChild(el('button',{cls:'btn btn-sm btn-red',txt:'✕',onClick:async()=>{
      await sb.from('categories').delete().eq('id',cat.id);renderTab('settings');
    }}));
    catCard.appendChild(row);
  });
  // Add category inline
  const addCatRow=el('div',{cls:'card-row',style:'display:flex;gap:8px;'});
  const newCatIn=fInput('New category name');
  newCatIn.style.fontSize='14px';
  const addCatBtn=el('button',{cls:'btn btn-blue btn-sm',txt:'Add',onClick:async()=>{
    const name=newCatIn.value.trim();if(!name)return;
    await sb.from('categories').insert({user_id:USER.id,name,color:'#0A84FF'});
    newCatIn.value='';renderTab('settings');
  }});
  addCatRow.appendChild(newCatIn);addCatRow.appendChild(addCatBtn);
  catCard.appendChild(addCatRow);
  p.appendChild(catCard);

  // Sign out
  p.appendChild(el('div',{cls:'section-label',txt:'Account'}));
  p.appendChild(el('button',{cls:'btn btn-red btn-fill',txt:'Sign Out',onClick:async()=>{await sb.auth.signOut();}}));
}

// SHARED HELPERS

function buildEmpty(title,sub){
  const d=el('div',{cls:'empty'});
  d.appendChild(el('div',{cls:'empty-title',txt:title}));
  d.appendChild(el('div',{cls:'empty-sub',txt:sub}));
  return d;
}
