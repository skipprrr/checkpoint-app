<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0f"/>
<link rel="icon" type="image/png" href="checkpoint.png"/>
<link rel="apple-touch-icon" href="checkpoint.png"/>
<title>Skippieverse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0f;--card:#13131a;--card2:#1a1a24;--card3:#22222e;
  --text:#f0f0f5;--dim:#666680;--sep:#1e1e2a;
  --blue:#4f8eff;--purple:#8b5cf6;--green:#10d988;
  --yellow:#fbbf24;--red:#f43f5e;--orange:#fb923c;--pink:#ec4899;
  --cyan:#06b6d4;
  --r:14px;--r2:18px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{cursor:pointer;font-family:inherit;border:none;outline:none;}
input,select,textarea{font-family:inherit;font-size:16px;background:var(--card2);border:1.5px solid var(--sep);color:var(--text);border-radius:12px;padding:12px 14px;width:100%;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
input::placeholder,textarea::placeholder{color:var(--dim);}
textarea{resize:none;}
input[type=time],input[type=date]{color-scheme:dark;}
input[type=checkbox]{width:auto;accent-color:var(--blue);}
select option{background:var(--card);}

/* Layout */
#root{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;position:relative;}
.content{flex:1;overflow-y:auto;padding-bottom:88px;}
.page{padding:20px 16px 8px;}

/* Auth */
#auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse at 50% -20%,#1a0a3e 0%,var(--bg) 65%);}
.auth-logo{font-size:36px;font-weight:900;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(--blue),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.auth-sub{font-size:14px;color:var(--dim);text-align:center;margin-bottom:36px;font-weight:500;}
.auth-err{font-size:13px;color:var(--red);margin:6px 0;font-weight:600;}

/* Bottom Nav */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,15,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep);padding:6px 0 22px;display:flex;justify-content:space-around;z-index:100;}
.nav-btn{background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;color:var(--dim);font-size:10px;font-weight:700;letter-spacing:0.02em;transition:color 0.2s;border-radius:10px;}
.nav-btn.active{color:var(--blue);}
.nav-icon{font-size:20px;line-height:1;display:block;transition:transform 0.2s;}
.nav-btn.active .nav-icon{transform:scale(1.15);}

/* Cards */
.card{background:var(--card);border-radius:var(--r2);overflow:hidden;margin-bottom:10px;border:1px solid var(--sep);}
.card-row{padding:14px 16px;border-bottom:1px solid var(--sep);}
.card-row:last-child{border-bottom:none;}
.section-hd{font-size:11px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;margin:20px 0 8px 2px;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:700;border:none;cursor:pointer;border-radius:12px;padding:13px 20px;font-size:15px;transition:opacity 0.15s,transform 0.1s;letter-spacing:0.01em;}
.btn:active{transform:scale(0.97);opacity:0.9;}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 2px 16px rgba(79,142,255,0.3);}
.btn-purple{background:var(--purple);color:#fff;box-shadow:0 2px 16px rgba(139,92,246,0.3);}
.btn-green{background:var(--green);color:#0a0a0f;box-shadow:0 2px 16px rgba(16,217,136,0.3);}
.btn-red{background:var(--red);color:#fff;}
.btn-ghost{background:var(--card2);color:var(--dim);border:1px solid var(--sep);}
.btn-fill{width:100%;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:8px;}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.15s ease;}
.modal-sh{background:var(--card);width:100%;max-width:430px;border-radius:22px 22px 0 0;padding:0 0 40px;max-height:92vh;overflow-y:auto;animation:slideUp 0.28s cubic-bezier(0.32,1.2,0.64,1);}
.modal-handle{width:36px;height:4px;background:var(--card3);border-radius:2px;margin:10px auto 0;}
.modal-hd{padding:18px 18px 10px;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{background:var(--card2);color:var(--dim);width:28px;height:28px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:4px 16px;}
.fg{margin-bottom:14px;}
.fl{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px;display:block;}
.form-row{display:flex;gap:10px;}
.form-row>.fg{flex:1;}
.mact{display:flex;gap:10px;margin-top:18px;}
.mact .btn{flex:1;padding:14px;}

/* Pill / badge */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--card2);color:var(--dim);}

/* Check circle */
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--sep);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;cursor:pointer;}
.chk.done{background:var(--blue);border-color:var(--blue);animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.chk.done-green{background:var(--green)!important;border-color:var(--green)!important;}

/* Progress */
.prog{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width 0.5s ease;}

/* Row items */
.row-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--sep);}
.row-item:last-child{border-bottom:none;}
.ri-main{flex:1;min-width:0;}
.ri-title{font-size:15px;font-weight:600;}
.ri-sub{font-size:12px;color:var(--dim);margin-top:2px;}

/* Day chips */
.day-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.day-chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;background:var(--card2);color:var(--dim);border:1.5px solid var(--sep);cursor:pointer;transition:all 0.15s;}
.day-chip.on{background:var(--purple);color:#fff;border-color:var(--purple);}

/* Streak */
.streak{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:var(--orange);background:rgba(251,146,60,0.12);padding:2px 7px;border-radius:20px;}

/* Sub tabs */
.sub-tabs{display:flex;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:16px;border:1px solid var(--sep);}
.sub-tab{flex:1;padding:8px;border-radius:9px;background:transparent;color:var(--dim);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all 0.18s;}
.sub-tab.active{background:var(--card3);color:var(--text);}

/* Empty */
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:44px;margin-bottom:12px;display:block;}
.empty-title{font-size:17px;font-weight:800;margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:20px;}

/* Hero */
.hero{background:linear-gradient(135deg,#0f0f1e,#1a1035);border-radius:20px;padding:20px;margin-bottom:12px;border:1px solid rgba(79,142,255,0.12);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;background:radial-gradient(circle,rgba(139,92,246,0.12),transparent 70%);pointer-events:none;}
.hero-label{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
.hero-title{font-size:19px;font-weight:800;line-height:1.3;margin-bottom:0;}

/* Stat cards */
.stat-row{display:flex;gap:8px;margin-bottom:10px;}
.stat-card{flex:1;background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--sep);}
.stat-val{font-size:20px;font-weight:900;margin-bottom:2px;}
.stat-lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.04em;}

/* Timeline */
.tl-wrap{position:relative;padding-left:62px;}
.tl-line{position:absolute;left:44px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--purple),var(--blue),var(--cyan));}
.tl-item{position:relative;margin-bottom:6px;}
.tl-time{position:absolute;left:-62px;width:54px;text-align:right;font-size:11px;font-weight:600;color:var(--dim);padding-top:15px;line-height:1.1;}
.tl-dot{position:absolute;left:-13px;width:12px;height:12px;border-radius:50%;background:var(--card3);border:2px solid var(--sep);top:16px;transform:translateX(-50%);z-index:1;transition:all 0.25s;}
.tl-dot.p-dot{width:20px;height:20px;top:11px;background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 10px rgba(251,191,36,0.5);}
.tl-dot.done-dot{background:var(--green);border-color:var(--green);}
.tl-block{border-radius:12px;padding:12px 14px;margin-left:6px;transition:transform 0.12s;}
.tl-block:active{transform:scale(0.98);}
.p-block{background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);}
.t-block{background:var(--card);border:1px solid var(--sep);}
.tl-block-title{font-size:14px;font-weight:700;margin-bottom:1px;}
.tl-block-sub{font-size:11px;color:var(--dim);}
.tl-add{margin-left:6px;border:1.5px dashed var(--sep);border-radius:12px;padding:9px 14px;background:transparent;color:var(--dim);font-size:13px;font-weight:600;width:calc(100% - 6px);text-align:left;cursor:pointer;transition:all 0.18s;}
.tl-add:hover{border-color:var(--blue);color:var(--blue);}
.tl-section{margin-bottom:4px;}

/* Storm mode */
.storm-banner{background:linear-gradient(135deg,#1a0a2e,#0a1a2e);border:1px solid rgba(139,92,246,0.3);border-radius:16px;padding:18px;margin-bottom:14px;text-align:center;}
.storm-title{font-size:18px;font-weight:900;color:var(--purple);margin-bottom:4px;}
.storm-sub{font-size:13px;color:var(--dim);line-height:1.5;}
.storm-fab{position:fixed;bottom:100px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(139,92,246,0.4);z-index:99;transition:transform 0.2s;}
.storm-fab:active{transform:scale(0.92);}
.storm-fab.active-storm{background:linear-gradient(135deg,var(--orange),var(--red));}

/* Money */
.money-owe{color:var(--green);font-weight:800;}
.money-debt{color:var(--red);font-weight:800;}

/* Return protocol */
.return-card{background:linear-gradient(135deg,#0a1a0f,#0a0f1a);border:1px solid rgba(16,217,136,0.2);border-radius:20px;padding:22px;margin-bottom:16px;text-align:center;}
.return-title{font-size:20px;font-weight:900;margin-bottom:8px;}
.return-sub{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:16px;}

/* Year vision */
.vision-year{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.vision-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--sep);}
.vision-item:last-child{border-bottom:none;}
.vision-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;color:#fff;}

/* Confetti & Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0a0f;font-size:14px;font-weight:800;padding:11px 22px;border-radius:30px;z-index:999;animation:toastPop 2.6s ease forwards;white-space:nowrap;box-shadow:0 4px 20px rgba(16,217,136,0.4);}
.confetti-c{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:998;}
.cp{position:absolute;border-radius:2px;animation:fall linear forwards;}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(0.4)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes toastPop{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}82%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(540deg);opacity:0}}
@keyframes bounceIn{0%{transform:scale(0.85);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
.anim-in{animation:bounceIn 0.35s cubic-bezier(0.34,1.2,0.64,1);}
</style>
</head>
<body>
<div id="root">
  <div id="auth-wrap" style="display:none;">
    <div style="width:100%;max-width:340px;">
      <div style="font-size:48px;text-align:center;margin-bottom:10px;">⚡</div>
      <div class="auth-logo">Skippieverse</div>
      <div class="auth-sub">Your personal operating system.</div>
      <div class="fg"><input type="email" id="a-email" placeholder="Email"/></div>
      <div class="fg"><input type="password" id="a-pw" placeholder="Password"/></div>
      <div class="auth-err" id="a-err" style="display:none;"></div>
      <button class="btn btn-blue btn-fill" id="a-btn" style="margin-top:8px;font-size:16px;padding:15px;">Enter →</button>
    </div>
  </div>
  <div id="app-wrap" style="display:none;flex-direction:column;flex:1;">
    <div class="content" id="content"></div>
    <button class="storm-fab" id="storm-fab" title="Storm Mode">⛈</button>
    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="home"><span class="nav-icon">🏠</span><span>Home</span></button>
      <button class="nav-btn" data-tab="agenda"><span class="nav-icon">⚡</span><span>Agenda</span></button>
      <button class="nav-btn" data-tab="clients"><span class="nav-icon">💼</span><span>Clients</span></button>
      <button class="nav-btn" data-tab="money"><span class="nav-icon">💰</span><span>Money</span></button>
      <button class="nav-btn" data-tab="skills"><span class="nav-icon">🎯</span><span>Skills</span></button>
      <button class="nav-btn" data-tab="more"><span class="nav-icon">···</span><span>More</span></button>
    </nav>
  </div>
</div>
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL="https://aahfamkxawhknagbechd.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaGZhbWt4YXdoa25hZ2JlY2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MzUwNDIsImV4cCI6MjA5ODQxMTA0Mn0.j9tQVT2Qsw_WZo9EzKL6pHGyAx0Hlrzn-85IxkSP6i8";
const sb=supabase.createClient(SB_URL,SB_KEY);

const QUOTES=["Discipline is choosing what you want most.","You don't rise to the level of your goals — you fall to the level of your systems.","Anchor first. Then move.","What gets logged, gets built.","Small steps daily. Big results yearly.","Chaos is clarity you haven't built yet.","Show up. Even when you don't feel like it.","Consistency is the only flex that compounds."];
const DAYS=['sun','mon','tue','wed','thu','fri','sat'];
const DAY_LABELS=['S','M','T','W','T','F','S'];
const CURRENCIES=['BDT','USD','EUR','GBP','CAD','AUD','SGD','AED','INR'];
const PRAYER_META={Fajr:{emoji:'🌙',order:1},Dhuhr:{emoji:'☀️',order:2},Asr:{emoji:'🌤',order:3},Maghrib:{emoji:'🌅',order:4},Isha:{emoji:'🌠',order:5}};
const PRAYER_DEFAULTS={Fajr:'05:15',Dhuhr:'12:30',Asr:'15:45',Maghrib:'18:10',Isha:'19:30'};
const CONFETTI=['#4f8eff','#8b5cf6','#10d988','#fbbf24','#f43f5e','#fb923c','#ec4899'];
const MONEY_CATS=['Client','Friend','Family','Supplier','Personal'];

let USER=null,STORM=false,activeTab='home',agSubTab='timeline',lastOpened=null;

// ── UTILS ─────────────────────────────────────────────────
function todayISO(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function fmtDate(d){return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});}
function todayQuote(){return QUOTES[Math.floor(Date.now()/86400000)%QUOTES.length];}
function todayDow(){return DAYS[new Date().getDay()];}
function daysUntil(iso){if(!iso)return null;const d=new Date(iso),t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number),ap=h>=12?'PM':'AM';return`${(h%12)||12}:${p2(m)} ${ap}`;}
function fmtMoney(n,cur){const s={BDT:'৳',USD:'$',EUR:'€',GBP:'£',CAD:'C$',AUD:'A$',SGD:'S$',AED:'د.إ',INR:'₹'};return`${s[cur]||cur}${Number(n||0).toLocaleString()}`;}

function el(tag,a,ch){
  const e=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='cls')e.className=v;else if(k==='html')e.innerHTML=v;
    else if(k==='txt')e.textContent=v;else if(k==='style')e.style.cssText=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  if(ch)ch.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function clr(e){while(e.firstChild)e.removeChild(e.firstChild);}
function q(s){return document.querySelector(s);}

// ── CELEBRATIONS ──────────────────────────────────────────
function celebrate(msg){
  const c=el('div',{cls:'confetti-c'});
  for(let i=0;i<28;i++){
    const p=el('div',{cls:'cp'});
    const sz=6+Math.random()*8;
    p.style.cssText=`left:${Math.random()*100}%;top:0;width:${sz}px;height:${sz}px;background:${CONFETTI[Math.floor(Math.random()*CONFETTI.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.8}s;animation-delay:${Math.random()*0.4}s;`;
    c.appendChild(p);
  }
  document.body.appendChild(c);setTimeout(()=>c.remove(),3200);
  const t=el('div',{cls:'toast',txt:msg});
  document.body.appendChild(t);setTimeout(()=>t.remove(),2700);
}

// ── AUTH ──────────────────────────────────────────────────
sb.auth.onAuthStateChange((_,s)=>{USER=s?.user||null;USER?boot():showAuth();});
sb.auth.getSession().then(({data})=>{USER=data.session?.user||null;USER?boot():showAuth();});
function showAuth(){q('#auth-wrap').style.display='flex';q('#app-wrap').style.display='none';}
async function boot(){
  q('#auth-wrap').style.display='none';q('#app-wrap').style.display='flex';
  await seedPrayers();
  await checkLastOpened();
  setupStorm();
  renderTab('home');
}
q('#a-btn').onclick=async function(){
  const email=q('#a-email').value.trim(),pw=q('#a-pw').value;
  const err=q('#a-err');err.style.display='none';this.textContent='...';this.disabled=true;
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;err.style.display='block';}
  this.textContent='Enter →';this.disabled=false;
};

// ── SEED PRAYERS (idempotent, never duplicates) ───────────
async function seedPrayers(){
  const{data:rows}=await sb.from('prayer_times').select('name').eq('user_id',USER.id);
  const existing=new Set((rows||[]).map(r=>r.name));
  const missing=Object.keys(PRAYER_META).filter(n=>!existing.has(n));
  if(!missing.length)return;
  await sb.from('prayer_times').insert(
    missing.map(name=>({user_id:USER.id,name,time:PRAYER_DEFAULTS[name],sort_order:PRAYER_META[name].order}))
  );
}

// ── LAST OPENED / RETURN PROTOCOL ────────────────────────
async function checkLastOpened(){
  const today=todayISO();
  const{data}=await sb.from('user_settings').select('last_opened').eq('user_id',USER.id).maybeSingle();
  lastOpened=data?.last_opened||null;
  await sb.from('user_settings').upsert({user_id:USER.id,last_opened:today,updated_at:new Date().toISOString()},{onConflict:'user_id'});
}
function daysSinceLastOpen(){
  if(!lastOpened)return 0;
  const d=new Date(lastOpened),t=new Date();t.setHours(0,0,0,0);
  return Math.floor((t-d)/86400000);
}

    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

function renderTab(t){
  const c=q('#content');clr(c);
  if(t==='home')renderHome(c);
  else if(t==='agenda')renderAgenda(c);
  else if(t==='clients')renderClients(c);
  else if(t==='money')renderMoney(c);
  else if(t==='skills')renderSkills(c);
  else if(t==='more')renderMore(c);
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(fn){
  const root=q('#modal-root');clr(root);
  const ov=el('div',{cls:'modal-ov'});
  const sh=el('div',{cls:'modal-sh'});
  sh.appendChild(el('div',{cls:'modal-handle'}));
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  fn(sh,closeModal);ov.appendChild(sh);root.appendChild(ov);
}
function closeModal(){clr(q('#modal-root'));}
function mHd(title){
  const h=el('div',{cls:'modal-hd'});
  h.appendChild(el('div',{cls:'modal-title',txt:title}));
  h.appendChild(el('button',{cls:'modal-close',txt:'✕',onClick:closeModal}));
  return h;
}
function mBody(){return el('div',{cls:'modal-body'});}
function fg(label,input){const g=el('div',{cls:'fg'});if(label)g.appendChild(el('span',{cls:'fl',txt:label}));g.appendChild(input);return g;}
function fIn(ph,type,val){const i=el('input',{type:type||'text',placeholder:ph||''});if(val!=null)i.value=val;return i;}
function fSel(opts,val){
  const s=el('select');
  opts.forEach(([v,l])=>{const o=el('option',{value:v,txt:l||v});if(String(v)===String(val))o.selected=true;s.appendChild(o);});
  return s;
}
function fTA(ph,val,rows){const t=el('textarea',{placeholder:ph||'',rows:rows||'3'});if(val)t.value=val;return t;}
function mAct(c1,s1,onSave,deleteAction){
  const row=el('div',{cls:'mact'});
  if(deleteAction)row.appendChild(el('button',{cls:'btn btn-red',txt:'Delete',onClick:deleteAction}));
  else row.appendChild(el('button',{cls:'btn btn-ghost',txt:c1||'Cancel',onClick:closeModal}));
  row.appendChild(el('button',{cls:'btn btn-blue',txt:s1||'Save',onClick:onSave}));
  return row;
}

async function renderHome(wrap){
  wrap.innerHTML=loading();
  const today=todayISO(),dow=todayDow();
  const[r1,r2,r3,r4,r5,r6]=await Promise.all([
    sb.from('todos').select('*').eq('completed',false).order('is_mit',{ascending:false}),

    sb.from('habit_logs').select('*').eq('log_date',today),
    sb.from('projects').select('*,clients(name,currency)').eq('active',true).neq('status','delivered'),
    sb.from('skills').select('*').eq('is_active',true),
    sb.from('year_vision').select('*').order('sort_order'),

    const rc=el('div',{cls:'return-card anim-in'});
    rc.appendChild(el('div',{cls:'return-title',txt:'Welcome back. 👋'}));
    rc.appendChild(el('div',{cls:'return-sub',txt:"The past is done. Today is all that matters.\nJust return to the path."}));
    const missions=el('div',{style:'text-align:left;'});
    ['🕌 Pray','🏃 Move your body','💼 One client work block','⚡ One business block'].forEach(m=>{
      missions.appendChild(el('div',{style:'font-size:13px;font-weight:600;padding:4px 0;color:var(--text);',txt:m}));
    });
    rc.appendChild(missions);
    p.appendChild(rc);
  }

  // Storm mode
  if(STORM){
    p.appendChild(el('div',{cls:'storm-banner'},[
      el('div',{cls:'storm-title',txt:'⛈ Storm Mode'}),
      el('div',{cls:'storm-sub',txt:"You don't need to fix your whole life today.\nJust return to the path."}),
    ]));
    // Only show top 3 + prayers
    const mit=todos.find(t=>t.is_mit),top3=todos.filter(t=>!t.is_mit).slice(0,3);
    p.appendChild(el('div',{cls:'section-hd',txt:'Focus on this'}));
    const fc=el('div',{cls:'card'});
    if(mit){
      const r=el('div',{cls:'card-row',style:'border-left:3px solid var(--yellow);'});
      r.appendChild(el('div',{style:'font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:3px;',txt:'⭐ Most Important'}));
      r.appendChild(el('div',{style:'font-size:15px;font-weight:700;',txt:mit.title}));
      fc.appendChild(r);
    }
    top3.forEach(t=>{
      const r=el('div',{cls:'card-row',style:'display:flex;align-items:center;gap:10px;'});
      const chk=el('div',{cls:'chk',onClick:async()=>{await sb.from('todos').update({completed:true}).eq('id',t.id);celebrate('Done! 💪');renderTab('home');}});
      r.appendChild(chk);r.appendChild(el('div',{cls:'ri-title',txt:t.title}));
      fc.appendChild(r);
    });
    if(!mit&&!top3.length)fc.appendChild(el('div',{cls:'card-row',style:'color:var(--dim);font-size:13px;',txt:'No tasks yet — you\'re free.'}));
    p.appendChild(fc);
    wrap.appendChild(p);return;
  }

  // Normal home

  if(vision.length>0){
    const v=vision[0];
    p.appendChild(el('div',{cls:'hero anim-in'},[
      el('div',{cls:'hero-label',txt:'Today serves'}),
      el('div',{cls:'hero-title',txt:'✦ '+v.goal}),

    const hr=new Date().getHours();

    p.appendChild(el('div',{cls:'hero anim-in'},[
      el('div',{cls:'hero-label',txt:fmtDate(new Date())}),
      el('div',{cls:'hero-title',txt:'"'+todayQuote()+'"'}),
    ]));
  }

  // MIT
  const mit=todos.find(t=>t.is_mit);
  if(mit){
    p.appendChild(el('div',{cls:'section-hd',txt:'⭐ Most Important Task'}));
    const mc=el('div',{cls:'card'});
    const mr=el('div',{cls:'card-row',style:'display:flex;align-items:center;gap:12px;'});
    const mchk=el('div',{cls:'chk',onClick:async()=>{await sb.from('todos').update({completed:true}).eq('id',mit.id);celebrate("MIT done! 🔥 Legendary!");renderTab('home');}});
    mr.appendChild(mchk);mr.appendChild(el('div',{style:'font-size:16px;font-weight:800;',txt:mit.title}));
    mc.appendChild(mr);p.appendChild(mc);

  // Habits today
  const todayHabits=habits.filter(h=>!h.days_of_week?.length||h.days_of_week.includes(dow));
  const doneCount=todayHabits.filter(h=>hlogs.find(l=>l.habit_id===h.id&&l.occurrence===1&&l.completed)).length;
  if(todayHabits.length>0){
    p.appendChild(el('div',{cls:'section-hd',txt:'🔥 Habits — '+doneCount+'/'+todayHabits.length}));
    const hc=el('div',{cls:'card'});
    todayHabits.slice(0,5).forEach(h=>{

      const done=log?.completed||false;
      const r=el('div',{cls:'card-row',style:'display:flex;align-items:center;gap:10px;'});
      const chk=el('div',{cls:'chk'+(done?' done done-green':''),onClick:async()=>{

      r.appendChild(chk);r.appendChild(el('div',{cls:'ri-title',txt:h.title}));

  if(next.length){
    p.appendChild(el('div',{cls:'section-hd',txt:'⚡ Up Next'}));

      const chk=el('div',{cls:'chk',onClick:async()=>{await sb.from('todos').update({completed:true}).eq('id',t.id);celebrate('Done! 💪');renderTab('home');}});
      r.appendChild(chk);r.appendChild(el('div',{cls:'ri-title',txt:t.title}));
      nc.appendChild(r);

    p.appendChild(nc);
  }

  // Active projects
  if(projects.length){
    p.appendChild(el('div',{cls:'section-hd',txt:'💼 Active Projects'}));
    const pc=el('div',{cls:'card'});
    projects.slice(0,3).forEach(pr=>{
      const days=daysUntil(pr.deadline),urgent=days!==null&&days<=1;
      const r=el('div',{cls:'card-row'});
      const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;'});
      top.appendChild(el('div',{cls:'ri-title',txt:pr.title}));
      if(pr.deadline)top.appendChild(el('span',{cls:'pill',style:'color:'+(urgent?'var(--red)':'var(--dim)')+';',txt:(urgent?'🔴 ':'')+daysLabel(days)}));
      r.appendChild(top);
      if(pr.clients)r.appendChild(el('div',{cls:'ri-sub',txt:pr.clients.name+' · '+pr.payment_status}));
      pc.appendChild(r);
    });
    p.appendChild(pc);
  }

  // Skills
  if(skills.length){
    p.appendChild(el('div',{cls:'section-hd',txt:'🎯 Skills'}));
    const sc=el('div',{cls:'card'});
    skills.slice(0,3).forEach(s=>{
      const r=el('div',{cls:'card-row'});
      const top=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;'});
      top.appendChild(el('div',{cls:'ri-title',txt:s.name}));
      top.appendChild(el('div',{style:'font-size:12px;font-weight:700;color:var(--blue);',txt:s.overall_progress+'%'}));
      r.appendChild(top);
      const pb=el('div',{cls:'prog'});pb.appendChild(el('div',{cls:'prog-fill',style:'width:'+s.overall_progress+'%;'}));
      r.appendChild(pb);sc.appendChild(r);
    });
    p.appendChild(sc);
  }

  // Money quick view
  const{data:ledger}=await sb.from('money_ledger').select('*');
  if(ledger?.length){
    const owed=ledger.reduce((m,r)=>{if(r.they_owe_me>0){m[r.currency]=(m[r.currency]||0)+Number(r.they_owe_me);}return m;},{});
    const debt=ledger.reduce((m,r)=>{if(r.i_owe_them>0){m[r.currency]=(m[r.currency]||0)+Number(r.i_owe_them);}return m;},{});
    if(Object.keys(owed).length||Object.keys(debt).length){
      p.appendChild(el('div',{cls:'section-hd',txt:'💰 Money'}));
      const mrow=el('div',{cls:'stat-row'});
      const allC=[...new Set([...Object.keys(owed),...Object.keys(debt)])].slice(0,1);
      allC.forEach(cur=>{
        if(owed[cur]){const s=el('div',{cls:'stat-card'});s.appendChild(el('div',{cls:'stat-val money-owe',txt:fmtMoney(owed[cur],cur)}));s.appendChild(el('div',{cls:'stat-lbl',txt:'Receivable'}));mrow.appendChild(s);}
        if(debt[cur]){const s=el('div',{cls:'stat-card'});s.appendChild(el('div',{cls:'stat-val money-debt',txt:fmtMoney(debt[cur],cur)}));s.appendChild(el('div',{cls:'stat-lbl',txt:'Payable'}));mrow.appendChild(s);}
      });
      p.appendChild(mrow);
    }
  }

  wrap.appendChild(p);

function daysLabel(d){return d===0?'Today':d===1?'Tomorrow':d<0?'Overdue':'In '+d+'d';}
function checkSvg(color){return`<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="${color||'#fff'}" stroke-width="3.5" stroke-linecap="round"/></svg>`;}
function loading(){return'<div style="padding:40px;text-align:center;color:var(--dim);font-size:13px;">Loading...</div>';}

async function renderAgenda(wrap){

  ['timeline','todo','habits'].forEach(t=>{

async function loadSub(wrap,tab){
  clr(wrap);wrap.innerHTML=loading();
  if(tab==='timeline')await renderTimeline(wrap);
  else if(tab==='todo')await renderTodo(wrap);
  else if(tab==='habits')await renderHabits(wrap);
}

// ── TIMELINE ──────────────────────────────────────────────
async function renderTimeline(wrap){
  clr(wrap);
  const today=todayISO();
  const[rp,rb,rt,rh,rpr,rs]=await Promise.all([
    sb.from('prayer_times').select('*').eq('user_id',USER.id).order('sort_order'),
    sb.from('timeline_blocks').select('*').eq('block_date',today).eq('user_id',USER.id).order('start_time'),
    sb.from('todos').select('id,title').eq('completed',false).eq('user_id',USER.id),
    sb.from('habits').select('id,title').eq('active',true).eq('user_id',USER.id),
    sb.from('projects').select('id,title').eq('active',true).eq('user_id',USER.id),
    sb.from('skills').select('id,name').eq('is_active',true).eq('user_id',USER.id),
  ]);
  const prayers=rp.data||[],blocks=rb.data||[];
  const todos=rt.data||[],habits=rh.data||[],projects=rpr.data||[],skills=rs.data||[];

  const tl=el('div',{cls:'tl-wrap'});
  tl.appendChild(el('div',{cls:'tl-line'}));

  prayers.forEach(pr=>{
    const anchor=pr.name.toLowerCase();
    const prBlocks=blocks.filter(b=>b.prayer_anchor===anchor);

    // Prayer checkpoint
    const pi=el('div',{cls:'tl-item'});
    pi.appendChild(el('div',{cls:'tl-time',txt:fmt12(pr.time)}));
    pi.appendChild(el('div',{cls:'tl-dot p-dot'}));
    const pb2=el('div',{cls:'tl-block p-block'});
    pb2.appendChild(el('div',{cls:'tl-block-title',txt:(PRAYER_META[pr.name]?.emoji||'🕌')+' '+pr.name}));
    pi.appendChild(pb2);tl.appendChild(pi);

    // Tasks under this prayer
    prBlocks.forEach(b=>tl.appendChild(makeTlBlock(b,wrap,todos,habits,projects,skills)));

    // Single add button per prayer
    const ai=el('div',{cls:'tl-item'});
    ai.appendChild(el('div',{cls:'tl-dot',style:'background:transparent;border:1.5px dashed var(--sep);'}));
    ai.appendChild(el('button',{cls:'tl-add',txt:'+ Add Task',onClick:()=>openAddBlock(today,pr.name,wrap,todos,habits,projects,skills)}));
    tl.appendChild(ai);
  });

  // Free blocks (no prayer anchor)
  const freeBlocks=blocks.filter(b=>!b.prayer_anchor);
  if(freeBlocks.length){
    freeBlocks.forEach(b=>tl.appendChild(makeTlBlock(b,wrap,todos,habits,projects,skills)));
  }
  const fi=el('div',{cls:'tl-item',style:'margin-top:8px;'});
  fi.appendChild(el('div',{cls:'tl-dot',style:'background:transparent;border:none;'}));
  fi.appendChild(el('button',{cls:'tl-add',txt:'+ Add Free Block',onClick:()=>openAddBlock(today,null,wrap,todos,habits,projects,skills)}));
  tl.appendChild(fi);

  clr(wrap);wrap.appendChild(tl);
}

function makeTlBlock(b,wrap,todos,habits,projects,skills){
  const item=el('div',{cls:'tl-item anim-in'});
  item.appendChild(el('div',{cls:'tl-time',txt:fmt12(b.start_time)}));
  item.appendChild(el('div',{cls:'tl-dot'+(b.completed?' done-dot':'')}));
  const block=el('div',{cls:'tl-block t-block',style:'border-left:3px solid '+(b.color||'var(--blue)')+';'});
  const brow=el('div',{style:'display:flex;align-items:center;justify-content:space-between;gap:8px;'});
  brow.appendChild(el('div',{cls:'tl-block-title',txt:b.label||b.block_type}));
  const chk=el('div',{cls:'chk'+(b.completed?' done':''),style:'width:22px;height:22px;',onClick:async e=>{
    e.stopPropagation();
    await sb.from('timeline_blocks').update({completed:!b.completed}).eq('id',b.id);
    if(!b.completed)celebrate('Block done! ⚡');
    renderTimeline(wrap);
  }});
  if(b.completed)chk.innerHTML=checkSvg('#0a0a0f');
  brow.appendChild(chk);block.appendChild(brow);
  if(b.duration_mins)block.appendChild(el('div',{cls:'tl-block-sub',txt:b.duration_mins+'min · '+b.block_type}));
  block.onclick=()=>openBlockMenu(b,wrap,todos,habits,projects,skills);
  item.appendChild(block);return item;
}

function openAddBlock(date,prayer,wrap,todos,habits,projects,skills){
  openModal((sh,close)=>{
    sh.appendChild(mHd('Add Task'+(prayer?' after '+prayer:'')));
    const body=mBody();
    const typeS=fSel([['todo','✅ Todo'],['habit','🔥 Habit'],['project','💼 Project'],['skill','🎯 Skill'],['note','📝 Note']]);
    const refS=fSel([['','— link to —']]);
    const labelIn=fIn('Label (auto-filled from selection)');
    const timeIn=fIn('','time','09:00');
    const durIn=fIn('Duration (min)','number','30');
    const colorIn=el('input',{type:'color',value:'#4f8eff'});colorIn.style.cssText='height:42px;padding:4px 6px;border-radius:10px;width:100%;cursor:pointer;';

    function updRefs(){
      clr(refS);const type=typeS.value;
      let opts=[['','— link to —']];
      if(type==='todo')todos.forEach(t=>opts.push([t.id,t.title]));
      else if(type==='habit')habits.forEach(h=>opts.push([h.id,h.title]));
      else if(type==='project')projects.forEach(p=>opts.push([p.id,p.title]));
      else if(type==='skill')skills.forEach(s=>opts.push([s.id,s.name]));
      opts.forEach(([v,l])=>{refS.appendChild(el('option',{value:v,txt:l}));});
      refS.style.display=type==='note'?'none':'block';
    }
    typeS.addEventListener('change',updRefs);
    refS.addEventListener('change',()=>{
      if(!labelIn.value&&refS.value){
        const map={todo:todos,habit:habits,project:projects,skill:skills};
        const found=(map[typeS.value]||[]).find(x=>x.id===refS.value);
        if(found)labelIn.value=found.title||found.name||'';
      }
    });
    updRefs();
    body.appendChild(fg('Type',typeS));
    body.appendChild(fg('Link to',refS));
    body.appendChild(fg('Label',labelIn));
    const fr=el('div',{cls:'form-row'});fr.appendChild(fg('Start time',timeIn));fr.appendChild(fg('Duration (min)',durIn));body.appendChild(fr);
    body.appendChild(fg('Color',colorIn));
    if(prayer)body.appendChild(el('div',{style:'font-size:12px;color:var(--blue);font-weight:600;margin-top:4px;',txt:'📌 Anchored after '+prayer}));
    body.appendChild(mAct('Cancel','Add block',async()=>{
      let label=labelIn.value.trim();
      await sb.from('timeline_blocks').insert({user_id:USER.id,block_date:date,start_time:timeIn.value,duration_mins:Number(durIn.value)||30,block_type:typeS.value,ref_id:refS.value||null,prayer_anchor:prayer?prayer.toLowerCase():null,label:label||typeS.value,color:colorIn.value,completed:false});
      close();renderTimeline(wrap);
    }));
    sh.appendChild(body);
  });
}

function openBlockMenu(b,wrap,todos,habits,projects,skills){
  openModal((sh,close)=>{
    sh.appendChild(mHd(b.label||'Block'));
    const body=mBody();
    body.appendChild(el('div',{style:'font-size:13px;color:var(--dim);margin-bottom:16px;',txt:fmt12(b.start_time)+' · '+b.duration_mins+'min'}));
    body.appendChild(el('button',{cls:'btn btn-red btn-fill',style:'margin-bottom:10px;',txt:'Delete block',onClick:async()=>{await sb.from('timeline_blocks').delete().eq('id',b.id);close();renderTimeline(wrap);}}));
    body.appendChild(el('button',{cls:'btn btn-ghost btn-fill',txt:'Cancel',onClick:close}));
    sh.appendChild(body);
  });
}

// ── TODO ──────────────────────────────────────────────────
async function renderTodo(wrap){
  clr(wrap);
  const[{data:todos},{data:cats}]=await Promise.all([
    sb.from('todos').select('*,categories(name,color)').eq('completed',false).order('is_mit',{ascending:false}).order('created_at'),
    sb.from('categories').select('*').order('name'),
  ]);
  wrap.appendChild(el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:14px;',txt:'+ New Todo',onClick:()=>openTodoModal(null,cats,wrap)}));

async function renderHabits(wrap){
  clr(wrap);

function habitRow(h,logs,occ,today,wrap){
  const log=logs?.find(l=>l.habit_id===h.id&&l.occurrence===occ);
  const done=log?.completed||false;
  const r=el('div',{cls:'row-item'});
  const chk=el('div',{cls:'chk'+(done?' done done-green':''),onClick:async()=>{
    await sb.from('habit_logs').upsert({user_id:USER.id,habit_id:h.id,log_date:today,occurrence:occ,completed:!done,completed_at:!done?new Date().toISOString():null},{onConflict:'habit_id,log_date,occurrence'});

  main.appendChild(el('div',{cls:'ri-sub',txt:dl}));

  // Progress card
  const pc=el('div',{cls:'card',style:'margin-bottom:12px;'});
  const pr=el('div',{cls:'card-row'});
  const pt=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:8px;'});
  pt.appendChild(el('div',{style:'font-size:13px;font-weight:600;color:var(--dim);',txt:'Progress'}));
  pt.appendChild(el('div',{style:'font-size:13px;font-weight:800;color:var(--blue);',txt:pct+'% ('+done+'/'+total+')'}));
  pr.appendChild(pt);
  const pb=el('div',{cls:'prog',style:'height:8px;'});pb.appendChild(el('div',{cls:'prog-fill',style:'width:'+pct+'%;'}));
  pr.appendChild(pb);
  if(pct===100)pr.appendChild(el('div',{style:'text-align:center;margin-top:12px;font-size:22px;',txt:'🏆 Complete!'}));
  pc.appendChild(pr);p.appendChild(pc);
  // Active toggle
  const tr=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px;background:var(--card);border-radius:12px;border:1px solid var(--sep);'});
  const tog=el('input',{type:'checkbox'});tog.checked=skill.is_active;
  tog.onchange=async()=>{await sb.from('skills').update({is_active:tog.checked}).eq('id',skill.id);};
  tr.appendChild(tog);tr.appendChild(el('label',{style:'font-size:14px;font-weight:600;',txt:'Currently studying'}));p.appendChild(tr);
  p.appendChild(el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:14px;',txt:'+ Add Checkpoint',onClick:()=>openCpModal(null,skill,cps||[])}));
  if(!cps?.length){p.appendChild(buildEmpty('🎯','No checkpoints','Break this down into steps.'));return;}
  const c=el('div',{cls:'card'});
  (cps||[]).forEach((cp,i)=>{
    const r=el('div',{cls:'row-item'});
    const chk=el('div',{cls:'chk'+(cp.completed?' done':''),onClick:async()=>{
      await sb.from('checkpoints').update({completed:!cp.completed}).eq('id',cp.id);
      const nd=(cps||[]).filter(x=>(x.id===cp.id?!cp.completed:x.completed)).length;
      const np=total>0?Math.round((nd/total)*100):0;
      await sb.from('skills').update({overall_progress:np}).eq('id',skill.id);
      if(!cp.completed){np===100?celebrate('Skill complete! 🏆 Legend!'):celebrate('Checkpoint done! '+np+'% 🎯');}
      skView={mode:'detail',sid:skill.id};renderTab('skills');
    }});
    if(cp.completed)chk.innerHTML=checkSvg('#fff');
    const main=el('div',{cls:'ri-main',onClick:()=>openCpModal(cp,skill,cps||[])});
    main.appendChild(el('div',{cls:'ri-title',style:cp.completed?'text-decoration:line-through;color:var(--dim);':'',txt:(i+1)+'. '+cp.title}));
    r.appendChild(chk);r.appendChild(main);c.appendChild(r);
  });
  p.appendChild(c);
}
function openSkillModal(skill){
  openModal((sh,close)=>{
    sh.appendChild(mHd(skill?'Edit Skill':'New Skill'));
    const body=mBody();
    const nIn=fIn('e.g. After Effects, Muay Thai','text',skill?.name);
    const dIn=fTA('What does mastering this look like?',skill?.description);
    body.appendChild(fg('Name',nIn));body.appendChild(fg('Description',dIn));
    body.appendChild(mAct('Cancel',skill?'Save':'Add',async()=>{
      const name=nIn.value.trim();if(!name)return;
      if(skill)await sb.from('skills').update({name,description:dIn.value.trim()}).eq('id',skill.id);
      else await sb.from('skills').insert({user_id:USER.id,name,description:dIn.value.trim(),overall_progress:0,is_active:true});
      close();renderTab('skills');
    },skill?async()=>{if(!confirm('Delete?'))return;await sb.from('skills').delete().eq('id',skill.id);skView={mode:'list'};close();renderTab('skills');}:null));
    sh.appendChild(body);setTimeout(()=>nIn.focus(),60);
  });
}
function openCpModal(cp,skill,allCps){
  openModal((sh,close)=>{
    sh.appendChild(mHd(cp?'Edit Checkpoint':'New Checkpoint'));
    const body=mBody();
    const tIn=fIn('e.g. Finish basics course','text',cp?.title);
    body.appendChild(fg('Checkpoint',tIn));
    body.appendChild(mAct('Cancel',cp?'Save':'Add',async()=>{
      const title=tIn.value.trim();if(!title)return;
      if(cp)await sb.from('checkpoints').update({title}).eq('id',cp.id);
      else{const mo=allCps.reduce((m,x)=>Math.max(m,x.sort_order||0),0);await sb.from('checkpoints').insert({user_id:USER.id,skill_id:skill.id,title,sort_order:mo+1});}
      close();skView={mode:'detail',sid:skill.id};renderTab('skills');
    },cp?async()=>{
      await sb.from('checkpoints').delete().eq('id',cp.id);
      const rem=allCps.filter(x=>x.id!==cp.id);
      const np=rem.length?Math.round((rem.filter(x=>x.completed).length/rem.length)*100):0;
      await sb.from('skills').update({overall_progress:np}).eq('id',skill.id);
      close();skView={mode:'detail',sid:skill.id};renderTab('skills');
    }:null));
    sh.appendChild(body);setTimeout(()=>tIn.focus(),60);
  });
}

// ═══════════════════════════════════════════════════════════
// MORE (Year Vision + Settings)
// ═══════════════════════════════════════════════════════════
let moreTab='vision';
async function renderMore(wrap){
  const p=el('div',{cls:'page'});wrap.appendChild(p);
  const sub=el('div',{cls:'sub-tabs'});
  ['vision','settings'].forEach(t=>{
    const labels={vision:'Year Vision',settings:'Settings'};
    const btn=el('button',{cls:'sub-tab'+(moreTab===t?' active':''),txt:labels[t],onClick:()=>{
      moreTab=t;document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      clr(sc);if(t==='vision')renderVision(sc);else renderSettings(sc);
    }});
    sub.appendChild(btn);
  });
  p.appendChild(sub);
  const sc=el('div');p.appendChild(sc);
  if(moreTab==='vision')await renderVision(sc);else await renderSettings(sc);
}

async function renderVision(wrap){
  clr(wrap);
  const yr=new Date().getFullYear();
  const{data:goals}=await sb.from('year_vision').select('*').eq('year',yr).order('sort_order');
  wrap.appendChild(el('div',{cls:'vision-year',txt:yr+' Vision'}));
  wrap.appendChild(el('div',{style:'font-size:13px;color:var(--dim);margin-bottom:18px;',txt:'What this year is about. Rarely changes.'}));
  wrap.appendChild(el('button',{cls:'btn btn-blue btn-fill',style:'margin-bottom:14px;',txt:'+ Add Goal',onClick:()=>openVisionModal(null,goals||[],wrap)}));
  if(!goals?.length){wrap.appendChild(buildEmpty('🌟','No vision set','Define what this year is for. Let it guide your daily work.'));return;}
  const c=el('div',{cls:'card'});
  (goals||[]).forEach((g,i)=>{
    const r=el('div',{cls:'vision-item',style:'cursor:pointer;',onClick:()=>openVisionModal(g,goals||[],wrap)});
    r.appendChild(el('div',{cls:'vision-num',txt:String(i+1)}));
    r.appendChild(el('div',{style:'font-size:15px;font-weight:600;line-height:1.4;',txt:g.goal}));
    c.appendChild(r);
  });
  wrap.appendChild(c);
}
function openVisionModal(goal,allGoals,wrap){
  openModal((sh,close)=>{
    sh.appendChild(mHd(goal?'Edit Goal':'New Goal'));
    const body=mBody();
    const gIn=fTA('e.g. Become a world-class video editor',goal?.goal,2);
    body.appendChild(fg('Goal',gIn));
    body.appendChild(mAct('Cancel',goal?'Save':'Add',async()=>{
      const text=gIn.value.trim();if(!text)return;
      const yr=new Date().getFullYear();
      if(goal)await sb.from('year_vision').update({goal:text}).eq('id',goal.id);
      else{const mo=allGoals.reduce((m,x)=>Math.max(m,x.sort_order||0),0);await sb.from('year_vision').insert({user_id:USER.id,year:yr,goal:text,sort_order:mo+1});}
      close();renderVision(wrap);
    },goal?async()=>{await sb.from('year_vision').delete().eq('id',goal.id);close();renderVision(wrap);}:null));
    sh.appendChild(body);setTimeout(()=>gIn.focus(),60);
  });
}

async function renderSettings(wrap){
  clr(wrap);
  // Prayer times
  wrap.appendChild(el('div',{cls:'section-hd',txt:'🕌 Prayer Times'}));
  const{data:prayers}=await sb.from('prayer_times').select('*').eq('user_id',USER.id).order('sort_order');
  const pc=el('div',{cls:'card'});
  (prayers||[]).forEach(pr=>{
    const r=el('div',{cls:'card-row',style:'display:flex;align-items:center;justify-content:space-between;gap:12px;'});
    const left=el('div',{style:'display:flex;align-items:center;gap:8px;flex:1;'});
    left.appendChild(el('span',{style:'font-size:18px;',txt:PRAYER_META[pr.name]?.emoji||'🕌'}));
    left.appendChild(el('span',{style:'font-size:14px;font-weight:700;',txt:pr.name}));
    const tIn=el('input',{type:'time',value:pr.time});
    tIn.style.cssText='width:110px;font-size:14px;font-weight:600;background:var(--card2);border:1.5px solid var(--sep);color:var(--blue);padding:8px 10px;border-radius:10px;';
    tIn.onchange=async()=>{await sb.from('prayer_times').update({time:tIn.value}).eq('id',pr.id);};
    r.appendChild(left);r.appendChild(tIn);pc.appendChild(r);
  });
  wrap.appendChild(pc);

  // Categories
  wrap.appendChild(el('div',{cls:'section-hd',txt:'🏷 Categories'}));
  const{data:cats}=await sb.from('categories').select('*').order('name');
  const cc=el('div',{cls:'card'});
  (cats||[]).forEach(cat=>{
    const r=el('div',{cls:'card-row',style:'display:flex;align-items:center;justify-content:space-between;'});
    const l=el('div',{style:'display:flex;align-items:center;gap:10px;'});
    l.appendChild(el('div',{style:'width:12px;height:12px;border-radius:50%;background:'+(cat.color||'var(--blue)')+';'}));
    l.appendChild(el('div',{style:'font-size:14px;font-weight:600;',txt:cat.name}));
    r.appendChild(l);
    r.appendChild(el('button',{cls:'btn btn-red btn-xs',txt:'Remove',onClick:async()=>{await sb.from('categories').delete().eq('id',cat.id);renderTab('more');}}));
    cc.appendChild(r);
  });
  const ar=el('div',{cls:'card-row',style:'display:flex;gap:8px;'});
  const ncIn=fIn('New category...');ncIn.style.fontSize='14px';
  const addB=el('button',{cls:'btn btn-blue btn-sm',txt:'Add',onClick:async()=>{
    const name=ncIn.value.trim();if(!name)return;
    await sb.from('categories').insert({user_id:USER.id,name,color:'#4f8eff'});
    ncIn.value='';renderTab('more');
  }});
  ar.appendChild(ncIn);ar.appendChild(addB);cc.appendChild(ar);
  wrap.appendChild(cc);

  // Sign out
  wrap.appendChild(el('div',{cls:'section-hd',txt:'Account'}));
  wrap.appendChild(el('button',{cls:'btn btn-red btn-fill',txt:'Sign Out',onClick:async()=>{await sb.auth.signOut();}}));
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function topBar(p,title,onAdd){
  const r=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;'});
  r.appendChild(el('div',{style:'font-size:22px;font-weight:900;',txt:title}));
  r.appendChild(el('button',{cls:'btn btn-blue btn-sm',txt:'+ Add',onClick:onAdd}));
  p.appendChild(r);
}
function buildEmpty(icon,title,sub){
  const d=el('div',{cls:'empty'});
  d.appendChild(el('span',{cls:'empty-icon',txt:icon}));
  d.appendChild(el('div',{cls:'empty-title',txt:title}));
  if(sub)d.appendChild(el('div',{cls:'empty-sub',txt:sub}));
  return d;
}
</script>
